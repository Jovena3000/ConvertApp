<script>
// ========== PWA PRINCIPAL (ConvertAPK) ==========
(function setupMainPWA() {
  const manifest = {
    name: "ConvertAPK - Criador de Apps",
    short_name: "ConvertAPK",
    start_url: "/",
    display: "standalone",
    theme_color: "#FF006E",
    background_color: "#020617",
    icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FF006E'/%3E%3Ctext x='49' y='67' font-size='50' text-anchor='middle' fill='white'%3E📱%3C/text%3E%3C/svg%3E", sizes: "any", type: "image/svg+xml" }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: "application/manifest+json"});
  const url = URL.createObjectURL(blob);
  document.querySelector('link[rel="manifest"]').setAttribute('href', url);
  const swCode = `self.addEventListener('install', e => e.waitUntil(caches.open('convertapk').then(c => c.addAll(['/']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
  const swBlob = new Blob([swCode], {type: "application/javascript"});
  const swUrl = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl);
})();

// ========== ESTADO GLOBAL ==========
let user = null, apps = [], toastQueue = [], editModalAppId = null, currentToast = null;
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

function installMainPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  } else {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3 class="text-xl font-bold mb-3">📱 Instalar ConvertAPK</h3>
        <p class="text-sm mb-3">Seu navegador não ofereceu instalação automática. Siga:</p>
        <ul class="list-disc list-inside text-sm space-y-2 text-slate-300">
          <li><strong>Chrome/Edge (Android):</strong> Menu → "Adicionar à tela inicial"</li>
          <li><strong>Samsung Internet:</strong> Menu → "Adicionar página à tela inicial"</li>
          <li><strong>iOS (Safari):</strong> Compartilhar → "Adicionar à Tela de Início"</li>
        </ul>
        <button class="btn-primary w-full mt-4" onclick="this.closest('.modal').remove()">Entendi</button>
      </div>`;
    document.body.appendChild(modal);
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  }
}

// ========== FUNÇÃO PARA GERAR APK REAL VIA API pwa2apk.com ==========
async function baixarApkReal(app) {
  toast(`🔄 Gerando APK para ${app.name}...`, 'info', 5000);
  
  const btns = document.querySelectorAll('.apk-generate-btn, .btn-success');
  btns.forEach(btn => btn.disabled = true);
  
  try {
    const formData = new FormData();
    formData.append('name', app.name);
    formData.append('url', app.websiteUrl);
    
    if (app.iconUrl && app.iconUrl.startsWith('http')) {
      formData.append('icon', app.iconUrl);
    }
    
    // ⚠️ USE A URL CORRETA DO SEU WORKER ⚠️
    const WORKER_URL = 'https://convertapp.dominio3000.workers.dev';
    
    const resposta = await fetch(WORKER_URL, {
      method: 'POST',
      body: formData
    });
    
    if (!resposta.ok) {
      let erroMsg = `HTTP ${resposta.status}`;
      try {
        const texto = await resposta.text();
        if (texto) erroMsg = texto;
      } catch(e) {}
      throw new Error(erroMsg);
    }
    
    const blob = await resposta.blob();
    const downloadUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = downloadUrl;
    a.download = `${app.name.replace(/[^a-z0-9]/gi, '_')}.apk`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(downloadUrl);
    
    toast(`✅ APK do "${app.name}" gerado!`, 'success');
  } catch (erro) {
    console.error('Erro:', erro);
    toast(`❌ Falha: ${erro.message}`, 'error');
  } finally {
    btns.forEach(btn => btn.disabled = false);
  }
}

// ========== INSTALAR APP CRIADO (MODO PADRÃO: abre e orienta) ==========
function installAppAsPWA(app) {
  const newWindow = window.open(app.websiteUrl, '_blank');
  if (!newWindow) {
    toast("Permita pop-ups para abrir o app.", "error");
  } else {
    toast(`✅ "${app.name}" aberto. Toque no menu (3 pontos) → "Adicionar à tela inicial".`, "success", 8000);
  }
}

// ========== PERSISTÊNCIA ==========
const loadStorage = () => {
  try {
    user = JSON.parse(localStorage.getItem('convertapk_user'));
    apps = JSON.parse(localStorage.getItem('convertapk_apps')) || [];
  } catch(e) {}
  if (!apps.length) apps.push({
    id: 1, userId: 1, name: "TechNews Brasil", description: "Portal de tecnologia", websiteUrl: "https://technews.com.br",
    packageName: "com.convertapk.technews", version: "1.0.0", themeColor: "#FF006E", orientation: "portrait",
    permissions: ["INTERNET"], offlineSupport: true, deepLinking: false, analyticsEnabled: true,
    iconUrl: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=100&q=80",
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  });
};
const persist = () => { localStorage.setItem('convertapk_user', JSON.stringify(user)); localStorage.setItem('convertapk_apps', JSON.stringify(apps)); };
const getRoute = () => window.location.hash.slice(1) || '/';
const navigate = (route) => { window.location.hash = route; rerender(); };
const toast = (msg, type='success', duration=3000) => {
  toastQueue.push({ msg, type, duration });
  if (!currentToast) showNextToast();
};
const showNextToast = () => {
  if (!toastQueue.length) { currentToast = null; rerender(); return; }
  currentToast = toastQueue.shift();
  rerender();
  setTimeout(showNextToast, currentToast.duration || 3000);
};
const esc = (s) => String(s??'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

// ========== CRUD APPS ==========
const createApp = (data) => {
  const newApp = { ...data, id: Date.now(), userId: user?.id || 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  apps = [newApp, ...apps]; persist(); toast(`"${newApp.name}" criado! ✨`); navigate('/dashboard');
};
const updateApp = (id, data) => { apps = apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a); persist(); toast("App atualizado"); rerender(); };
const deleteApp = (id) => { apps = apps.filter(a => a.id !== id); persist(); toast("App removido"); navigate('/dashboard'); };

// ========== AUTENTICAÇÃO ==========
const handleLogin = () => { user = { id: 1, name: "Cyber Dev", email: "dev@convertapk.com", role: "user" }; persist(); toast("Conectado!"); navigate('/dashboard'); };
const handleLogout = () => { user = null; persist(); toast("Desconectado"); navigate('/'); };
const handleUpgrade = (tier) => { if (!user) user = { id: 1, name: "Cyber Dev", email: "dev@convertapk.com", role: tier }; else user.role = tier; persist(); toast(`Plano ${tier.toUpperCase()} ativado! 🚀`); navigate('/dashboard'); };

// ========== SIMULAÇÃO DE BUILD (APENAS VISUAL) ==========
function startBuild(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;
  const pre = document.getElementById('buildPreChecks'), prog = document.getElementById('buildProgress'), result = document.getElementById('buildResult');
  if (pre) pre.style.display = 'none'; if (prog) prog.style.display = 'block';
  const logsDiv = document.getElementById('buildLogs'), bar = document.getElementById('buildProgressBar'), pct = document.getElementById('buildPct');
  const phaseLabel = document.getElementById('buildPhaseLabel'), dot = document.getElementById('consoleStatusDot');
  if (dot) dot.style.background = '#facc15';
  const log = (msg, type) => { if (logsDiv) logsDiv.innerHTML += `\n<span class="text-${type||'info'}">[${new Date().toLocaleTimeString()}] ${msg}</span>`; logsDiv.scrollTop = logsDiv.scrollHeight; };
  log(`🚀 Build solicitado para ${app.name}`, 'pink-400');
  const phases = ["Preparando ambiente", "Validando URL", "Compilando recursos", "Gerando APK via API", "Finalizando"];
  let step = 0;
  const interval = setInterval(() => {
    if (step >= phases.length) {
      clearInterval(interval);
      log("✅ Build concluída! Agora clique em 'Baixar APK Real' para fazer o download.", "green-400");
      if (bar) bar.style.width = '100%'; if (pct) pct.textContent = '100%'; if (phaseLabel) phaseLabel.textContent = 'Pronto!'; if (dot) dot.style.background = '#4ade80';
      if (result) {
        result.style.display = 'block';
        result.innerHTML = `
          <div class="text-center p-4 border border-green-500/30 rounded-xl bg-green-500/5">
            <div class="text-2xl mb-2">🎉</div>
            <div class="text-green-400 font-bold">Simulação concluída!</div>
            <div class="text-sm text-slate-400 my-2">Clique no botão abaixo para gerar e baixar o APK.</div>
            <button class="btn-success" onclick="baixarApkReal(apps.find(a=>a.id===${app.id}))">📲 Baixar APK Real</button>
          </div>`;
      }
      return;
    }
    const percent = Math.round(((step+1)/phases.length)*100);
    if (bar) bar.style.width = percent+'%'; if (pct) pct.textContent = percent+'%'; if (phaseLabel) phaseLabel.textContent = phases[step];
    log(`[${phases[step]}] ...`, 'info');
    step++;
  }, 500);
}

// ========== UPLOAD DE IMAGEM ==========
const fileToBase64 = (f) => new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(f); });
let caIconData = null, quickIconData = null, editIconData = null;
window.handleCaImage = async (file) => {
  if (!file || !file.type.startsWith('image/')) return toast('Apenas imagem', 'error');
  if (file.size > 2e6) return toast('Máx 2MB', 'error');
  const b64 = await fileToBase64(file); caIconData = b64; document.getElementById('caIconPreview').innerHTML = `<img src="${b64}" class="w-full h-full object-cover rounded-xl">`;
};
window.clearCaIcon = () => { caIconData = null; document.getElementById('caIconPreview').innerHTML = '📱'; document.getElementById('caIconUrl').value = ''; };
window.submitCreateApp = () => {
  const name = document.getElementById('caName')?.value.trim(), url = document.getElementById('caUrl')?.value.trim(), pkg = document.getElementById('caPkg')?.value.trim();
  if (!name || !url || !pkg) return toast('Preencha todos os campos', 'error');
  createApp({
    name, websiteUrl: url, description: document.getElementById('caDesc')?.value || '',
    packageName: pkg, version: document.getElementById('caVersion')?.value || '1.0.0', themeColor: document.getElementById('caColor')?.value || '#FF006E',
    orientation: document.getElementById('caOrientation')?.value || 'portrait', permissions: ['INTERNET'],
    offlineSupport: document.getElementById('caOffline')?.checked, deepLinking: document.getElementById('caDeep')?.checked,
    analyticsEnabled: document.getElementById('caAnalytics')?.checked, iconUrl: caIconData || document.getElementById('caIconUrl')?.value || ''
  });
};
window.handleQuickImage = async (file) => { if (!file) return; const b64 = await fileToBase64(file); quickIconData = b64; document.getElementById('quickIconPreview').innerHTML = `<img src="${b64}" class="h-12 rounded-lg">`; };
window.handleQuickForm = () => {
  const name = document.getElementById('qName')?.value.trim() || 'Quick App', url = document.getElementById('qUrl')?.value.trim();
  if (!url) return toast('URL obrigatória', 'error');
  if (!user) handleLogin();
  createApp({ name, websiteUrl: url, description: 'Criado rapidamente', packageName: `com.quick.${Date.now()}`, version: '1.0.0', themeColor: '#FF006E', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false, analyticsEnabled: true, iconUrl: quickIconData || '' });
  quickIconData = null;
};
window.openEditModal = (id) => { editModalAppId = id; editIconData = null; rerender(); };
window.saveEditModal = (id) => {
  const name = document.getElementById('editName')?.value.trim(), url = document.getElementById('editUrl')?.value.trim();
  if (!name || !url) return toast('Nome e URL obrigatórios', 'error');
  const icon = editIconData || document.getElementById('editIconUrl')?.value.trim() || apps.find(a=>a.id===id)?.iconUrl || '';
  updateApp(id, { name, websiteUrl: url, description: document.getElementById('editDesc')?.value || '', packageName: document.getElementById('editPkg')?.value || '', version: document.getElementById('editVersion')?.value || '1.0.0', themeColor: document.getElementById('editColor')?.value || '#FF006E', orientation: document.getElementById('editOrientation')?.value || 'portrait', offlineSupport: document.getElementById('editOffline')?.checked, deepLinking: document.getElementById('editDeep')?.checked, analyticsEnabled: document.getElementById('editAnalytics')?.checked, iconUrl: icon });
  editModalAppId = null; editIconData = null; rerender();
};
window.handleEditImage = async (file) => { if (!file) return; editIconData = await fileToBase64(file); document.getElementById('editIconPreview').innerHTML = `<img src="${editIconData}" class="w-16 h-16 rounded-xl object-cover">`; };

// ========== RENDER ==========
const renderNavbar = () => `
<nav class="sticky top-0 z-50 border-b border-pink-500/20 backdrop-blur-xl bg-slate-950/80">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

const renderFooter = () => `<footer class="border-t border-pink-500/10 bg-slate-950/50 py-8 mt-auto"><div class="text-center text-xs text-slate-600">© 2026 ConvertAPK — Gere APKs reais com tecnologia pwa2apk.com</div></footer>`;
const renderToast = () => currentToast ? `<div class="toast toast-${currentToast.type === 'error' ? 'error' : 'success'}">${currentToast.msg}</div>` : '';

  if (!editModalAppId) return '';

};

    <div class="glass p-6 rounded-2xl"><div class="text-4xl mb-2">⚡</div><h3>Rápido e Grátis</h3><p>Download em segundos, sem complicação.</p></div>

    </div>`).join('')}</div>
</div>`;

const renderCreateApp = () => `
<div class="max-w-3xl mx-auto px-6 py-10">
  <button class="btn-outline mb-4" onclick="navigate('/dashboard')">← Voltar</button>
  <div class="glass rounded-2xl p-6"><h2 class="text-2xl font-black mb-4">Criar novo app</h2>
    <input class="input-field mb-3" id="caName" placeholder="Nome do App *">
    <input class="input-field mb-3" id="caUrl" placeholder="URL do Site *">
    <textarea class="input-field mb-3" id="caDesc" placeholder="Descrição"></textarea>
    <input class="input-field mb-3" id="caPkg" placeholder="Package name" value="com.convertapk.${Date.now()}">
    <input class="input-field mb-3" id="caVersion" value="1.0.0">
    <input type="color" id="caColor" value="#FF006E" class="mb-3 w-full h-10 rounded-xl">
    <div class="upload-zone mb-3" onclick="document.getElementById('caIconFile').click()">📸 Clique para enviar ícone</div>
    <input type="file" id="caIconFile" accept="image/*" style="display:none" onchange="handleCaImage(this.files[0])">
    <div id="caIconPreview" class="w-16 h-16 mb-3"></div>
    <div class="flex gap-4 mb-4"><label><input type="checkbox" id="caOffline" checked> Offline</label><label><input type="checkbox" id="caDeep"> Deep Link</label><label><input type="checkbox" id="caAnalytics" checked> Analytics</label></div>
    <button class="btn-primary w-full" onclick="submitCreateApp()">Criar App</button>
  </div>
</div>`;

const renderAppDetails = (id) => {
  const app = apps.find(a=>a.id===id);
  if (!app) return '<div class="text-center py-20">App não encontrado</div>';
  return `<div class="max-w-4xl mx-auto px-6 py-10"><button class="btn-outline mb-4" onclick="navigate('/dashboard')">← Voltar</button><div class="glass rounded-2xl p-6"><div class="flex gap-4"><div class="w-20 h-20 rounded-xl overflow-hidden">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-2xl font-black">${esc(app.name)}</h2><p>${esc(app.websiteUrl)}</p><div class="flex gap-3 mt-4 flex-wrap"><button class="btn-success" onclick="baixarApkReal(apps.find(a=>a.id===${app.id}))">📲 Baixar APK Real</button><button class="btn-outline" onclick="installAppAsPWA(apps.find(a=>a.id===${app.id}))">📲 Instalar App (modo guia)</button><button class="btn-outline" onclick="navigate('/build/${app.id}')">Simular Build</button></div></div></div></div></div>`;
};

const renderBuildPage = (id) => {
  const app = apps.find(a=>a.id===id);
  if (!app) return '<div>App não encontrado</div>';
  return `<div class="max-w-6xl mx-auto px-6 py-10"><button class="btn-outline mb-4" onclick="navigate('/app/${id}')">← Voltar</button><div class="grid md:grid-cols-3 gap-6"><div class="md:col-span-2 glass rounded-2xl p-6"><div id="buildPreChecks"><div class="flex gap-4 items-center mb-6"><div class="w-14 h-14 rounded-xl overflow-hidden">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-xl font-black">${esc(app.name)}</h2><span class="badge-green text-xs">APK via API</span></div></div><button class="btn-primary w-full" onclick="startBuild(${id})">▶ Simular Compilação</button></div><div id="buildProgress" style="display:none"><div id="buildPhaseLabel" class="font-bold mb-2"></div><div class="progress-bar-track"><div id="buildProgressBar" class="progress-bar-fill" style="width:0%"></div></div><div class="text-right text-sm mt-1" id="buildPct">0%</div></div><div id="buildResult" style="display:none"></div></div><div class="glass rounded-2xl p-4"><div class="flex items-center gap-2 mb-3"><span id="consoleStatusDot" class="w-2 h-2 bg-slate-500 rounded-full"></span><span class="text-xs font-bold">CONSOLE</span></div><div id="buildLogs" class="log-output h-80"><span class="text-slate-500">[READY] Clique em "Simular Compilação".</span></div></div></div></div>`;
};

const renderPricing = () => `<div class="max-w-4xl mx-auto px-6 py-16 text-center"><h1 class="text-4xl font-black">Planos</h1><div class="grid md:grid-cols-2 gap-6 mt-8"><div class="glass p-6 rounded-2xl"><h3>Grátis</h3><p>✓ Geração de APK real via API<br>✓ Apps ilimitados<br>✓ Ícones personalizados</p><button class="btn-primary mt-4" onclick="handleLogin()">Começar Grátis</button></div><div class="glass border-pink-500 p-6 rounded-2xl"><h3>Premium</h3><p>✓ Build própria (sem depender de API externa)<br>✓ Suporte prioritário<br>✓ Remoção de marca</p><button class="btn-outline mt-4" onclick="handleUpgrade('premium')">Contratar</button></div></div></div>`;

function rerender() {
  const root = document.getElementById('app-root'); if (!root) return;
  const route = getRoute();
  let main = '';
  if (!user && !['/', '/pricing'].includes(route)) main = renderLanding();
  else if (route === '/') main = renderLanding();
  else if (route === '/dashboard') main = renderDashboard();
  else if (route === '/create-app') main = renderCreateApp();
  else if (route === '/pricing') main = renderPricing();
  else if (route.startsWith('/app/')) main = renderAppDetails(parseInt(route.split('/')[2]));
  else if (route.startsWith('/build/')) main = renderBuildPage(parseInt(route.split('/')[2]));
  else main = renderLanding();
  root.innerHTML = renderNavbar() + `<main class="flex-1">${main}</main>` + renderFooter() + renderToast() + renderEditModal();
}

loadStorage();
window.addEventListener('hashchange', rerender);
rerender();
</script>
</body>
</html>
