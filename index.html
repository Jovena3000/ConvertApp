<!DOCTYPE html>
<html lang="pt">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root { --pink:#FF006E; --cyan:#00d9ff; --purple:#7C3AED; }
    *,*::before,*::after { box-sizing:border-box; scroll-behavior:smooth; }
    body { background:#020617; font-family:'Rajdhani',sans-serif; font-size:16px; }
    h1,h2,h3,h4 { font-family:'Orbitron',monospace; }
    .mono { font-family:'JetBrains Mono',monospace; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#0f172a; }
    ::-webkit-scrollbar-thumb { background:#FF006E; border-radius:10px; }
    .glass { backdrop-filter:blur(14px); background:rgba(15,23,42,.70); border:1px solid rgba(51,65,85,.55); }
    .glass-pink  { border-color:rgba(255,0,110,.35) !important; }
    .glass-cyan  { border-color:rgba(0,217,255,.25) !important; background:rgba(0,217,255,.03) !important; }
    .grid-bg {
      background-image:linear-gradient(rgba(255,0,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,110,.04) 1px,transparent 1px);
      background-size:42px 42px;
    }
    .btn { font-family:'Rajdhani',sans-serif; font-weight:700; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; border-radius:.75rem; padding:.6rem 1.4rem; transition:all .2s; font-size:1rem; }
    .btn-primary { background:linear-gradient(135deg,var(--pink),#9333ea); color:#fff; }
    .btn-primary:hover { filter:brightness(1.12); transform:translateY(-1px); box-shadow:0 0 22px rgba(255,0,110,.45); }
    .btn-cyan    { background:linear-gradient(135deg,#0891b2,var(--cyan)); color:#000; }
    .btn-cyan:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn-outline { background:transparent; border:1px solid rgba(255,0,110,.5); color:var(--pink); }
    .btn-outline:hover { background:rgba(255,0,110,.1); border-color:var(--pink); }
    .btn-ghost   { background:transparent; border:1px solid rgba(51,65,85,.6); color:#94a3b8; }
    .btn-ghost:hover { border-color:#94a3b8; color:#e2e8f0; }
    .btn-danger  { background:transparent; border:1px solid rgba(239,68,68,.4); color:#f87171; }
    .btn-danger:hover { background:rgba(239,68,68,.1); }
    .btn-green   { background:linear-gradient(135deg,#16a34a,#4ade80); color:#000; font-weight:700; }
    .btn-green:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .input-field { width:100%; background:rgba(2,6,23,.85); border:1px solid #1e293b; color:#e2e8f0; padding:.65rem 1rem; border-radius:.75rem; outline:none; font-family:'Rajdhani',sans-serif; font-size:1rem; transition:border-color .2s,box-shadow .2s; }
    .input-field:focus { border-color:var(--pink); box-shadow:0 0 0 3px rgba(255,0,110,.15); }
    .input-field::placeholder { color:#475569; }

    .upload-zone { border:2px dashed rgba(255,0,110,.3); border-radius:1rem; padding:1.2rem; text-align:center; cursor:pointer; transition:all .2s; background:rgba(255,0,110,.03); }
    .upload-zone:hover,.upload-zone.drag-over { border-color:var(--pink); background:rgba(255,0,110,.09); }
    .prog-track { width:100%; height:8px; background:#1e293b; border-radius:99px; overflow:hidden; }
    .prog-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--pink),var(--cyan)); transition:width .45s ease; }
    .log-box { background:#020617; border:1px solid #1e293b; border-radius:.75rem; padding:.75rem; font-family:'JetBrains Mono',monospace; font-size:.68rem; color:#64748b; overflow-y:auto; height:280px; line-height:1.6; }
    .log-ok   { color:#4ade80; } .log-warn { color:#facc15; } .log-err { color:#f87171; } .log-info { color:#38bdf8; } .log-pink { color:#f472b6; }
    .toast { position:fixed; bottom:2rem; right:1.5rem; z-index:9999; padding:.85rem 1.4rem; border-radius:1rem; backdrop-filter:blur(14px); animation:slideUp .3s ease; display:flex; align-items:center; gap:.6rem; max-width:400px; font-weight:700; font-size:.9rem; }
    .toast-success { background:rgba(15,23,42,.97); border:1px solid #4ade80; color:#4ade80; }
    .toast-error   { background:rgba(15,23,42,.97); border:1px solid #f87171; color:#f87171; }
    .toast-info    { background:rgba(15,23,42,.97); border:1px solid #38bdf8; color:#38bdf8; }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .badge { display:inline-flex; align-items:center; padding:.15rem .6rem; border-radius:99px; font-size:.68rem; font-weight:700; letter-spacing:.05em; }
    .b-pink  { background:rgba(255,0,110,.15); color:#ff6eb4; border:1px solid rgba(255,0,110,.3); }
    .b-green { background:rgba(74,222,128,.12); color:#4ade80; border:1px solid rgba(74,222,128,.3); }
    .b-cyan  { background:rgba(0,217,255,.12); color:#00d9ff; border:1px solid rgba(0,217,255,.3); }
    .app-card { transition:border-color .2s,box-shadow .2s,transform .15s; cursor:pointer; }
    .app-card:hover { border-color:rgba(255,0,110,.55)!important; box-shadow:0 0 24px rgba(255,0,110,.14); transform:translateY(-2px); }
    .icon-default { background:linear-gradient(135deg,#1e1b4b,#4c1d95); display:flex; align-items:center; justify-content:center; font-size:1.4rem; border-radius:.75rem; flex-shrink:0; }

    .install-highlight { border:2px solid rgba(0,217,255,.35); background:rgba(0,217,255,.04); border-radius:1rem; padding:1.25rem; }
    .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,0,110,.4),rgba(0,217,255,.4),transparent); margin:1.5rem 0; }
    @keyframes pulse-dot { 0%,100%{opacity:.5}50%{opacity:1} }
    .pulse { animation:pulse-dot 1.2s infinite; }

</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">
<div id="app-root" class="flex flex-col min-h-screen"></div>

<script>
'use strict';

// ================================================================
//  ConvertAPK — Instala qualquer site como PWA nativo
//  CORREÇÃO CENTRAL: installAppAsPWA() gera HTML self-contained
//  Os blob URLs de manifest e SW são criados DENTRO da nova aba
//  (não herdados da janela pai), resolvendo o problema cross-origin.
// ================================================================

// ── Bootstrap PWA do próprio ConvertAPK ──────────────────────────
(function(){
  // Manifest
  var mData = JSON.stringify({name:'ConvertAPK',short_name:'ConvertAPK',start_url:'/',display:'standalone',theme_color:'#FF006E',background_color:'#020617',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FF006E'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E",sizes:'any',type:'image/svg+xml'}]});
  var mBlob = new Blob([mData],{type:'application/manifest+json'});
  var mUrl  = URL.createObjectURL(mBlob);
  var link  = document.createElement('link'); link.rel='manifest'; link.href=mUrl; document.head.appendChild(link);
  if('serviceWorker' in navigator){
    var sw="self.addEventListener('install',function(e){e.waitUntil(caches.open('ca-v1').then(function(c){return c.addAll(['/']);}));});self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});";
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
  }
})();

// ── Estado ───────────────────────────────────────────────────────
var user=null, apps=[], toastQueue=[], currentToast=null;
var editModalAppId=null, showInstallGuide=false;
var deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredInstallPrompt=e; });

// ── Storage ──────────────────────────────────────────────────────
function loadStorage(){
  try{ user=JSON.parse(localStorage.getItem('ca_user')||'null'); apps=JSON.parse(localStorage.getItem('ca_apps')||'[]'); }catch(e){ apps=[]; }
  if(!apps.length) apps=[{id:1,userId:1,name:'TechNews Brasil',description:'Portal de notícias de tecnologia.',websiteUrl:'https://technews.com.br',packageName:'com.convertapk.technews',version:'1.0.0',themeColor:'#FF006E',orientation:'portrait',permissions:['INTERNET'],offlineSupport:true,deepLinking:false,analyticsEnabled:true,iconUrl:'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=100&q=80',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}];
}
function persist(){ try{ localStorage.setItem('ca_user',JSON.stringify(user)); localStorage.setItem('ca_apps',JSON.stringify(apps)); }catch(e){} }

// ── Router ───────────────────────────────────────────────────────
function getRoute(){ return window.location.hash.slice(1)||'/'; }
function navigate(r){ window.location.hash=r; rerender(); }
window.navigate=navigate;

// ── Toast ────────────────────────────────────────────────────────
function toast(msg,type){ type=type||'success'; toastQueue.push({msg:msg,type:type}); if(!currentToast) nextToast(); }
function nextToast(){ if(!toastQueue.length){ currentToast=null; rerender(); return; } currentToast=toastQueue.shift(); rerender(); setTimeout(nextToast,3200); }
window.toast=toast;

// ── Helpers ──────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){ return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function fmtDate(s){ try{ return new Date(s).toLocaleDateString('pt-BR'); }catch(e){ return ''; } }
function fileToB64(f){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){ res(r.result); }; r.onerror=rej; r.readAsDataURL(f); }); }
function validImg(f){ if(!f.type.match(/^image\/(jpeg|png|gif|webp)$/)){ toast('Apenas JPG/PNG/GIF/WEBP','error'); return false; } if(f.size>2097152){ toast('Máx 2MB','error'); return false; } return true; }
function iconHtml(url,sz){
  sz=sz||48;
  var st='width:'+sz+'px;height:'+sz+'px;border-radius:.75rem;object-fit:cover;flex-shrink:0;display:block;';
  if(url&&url!=='[base64-image]') return '<img src="'+esc(url)+'" style="'+st+'" onerror="this.outerHTML=\'<div class=icon-default style=width:'+sz+'px;height:'+sz+'px;>&#128241;</div>\'">';
  return '<div class="icon-default" style="width:'+sz+'px;height:'+sz+'px;">&#128241;</div>';
}

// ── Auth ─────────────────────────────────────────────────────────
window.handleLogin=function(){ user={id:1,name:'Cyber Dev',email:'dev@convertapk.com',role:'free'}; persist(); toast('Bem-vindo, Cyber Dev!'); navigate('/dashboard'); };
window.handleLogout=function(){ user=null; persist(); toast('Desconectado','info'); navigate('/'); };
window.handleUpgrade=function(tier){ if(!user) user={id:1,name:'Cyber Dev',email:'dev@convertapk.com',role:tier}; else user.role=tier; persist(); toast('Plano '+tier.toUpperCase()+' ativado! 🚀'); navigate('/dashboard'); };

// ── CRUD ─────────────────────────────────────────────────────────
window.createApp=function(data){ var a=Object.assign({},data,{id:Date.now(),userId:user?user.id:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}); apps=[a].concat(apps); persist(); toast('"'+a.name+'" criado! ✨'); navigate('/dashboard'); };
window.updateApp=function(id,data){ apps=apps.map(function(a){ return a.id===id?Object.assign({},a,data,{updatedAt:new Date().toISOString()}):a; }); persist(); toast('App atualizado!'); rerender(); };
window.deleteApp=function(id){ var n=(apps.find(function(a){ return a.id===id; })||{}).name||'App'; apps=apps.filter(function(a){ return a.id!==id; }); persist(); toast('"'+n+'" removido','info'); navigate('/dashboard'); };

// ================================================================
//  installAppAsPWA — CORREÇÃO PRINCIPAL
//
//  PROBLEMA ORIGINAL:
//    O HTML gerado referenciava blob: URLs criadas na janela PAI
//    (manifest blob URL, SW blob URL). Quando abre em nova aba,
//    essas blob URLs são cross-origin e inacessíveis — o manifest
//    não carrega, o SW não registra, portanto não há instalação.
//
//  SOLUÇÃO:
//    O HTML gerado é 100% self-contained. Ele contém um <script>
//    que roda NO CONTEXTO DA NOVA ABA e cria SEUS PRÓPRIOS blob
//    URLs para manifest e SW ali mesmo. Sem herança cross-origin.
//
//  FLUXO:
//    1. Gera string HTML com manifest e SW codificados como JSON
//       literal e template string escapados.
//    2. Abre via blob URL (que funciona para o HTML inicial).
//    3. Dentro da nova aba, o script cria novos blob URLs locais.
//    4. beforeinstallprompt dispara naquela aba → botão Instalar.
//    5. Fallback: instruções manuais se o prompt não aparecer.
// ================================================================
window.installAppAsPWA = function(app) {
  if (!app) { toast('App não encontrado','error'); return; }

  var name    = app.name       || 'Meu App';
  var url     = app.websiteUrl || '';
  var color   = app.themeColor || '#FF006E';
  var version = app.version    || '1.0.0';
  var desc    = app.description|| '';
  var short   = name.substring(0,12);
  var orient  = app.orientation|| 'portrait';

  if (!url) { toast('URL do app não configurada','error'); return; }

  // Ícone — base64 ou URL externa; fallback SVG inline
  var defIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23FF006E'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white'%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E";
  var icon = (app.iconUrl && app.iconUrl !== '[base64-image]') ? app.iconUrl : defIcon;
  var iconType = icon.startsWith('data:image/png') ? 'image/png'
               : icon.startsWith('data:image/jpeg') ? 'image/jpeg'
               : icon.startsWith('data:image/gif')  ? 'image/gif'
               : icon.startsWith('data:image/webp') ? 'image/webp'
               : 'image/svg+xml';

  // Manifest como objeto JS — será JSON.stringify'd e embutido no HTML
  var manifestObj = {
    name: name, short_name: short, description: desc,
    start_url: './', display: 'standalone',
    orientation: orient, theme_color: color,
    background_color: '#020617',
    icons: [
      { src: icon, sizes: '512x512', type: iconType, purpose: 'any maskable' },
      { src: icon, sizes: '192x192', type: iconType, purpose: 'any' }
    ]
  };

  // Service Worker — faz cache da URL do app
  var swCode = [
    "var CACHE='"+name.replace(/'/g,"\\'")+"--v"+version+"';",
    "var APP='"+url.replace(/'/g,"\\'")+"';",
    "self.addEventListener('install',function(e){",
    "  e.waitUntil(caches.open(CACHE).then(function(c){",
    "    return c.add(APP).catch(function(){});",
    "  }));",
    "  self.skipWaiting();",
    "});",
    "self.addEventListener('activate',function(e){",
    "  e.waitUntil(clients.claim());",
    "});",
    "self.addEventListener('fetch',function(e){",
    "  e.respondWith(caches.match(e.request).then(function(r){",
    "    return r||fetch(e.request);",
    "  }));",
    "});"
  ].join('\n');

  // Serializa para embedding seguro — escapamos backtick e backslash
  var manifestJSON = JSON.stringify(manifestObj)
    .replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  var swEscaped = swCode
    .replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');

  // Ícone para img tag — só escapa aspas duplas
  var iconForImg = icon.replace(/"/g,'&quot;');

  // ── HTML gerado — self-contained ────────────────────────────
  var html = '<!DOCTYPE html>\n'
    + '<html lang="pt">\n'
    + '<head>\n'
    + '<meta charset="UTF-8">\n'
    + '<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">\n'
    + '<meta name="mobile-web-app-capable" content="yes">\n'
    + '<meta name="apple-mobile-web-app-capable" content="yes">\n'
    + '<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n'
    + '<meta name="apple-mobile-web-app-title" content="'+name.replace(/"/g,'&quot;')+'">\n'
    + '<meta name="theme-color" content="'+color+'">\n'
    + '<title>'+name.replace(/</g,'&lt;')+'</title>\n'
    + '<style>\n'
    + '*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}\n'
    + 'html,body{width:100%;height:100%;overflow:hidden;background:#000}\n'
    + '#frame{position:fixed;inset:0;width:100%;height:100%;border:none}\n'
    + '#bar{\n'
    + '  position:fixed;top:0;left:0;right:0;z-index:9999;\n'
    + '  background:linear-gradient(135deg,'+color+',#7C3AED);\n'
    + '  padding:.6rem 1rem;display:flex;align-items:center;gap:.7rem;\n'
    + '  font-family:system-ui,sans-serif;font-size:.85rem;color:#fff;\n'
    + '  box-shadow:0 2px 16px rgba(0,0,0,.4);\n'
    + '  transform:translateY(0);transition:transform .35s ease;\n'
    + '}\n'
    + '#bar.hidden{transform:translateY(-110%)}\n'
    + '#bar .ic{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0}\n'
    + '#bar .info{flex:1;line-height:1.3;min-width:0}\n'
    + '#bar .app-n{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n'
    + '#bar .app-u{font-size:.7rem;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n'
    + '#bar .bi{background:#fff;color:'+color+';font-weight:700;border:none;padding:.38rem .85rem;border-radius:.5rem;cursor:pointer;font-size:.78rem;white-space:nowrap;flex-shrink:0}\n'
    + '#bar .bc{background:none;border:none;color:rgba(255,255,255,.7);font-size:1.2rem;cursor:pointer;flex-shrink:0;line-height:1}\n'
    + '#modal{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center}\n'
    + '#modal.on{display:flex}\n'
    + '.mbox{background:#0f172a;border:1px solid '+color+';border-radius:1.25rem;padding:1.5rem;max-width:400px;width:90%;color:#e2e8f0;font-family:system-ui,sans-serif}\n'
    + '.mbox h3{font-size:1rem;font-weight:700;margin:0 0 .75rem}\n'
    + '.mbox p{font-size:.82rem;color:#94a3b8;margin-bottom:.75rem}\n'
    + '.mbox ul{list-style:none;display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}\n'
    + '.mbox li{display:flex;gap:.5rem;align-items:flex-start;font-size:.8rem;background:rgba(255,255,255,.04);border-radius:.5rem;padding:.45rem .7rem}\n'
    + '.mbox .step{font-weight:700;color:'+color+';flex-shrink:0}\n'
    + '.mbox .cb{background:linear-gradient(135deg,'+color+',#9333ea);color:#fff;border:none;padding:.55rem 1.2rem;border-radius:.65rem;cursor:pointer;font-weight:700;font-size:.88rem;width:100%}\n'
    + '#st{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.96);border:1px solid #4ade80;color:#4ade80;font-family:system-ui,sans-serif;font-size:.75rem;padding:.45rem 1rem;border-radius:99px;display:none;z-index:9999;white-space:nowrap}\n'
    + '</style>\n'
    + '</head>\n'
    + '<body>\n'
    + '<iframe id="frame" src="'+url.replace(/"/g,'&quot;')+'" allow="accelerometer;autoplay;camera;fullscreen;geolocation;gyroscope;microphone;payment;usb" allowfullscreen sandbox="allow-downloads allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-same-origin allow-scripts allow-top-navigation"></iframe>\n'
    + '<div id="bar">\n'
    + '  <img class="ic" src="'+iconForImg+'" alt="" onerror="this.style.display=\'none\'">\n'
    + '  <div class="info"><div class="app-n">'+name.replace(/</g,'&lt;')+'</div><div class="app-u">'+url.replace(/</g,'&lt;')+'</div></div>\n'
    + '  <button class="bi" id="btnI">&#128242; Instalar</button>\n'
    + '  <button class="bc" id="btnC" title="Fechar">&#10005;</button>\n'
    + '</div>\n'
    + '<div id="modal">\n'
    + '  <div class="mbox">\n'
    + '    <h3>&#128242; Instalar '+name.replace(/</g,'&lt;')+'</h3>\n'
    + '    <p>Escolha a instrução para seu dispositivo:</p>\n'
    + '    <ul>\n'
    + '      <li><span class="step">Android Chrome</span><span>Menu &#8942; &rarr; "Adicionar &agrave; tela inicial" ou "Instalar app"</span></li>\n'
    + '      <li><span class="step">Samsung Internet</span><span>Menu &#8801; &rarr; "Adicionar p&aacute;gina &agrave; tela inicial"</span></li>\n'
    + '      <li><span class="step">iOS Safari</span><span>Compartilhar &#8679; &rarr; "Adicionar &agrave; Tela de In&iacute;cio"</span></li>\n'
    + '      <li><span class="step">Desktop Chrome</span><span>&Iacute;cone &#8853; na barra de endere&ccedil;os &rarr; Instalar</span></li>\n'
    + '    </ul>\n'
    + '    <button class="cb" onclick="document.getElementById(\'modal\').classList.remove(\'on\')">Entendi &#10003;</button>\n'
    + '  </div>\n'
    + '</div>\n'
    + '<div id="st"></div>\n'
    + '<script>\n'
    + '(function(){\n'
    + '  // 1) Manifest — criado AQUI, nesta aba (sem herança cross-origin)\n'
    + '  var mJson = `'+manifestJSON+'`;\n'
    + '  var mBlob = new Blob([mJson],{type:"application/manifest+json"});\n'
    + '  var mUrl  = URL.createObjectURL(mBlob);\n'
    + '  var mLink = document.createElement("link");\n'
    + '  mLink.rel="manifest"; mLink.href=mUrl;\n'
    + '  document.head.appendChild(mLink);\n'
    + '\n'
    + '  // 2) Service Worker — criado AQUI, nesta aba\n'
    + '  if("serviceWorker" in navigator){\n'
    + '    var swSrc = `'+swEscaped+'`;\n'
    + '    var swBlob = new Blob([swSrc],{type:"application/javascript"});\n'
    + '    var swUrl  = URL.createObjectURL(swBlob);\n'
    + '    navigator.serviceWorker.register(swUrl).then(function(){\n'
    + '      showSt("&#10003; Service Worker ativo — app funciona offline");\n'
    + '    }).catch(function(){ /* Firefox bloqueia blob SW */ });\n'
    + '  }\n'
    + '\n'
    + '  // 3) Lógica de instalação\n'
    + '  var dPrm=null;\n'
    + '  var bar=document.getElementById("bar");\n'
    + '  var btnI=document.getElementById("btnI");\n'
    + '  var btnC=document.getElementById("btnC");\n'
    + '  var modal=document.getElementById("modal");\n'
    + '\n'
    + '  window.addEventListener("beforeinstallprompt",function(e){\n'
    + '    e.preventDefault(); dPrm=e;\n'
    + '    btnI.textContent="&#11015;&#65039; Instalar Agora";\n'
    + '  });\n'
    + '\n'
    + '  btnI.addEventListener("click",function(){\n'
    + '    if(dPrm){\n'
    + '      dPrm.prompt();\n'
    + '      dPrm.userChoice.then(function(c){\n'
    + '        if(c.outcome==="accepted"){ bar.classList.add("hidden"); showSt("&#127881; App instalado!"); }\n'
    + '        dPrm=null;\n'
    + '      });\n'
    + '    } else {\n'
    + '      modal.classList.add("on");\n'
    + '    }\n'
    + '  });\n'
    + '\n'
    + '  btnC.addEventListener("click",function(){ bar.classList.add("hidden"); });\n'
    + '\n'
    + '  window.addEventListener("appinstalled",function(){\n'
    + '    bar.classList.add("hidden"); showSt("&#127881; '+name.replace(/'/g,"\\'")+' instalado!");\n'
    + '  });\n'
    + '\n'
    + '  // 4) Ajuste do iframe abaixo da barra\n'
    + '  var frame=document.getElementById("frame");\n'
    + '  var barH=document.getElementById("bar").offsetHeight||52;\n'
    + '  frame.style.top=barH+"px";\n'
    + '  frame.style.height="calc(100% - "+barH+"px)";\n'
    + '  document.getElementById("bar").addEventListener("transitionend",function(){\n'
    + '    if(bar.classList.contains("hidden")){ frame.style.top="0"; frame.style.height="100%"; }\n'
    + '  });\n'
    + '\n'
    + '  // 5) Status helper\n'
    + '  var stEl=document.getElementById("st");\n'
    + '  function showSt(msg){ stEl.innerHTML=msg; stEl.style.display="block"; setTimeout(function(){ stEl.style.display="none"; },4000); }\n'
    + '})();\n'
    + '<\/script>\n'
    + '</body>\n'
    + '</html>';

  // Abre em nova aba via blob URL
  var blob = new Blob([html],{type:'text/html;charset=utf-8'});
  var bUrl = URL.createObjectURL(blob);
  var tab  = window.open(bUrl,'_blank');

  if (tab) {
    toast('"'+name+'" aberto! Toque em "Instalar" na barra no topo da nova aba.','success');
    setTimeout(function(){ URL.revokeObjectURL(bUrl); }, 12000);
  } else {
    URL.revokeObjectURL(bUrl);
    // Fallback: download do HTML
    var dl=document.createElement('a');
    dl.href=URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'}));
    dl.download=name.replace(/[^a-zA-Z0-9_-]/g,'_')+'.html';
    document.body.appendChild(dl); dl.click(); setTimeout(function(){ document.body.removeChild(dl); },500);
    toast('Pop-ups bloqueados. HTML baixado — abra no Chrome para instalar.','info');
  }
};

window.startBuild = function(appId){
  var app=apps.find(function(a){ return a.id===appId; });
  if(!app) return;
  var pre=document.getElementById('buildPreChecks');
  var prog=document.getElementById('buildProgress');
  var result=document.getElementById('buildResult');
  var logs=document.getElementById('buildLogs');
  var bar=document.getElementById('buildProgressBar');
  var pct=document.getElementById('buildPct');
  var phase=document.getElementById('buildPhaseLabel');
  var dot=document.getElementById('consoleStatusDot');
  if(pre) pre.style.display='none';
  if(prog) prog.style.display='block';
  if(dot){ dot.style.background='#facc15'; dot.classList.add('pulse'); }
  function log(msg,cls){ if(!logs) return; logs.innerHTML+='\n<span class="'+(cls||'')+'">['+new Date().toLocaleTimeString()+'] '+msg+'</span>'; logs.scrollTop=logs.scrollHeight; }
  log('Iniciando simulação: '+app.name,'log-pink');
  log('URL: '+app.websiteUrl,'log-info');
  var phases=[
    {l:'Preparando ambiente',p:12},{l:'Validando URL',p:25},
    {l:'Compilando WebView wrapper',p:40},{l:'Empacotando assets',p:55},
    {l:'Gerando manifesto PWA',p:68},{l:'Configurando Service Worker',p:80},
    {l:'Assinatura digital',p:91},{l:'Finalizando',p:100}
  ];
  var i=0;
  function run(){
    if(i>=phases.length){
      if(dot){ dot.style.background='#4ade80'; dot.classList.remove('pulse'); }
      log('Simulação concluída! Clique em "Instalar" abaixo.','log-ok');
      if(result){
        result.style.display='block';
        result.innerHTML='<div class="install-highlight" style="margin-top:1rem;">'
          +'<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;">'
          +'<span style="font-size:1.8rem;">🎉</span>'
          +'<div><div style="color:#4ade80;font-weight:700;">Simulação concluída!</div>'
          +'<div style="font-size:.8rem;color:#64748b;">'+esc(app.name)+' · v'+esc(app.version)+'</div></div></div>'
          +'<p style="font-size:.82rem;color:#94a3b8;margin-bottom:1rem;">Uma nova aba abrirá com seu app carregado. Uma barra azul aparece no topo com o botão <strong style="color:#00d9ff;">Instalar</strong>. Toque nele para adicionar à tela inicial.</p>'
          +'<button class="btn btn-green" onclick="installAppAsPWA(apps.find(function(a){return a.id==='+appId+'}))" style="width:100%;justify-content:center;">📲 Instalar "'+esc(app.name)+'" no Celular</button>'
          +'<div style="margin-top:.6rem;display:flex;gap:.5rem;">'
          +'<button class="btn btn-ghost" onclick="navigate(\'/app/'+appId+'\')" style="flex:1;justify-content:center;font-size:.82rem;">Ver Detalhes</button>'
          +'</div></div>';
      }
      return;
    }
    var p=phases[i];
    if(bar) bar.style.width=p.p+'%';
    if(pct) pct.textContent=p.p+'%';
    if(phase) phase.textContent=p.l;
    log('['+p.l+']...');
    i++;
    setTimeout(run,480);
  }
  setTimeout(run,150);
};

        +'<div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem;font-size:.85rem;">'
        +p.features.map(function(f){ return '<div style="display:flex;align-items:center;gap:.4rem;"><span style="color:#4ade80;">✓</span>'+f+'</div>'; }).join('')
        +p.missing.map(function(f){ return '<div style="display:flex;align-items:center;gap:.4rem;color:#475569;"><span>✗</span>'+f+'</div>'; }).join('')
        +'</div>'
        +'<button class="btn '+(p.popular?'btn-primary':'btn-outline')+'" onclick="'+p.action+'" style="width:100%;justify-content:center;'+(p.popular?'':'border-color:'+p.color+';color:'+p.color+';')+'">'+p.cta+'</button>'
        +'</div>';
    }).join('')
    +'</div></div>';
}

// ── Main rerender ─────────────────────────────────────────────────
function rerender(){
  var root=document.getElementById('app-root');
  if(!root) return;
  var route=getRoute();
  var main='';
  if(!user&&route!=='/'&&route!=='/pricing') main=renderLanding();
  else if(route==='/') main=renderLanding();
  else if(route==='/dashboard') main=renderDashboard();
  else if(route==='/create-app') main=renderCreateApp();
  else if(route==='/pricing') main=renderPricing();
  else if(/^\/app\/\d+$/.test(route)) main=renderAppDetails(parseInt(route.split('/')[2]));
  else if(/^\/build\/\d+$/.test(route)) main=renderBuildPage(parseInt(route.split('/')[2]));
  else main=renderLanding();
  root.innerHTML=renderNavbar()+'<main style="flex:1;">'+main+'</main>'+renderFooter()+renderToast()+renderEditModal()+renderInstallGuide();
}
window.rerender=rerender;
window.addEventListener('hashchange',rerender);
loadStorage();
rerender();
</script>
</body>
</html>
