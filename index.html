    // ==================== ZIP/APK GENERATOR (CRC32 + ZIP STRUCTURE) ====================
    const crcTable = new Uint32Array(256);
    for (let n = 0; n < 256; n += 1) {
      let c = n;
      for (let k = 0; k < 8; k += 1) {
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      crcTable[n] = c >>> 0;
    }

    const crc32 = (data) => {
      let crc = 0xffffffff;
      for (const byte of data) {
        crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      }
      return (crc ^ 0xffffffff) >>> 0;
    };

    const concatLength = (parts) => parts.reduce((total, part) => total + part.length, 0);

    const createApkLikeBlob = (appName, version, packageName = "com.web2apk.generated", themeColor = "#FF006E") => {
      const encoder = new TextEncoder();
      const timestamp = new Date().toISOString();
      
      const files = [
        {
          name: 'AndroidManifest.xml',
          data: encoder.encode(
            `<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="${packageName}" android:versionCode="1" android:versionName="${version}">\n    <application android:label="${appName}" android:theme="@style/Theme.Web2APK" android:icon="@mipmap/ic_launcher" android:allowBackup="true">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>`
          )
        },
        {
          name: 'assets/web2apk-build-info.txt',
          data: encoder.encode(
            `WEB2APK CYBER PLATFORM - BUILD RESULT\n=========================================\nApp Name: ${appName}\nVersion: ${version}\nPackage: ${packageName}\nTheme Color: ${themeColor}\nBuild Date: ${timestamp}\nTarget SDK: 34 (Android 14+)\nStatus: SUCCESSFUL (Signed Release)\nEngine: Cyber Compiler v4.2\n\nEste arquivo ZIP contém a estrutura simulada de um APK Android.\nEm produção, seria um aplicativo totalmente funcional.`
          )
        },
        {
          name: 'META-INF/MANIFEST.MF',
          data: encoder.encode(`Manifest-Version: 1.0\nCreated-By: Web2APK Cyber Engine v4.2\nBuild-Time: ${timestamp}\nApp-Name: ${appName}\n`)
        },
        {
          name: 'res/values/colors.xml',
          data: encoder.encode(`<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="colorPrimary">${themeColor}</color>\n    <color name="colorPrimaryDark">${themeColor}</color>\n    <color name="colorAccent">#06D9FF</color>\n</resources>`)
        }
      ];

      const localParts = [];
      const centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const checksum = crc32(file.data);
        const localHeader = new Uint8Array(30);
        const localView = new DataView(localHeader.buffer);

        localView.setUint32(0, 0x04034b50, true);
        localView.setUint16(4, 20, true);
        localView.setUint16(6, 0, true);
        localView.setUint16(8, 0, true);
        localView.setUint16(10, 0, true);
        localView.setUint16(12, 0, true);
        localView.setUint32(14, checksum, true);
        localView.setUint32(18, file.data.length, true);
        localView.setUint32(22, file.data.length, true);
        localView.setUint16(26, nameBytes.length, true);
        localView.setUint16(28, 0, true);

        localParts.push(localHeader, nameBytes, file.data);

        const centralHeader = new Uint8Array(46);
        const centralView = new DataView(centralHeader.buffer);

        centralView.setUint32(0, 0x02014b50, true);
        centralView.setUint16(4, 20, true);
        centralView.setUint16(6, 20, true);
        centralView.setUint16(8, 0, true);
        centralView.setUint16(10, 0, true);
        centralView.setUint16(12, 0, true);
        centralView.setUint16(14, 0, true);
        centralView.setUint32(16, checksum, true);
        centralView.setUint32(20, file.data.length, true);
        centralView.setUint32(24, file.data.length, true);
        centralView.setUint16(28, nameBytes.length, true);
        centralView.setUint16(30, 0, true);
        centralView.setUint16(32, 0, true);
        centralView.setUint16(34, 0, true);
        centralView.setUint16(36, 0, true);
        centralView.setUint32(38, 0, true);
        centralView.setUint32(42, offset, true);

        centralParts.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + file.data.length;
      }

      const centralOffset = offset;
      const centralSize = concatLength(centralParts);
      const endHeader = new Uint8Array(22);
      const endView = new DataView(endHeader.buffer);

      endView.setUint32(0, 0x06054b50, true);
      endView.setUint16(4, 0, true);
      endView.setUint16(6, 0, true);
      endView.setUint16(8, files.length, true);
      endView.setUint16(10, files.length, true);
      endView.setUint32(12, centralSize, true);
      endView.setUint32(16, centralOffset, true);
      endView.setUint16(20, 0, true);

      const blobParts = [...localParts, ...centralParts, endHeader].map((part) => new Uint8Array(part));
      return new Blob(blobParts, { type: 'application/zip' });
    };

      </nav>
    );
    const Footer = () => (<footer className="border-t border-pink-500/10 bg-slate-950/40 mt-auto py-10 text-center text-slate-500 text-xs">© 2026 Web2APK Cyber Platform</footer>);
    const LandingPage = ({onLogin,onNavigate}) => (<div className="container mx-auto px-6 py-20 text-center"><h1 className="text-5xl font-black">Transforme Sites em Apps</h1><button onClick={onLogin} className="mt-8 px-8 py-4 bg-pink-600 rounded-xl">Começar Grátis</button></div>);
    const DashboardPage = ({apps,onNavigate,onDeleteApp}) => (<div className="container mx-auto px-6 py-12"><h2 className="text-2xl font-bold">Dashboard</h2>{apps.map(app=><div key={app.id} className="bg-slate-900 p-4 my-2 rounded-xl">{app.name}</div>)}<button onClick={()=>onNavigate('/create-app')} className="mt-4 px-6 py-3 bg-pink-600 rounded-xl">Novo App</button></div>);
    const CreateAppPage = ({onCreateApp,onNavigate}) => (<div className="container mx-auto px-6 py-12"><h2>Criar App</h2><form onSubmit={(e)=>{e.preventDefault();onCreateApp({name:"Novo App",websiteUrl:"https://exemplo.com",packageName:"com.app.exemplo",version:"1.0",themeColor:"#FF006E",orientation:"portrait",permissions:["INTERNET"],offlineSupport:false,deepLinking:false,analyticsEnabled:false});}}><button type="submit">Criar</button></form></div>);
    const AppDetailsPage = ({app,onDownloadMockApk}) => (<div className="container mx-auto px-6 py-12"><h2>{app.name}</h2><button onClick={()=>onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor)} className="px-6 py-3 bg-cyan-600 rounded-xl">Baixar APK (ZIP)</button></div>);
    const BuildAPKPage = ({app,onDownloadMockApk}) => (<div className="container mx-auto px-6 py-12"><h2>Build: {app.name}</h2><button onClick={()=>onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor)} className="px-6 py-3 bg-green-600 rounded-xl">Baixar APK Gerado</button></div>);
    const PremiumPage = ({onUpgrade}) => (<div className="container mx-auto px-6 py-12"><h2>Planos</h2><button onClick={()=>onUpgrade('premium')}>Ativar Premium</button></div>);
    
    // Main App Component with ZIP Download logic using createApkLikeBlob
    function App() {
      const [user,setUser]=useState(null);
      const [apps,setApps]=useState(INITIAL_APPS);
      const [builds,setBuilds]=useState(INITIAL_BUILDS);
      const [route,setRoute]=useState(window.location.hash.slice(1)||'/');
      const [toast,setToast]=useState(null);
      const [downloadBlob,setDownloadBlob]=useState(null);
      
      useEffect(()=>{const handle=()=>setRoute(window.location.hash.slice(1)||'/');window.addEventListener('hashchange',handle);return()=>window.removeEventListener('hashchange',handle);},[]);
      const nav=(r)=>{window.location.hash=r;setRoute(r);};
      const showMsg=(msg)=>setToast(msg)||setTimeout(()=>setToast(null),3000);
      const login=()=>{setUser({id:1,name:"Cyber Dev"});showMsg("Conectado");nav('/dashboard');};
      const logout=()=>{setUser(null);nav('/');};
      const createApp=(data)=>{const newApp={...data,id:Date.now(),userId:1,createdAt:new Date().toISOString()};setApps([newApp,...apps]);showMsg("App criado");nav('/dashboard');};
      const deleteApp=(id)=>{setApps(apps.filter(a=>a.id!==id));showMsg("App removido");};
      const updateApp=(id,data)=>{setApps(apps.map(a=>a.id===id?{...a,...data,updatedAt:new Date().toISOString()}:a));};
      const addBuild=(nb)=>setBuilds(prev=>[nb,...prev]);
      const upgrade=(tier)=>{if(!user)setUser({id:1,name:"Cyber Dev",role:tier});else setUser({...user,role:tier});showMsg(`Plano ${tier} ativado`);nav('/dashboard');};
      
      const handleDownloadApk = (appName, version, packageName = "com.web2apk.generated", themeColor = "#FF006E") => {
        const cleaned = appName.replace(/[^a-zA-Z0-9]/g, '_') || 'app';
        const filename = `${cleaned}-v${version}.zip`;
        const blob = createApkLikeBlob(appName, version, packageName, themeColor);
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        link.click();
        setTimeout(()=>URL.revokeObjectURL(url),100);
        showMsg(`Download iniciado: ${filename}`);
      };
      
      let content;
      if(route==='/') content=<LandingPage onLogin={login} onNavigate={nav}/>;
      else if(route==='/pricing') content=<PremiumPage onUpgrade={upgrade}/>;
      else if(!user && (route.startsWith('/dashboard')||route.startsWith('/create-app')||route.startsWith('/app/')||route.startsWith('/build/'))) content=<LandingPage onLogin={login} onNavigate={nav}/>;
      else if(route==='/dashboard') content=<DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;
      else if(route==='/create-app') content=<CreateAppPage onCreateApp={createApp} onNavigate={nav}/>;
      else if(route.startsWith('/app/')){const id=parseInt(route.split('/')[2]);const app=apps.find(a=>a.id===id);if(!app)content=<DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;else content=<AppDetailsPage app={app} builds={builds} onNavigate={nav} onUpdateApp={updateApp} onDeleteApp={deleteApp} onDownloadMockApk={handleDownloadApk}/>;}
      else if(route.startsWith('/build/')){const id=parseInt(route.split('/')[2]);const app=apps.find(a=>a.id===id);if(!app)content=<DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;else content=<BuildAPKPage app={app} onNavigate={nav} onAddBuild={addBuild} onDownloadMockApk={handleDownloadApk}/>;}
      else content=<LandingPage onLogin={login} onNavigate={nav}/>;
      
      return (<div className="flex flex-col min-h-screen bg-slate-950 text-slate-100">
        <Navbar user={user} onNavigate={nav} onLogin={login} onLogout={logout}/>
        <main className="flex-1">{content}</main>
        {toast&&<div className="fixed bottom-6 right-6 bg-slate-900 border border-pink-500 rounded-2xl px-5 py-3 z-50 toast-slide">{toast}</div>}
        <Footer/>
      </div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
