                  <div className="flex gap-4">
                    <button onClick={()=>onDownloadMockApk(app.name,app.version)} className="flex-1 py-4 bg-gradient-to-r from-green-600 to-cyan-500 text-slate-950 font-black tracking-wider text-sm rounded-xl flex items-center justify-center gap-2 hover:shadow-[0_0_15px_rgba(34,197,94,0.4)] transition cursor-pointer"><IconDownload c="w-5 h-5"/>Baixar APK Gerado</button>
                    <button onClick={()=>onNavigate('/dashboard')} className="px-5 py-4 border border-slate-800 hover:bg-slate-900/60 text-slate-300 rounded-xl text-sm transition cursor-pointer flex items-center gap-2">Dashboard <IconExternalLink c="w-4 h-4"/></button>
                  </div>):(<button disabled className="w-full py-4 bg-pink-500/20 text-pink-400 border border-pink-500/30 rounded-xl font-bold tracking-wider text-sm flex items-center justify-center gap-2"><IconRefreshCw c="w-5 h-5 animate-spin"/>Processando...</button>)}
              </div>
            </div>
          </div>
          <div><div className="bg-slate-950/80 backdrop-blur-md border border-slate-800 rounded-2xl h-[560px] p-5 flex flex-col overflow-hidden">
            <div className="flex justify-between items-center pb-3 border-b border-slate-800/80 mb-4"><div className="flex items-center gap-2"><IconTerminal c="w-4 h-4 text-cyan-400"/><span className="text-xs text-slate-300 font-extrabold tracking-wider">Console</span></div><div className="flex gap-1"><span className="w-2.5 h-2.5 rounded-full bg-red-500/60"></span><span className="w-2.5 h-2.5 rounded-full bg-yellow-500/60"></span><span className="w-2.5 h-2.5 rounded-full bg-green-500/60"></span></div></div>
            <div className="flex-1 overflow-y-auto space-y-2 font-mono text-[11px] text-cyan-400/90 leading-relaxed max-h-[440px] pr-2">{logs.map((l,i)=><div key={i} className="break-all">{l}</div>)}{!active&&<div className="text-slate-600 italic">Console aguardando...</div>}</div>
            <div className="border-t border-slate-800/60 pt-3 flex justify-between items-center"><span className="text-[10px] font-mono text-slate-600">SDK v14.0.2</span>{active&&progress<100&&<span className="text-[10px] font-mono text-cyan-400 animate-pulse">Running...</span>}</div>
          </div></div>
        </div></div>);
    };
    // ==================== DOWNLOAD MODAL COMPONENT ====================
    const DownloadModal = ({appName, appVersion, filename, onDownload, onClose}) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 fade-in-up" onClick={onClose}>
        <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 border border-cyan-500/40 rounded-3xl p-8 max-w-lg w-full shadow-[0_0_60px_rgba(6,182,212,0.2)] relative" onClick={(e)=>e.stopPropagation()}>
          <button onClick={onClose} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-white rounded-xl hover:bg-white/10 transition cursor-pointer">
            <IconX c="w-5 h-5"/>
          </button>
          <div className="flex items-start gap-4 mb-6">
            <div className="w-14 h-14 bg-cyan-500/20 border border-cyan-500/40 rounded-2xl flex items-center justify-center shrink-0 glow-pulse">
              <IconPackage c="w-7 h-7 text-cyan-400"/>
            </div>
            <div>
              <h3 className="text-xl font-black text-cyan-400 tracking-wider mb-1">DOWNLOAD PRONTO</h3>
              <p className="text-slate-400 text-sm leading-relaxed">
                Se o navegador bloqueou o download automático, clique no botão abaixo para baixar o APK de <span className="text-slate-200 font-bold">{appName}</span>.
              </p>
            </div>
          </div>
          <button onClick={onDownload} className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-slate-950 font-black tracking-wider text-sm rounded-xl flex items-center justify-center gap-3 glow-pulse transition cursor-pointer select-none mb-3">
            <IconDownload c="w-5 h-5"/>BAIXAR APK MANUALMENTE
          </button>
          <button onClick={onClose} className="w-full py-3 border border-slate-700 text-slate-400 hover:text-white hover:border-slate-500 rounded-xl font-bold text-sm transition cursor-pointer select-none">
            Fechar
          </button>
          <div className="mt-4 text-center">
            <span className="text-[11px] font-mono text-slate-500 bg-slate-900/80 px-3 py-1.5 rounded-lg border border-slate-800">{filename}</span>
          </div>
        </div>
      </div>
    );
    // ==================== MAIN APP ====================
    function App() {
      const [user,setUser]=useState(()=>{const s=localStorage.getItem('w2a_u');return s?JSON.parse(s):null;});
      const [apps,setApps]=useState(()=>{const s=localStorage.getItem('w2a_a');return s?JSON.parse(s):INITIAL_APPS;});
      const [builds,setBuilds]=useState(()=>{const s=localStorage.getItem('w2a_b');return s?JSON.parse(s):INITIAL_BUILDS;});
      const [route,setRoute]=useState(()=>window.location.hash?window.location.hash.slice(1):'/');
      const [toast,setToast]=useState(null);
      // Download modal state
      const [dlModal,setDlModal]=useState(null); 
      useEffect(()=>{localStorage.setItem('w2a_u',JSON.stringify(user));},[user]);
      useEffect(()=>{localStorage.setItem('w2a_a',JSON.stringify(apps));},[apps]);
      useEffect(()=>{localStorage.setItem('w2a_b',JSON.stringify(builds));},[builds]);
      useEffect(()=>{const h=()=>{setRoute(window.location.hash.slice(1)||'/');};window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
      const nav=(r)=>{window.location.hash=r;setRoute(r);};
      const toastMessage=(m,t='success')=>{setToast({message:m,type:t});setTimeout(()=>setToast(null),3500);};
      const login=()=>{const u={id:1,name:"Cyber Dev",email:"dev@web2apk.com",role:"user"};setUser(u);toastMessage("Conectado! 🖥️");nav('/dashboard');};
      const logout=()=>{setUser(null);toastMessage("Desconectado.","info");nav('/');};
      const createApp=(d)=>{const a={...d,id:Date.now(),userId:user?user.id:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};setApps([a,...apps]);toastMessage(`App "${a.name}" criado! ✨`);nav('/dashboard');};
      const deleteApp=(id)=>{setApps(apps.filter(a=>a.id!==id));setBuilds(builds.filter(b=>b.appId!==id));toastMessage("App removido.");};
      const updateApp=(id,d)=>{setApps(apps.map(a=>a.id===id?{...a,...d,updatedAt:new Date().toISOString()}:a));toastMessage("App atualizado!");};
      const addBuild=(nb)=>{setBuilds(prev=>{const i=prev.findIndex(b=>b.id===nb.id);if(i>=0){const u=[...prev];u[i]=nb;return u;}return[nb,...prev];});};
      const upgrade=(t)=>{if(!user){setUser({id:1,name:"Cyber Dev",email:"dev@web2apk.com",role:t});}else{setUser({...user,role:t});}toastMessage(`Plano ${t} ativado! 🚀`);nav('/dashboard');};
      const downloadMockApk = (appName, version) => {
        const cleanedName = appName.replace(/[^a-zA-Z0-9]/g, '_');
        const filename = `${cleanedName}-v${version}.apk`;
        setDlModal({ appName, appVersion: version, filename });
      };
      const executeDownload = () => {
        if (!dlModal) return;
        const { appName, appVersion, filename } = dlModal;
        const content = `Web2APK Cyber Platform Build Result
===================================
App Name: ${appName}
App Version: ${appVersion}
Status: SUCCESSFUL (Build Signed with SSL Certificates)
Target Android OS: 5.0 - 14+ (SDK API 34 Native Core)
Built with Web2APK Cyber Engine v4.2 stable compiler.
This is a simulated APK file for demonstration purposes.
In a production environment, this would be a real compiled Android application.
`;
        try {
          const blob = new Blob([content], { type: 'application/vnd.android.package-archive' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename;
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          setTimeout(() => {
            if (link.parentNode) document.body.removeChild(link);
            URL.revokeObjectURL(url);
          }, 2000);
          toastMessage(`Download de "${appName}" iniciado! 📦`);
          setDlModal(null);
        } catch (error) {
          console.error('Download failed:', error);
          toastMessage('Erro no download. Tente novamente.', 'info');
        }
      };
      const render = () => {
        if(route==='/') return <LandingPage onLogin={login} onNavigate={nav}/>;
        if(route==='/pricing') return <PremiumPage user={user} onUpgrade={upgrade} onNavigate={nav}/>;
        if(!user&&(route==='/dashboard'||route==='/create-app'||route.startsWith('/app/')||route.startsWith('/build/'))) return <LandingPage onLogin={login} onNavigate={nav}/>;
        if(route==='/dashboard') return <DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;
        if(route==='/create-app') return <CreateAppPage onCreateApp={createApp} onNavigate={nav}/>;
        if(route.startsWith('/app/')){const id=parseInt(route.split('/')[2]);const a=apps.find(x=>x.id===id);if(!a)return <DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;return <AppDetailsPage app={a} builds={builds} onNavigate={nav} onUpdateApp={updateApp} onDeleteApp={deleteApp} onDownloadMockApk={downloadMockApk}/>}
        if(route.startsWith('/build/')){const id=parseInt(route.split('/')[2]);const a=apps.find(x=>x.id===id);if(!a)return <DashboardPage apps={apps} builds={builds} onNavigate={nav} onDeleteApp={deleteApp}/>;return <BuildAPKPage app={a} onNavigate={nav} onAddBuild={addBuild} onDownloadMockApk={downloadMockApk}/>}
        return <LandingPage onLogin={login} onNavigate={nav}/>;
      };
      return (<div className="flex flex-col min-h-screen bg-slate-950 text-slate-100 antialiased selection:bg-pink-500 selection:text-slate-950">
        <Navbar user={user} onNavigate={nav} onLogin={login} onLogout={logout}/>
        <main className="flex-1 pb-16 relative">{render()}</main>
        {toast&&<div className="fixed bottom-8 right-6 md:right-8 z-[60] bg-slate-900 border border-pink-500 rounded-2xl px-5 py-4 flex items-center justify-between gap-4 shadow-[0_0_25px_rgba(236,72,153,0.3)] select-none fade-in-up"><span className="text-sm font-bold text-slate-100">{toast.message}</span><div className="w-2 h-2 rounded-full bg-pink-500"></div></div>}
        {dlModal&&<DownloadModal appName={dlModal.appName} appVersion={dlModal.appVersion} filename={dlModal.filename} onDownload={executeDownload} onClose={()=>setDlModal(null)}/>}
        <Footer/>
      </div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
