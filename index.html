    // ==================== TEMPLATES COMPLETOS ====================

    // Template config.json
    const generateConfigJSON = (appName, websiteUrl, themeColor, packageName, version, features) => JSON.stringify({
      appName,
      websiteUrl,
      themeColor,
      packageName,
      version,
      fullscreen: features.fullscreen || false,
      orientation: features.orientation || "portrait",
      pullToRefresh: features.pullToRefresh || true,
      allowCamera: features.allowCamera || false,
      allowMicrophone: features.allowMicrophone || false,
      allowGeolocation: features.allowGeolocation || false,
      allowNotifications: features.allowNotifications || false,
      admobEnabled: features.admobEnabled || false,
      admobId: features.admobId || "",
      analyticsEnabled: features.analyticsEnabled || false,
      buildDate: new Date().toISOString()
    }, null, 2);

    // Template AndroidManifest.xml
    const generateManifestXML = (packageName, appName, themeColor, features) => `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${packageName}"
    android:versionCode="1"
    android:versionName="1.0">
    
    <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" />
    <uses-permission android:name="android.permission.INTERNET" />
    ${features.allowCamera ? '<uses-permission android:name="android.permission.CAMERA" />' : ''}
    ${features.allowMicrophone ? '<uses-permission android:name="android.permission.RECORD_AUDIO" />' : ''}
    ${features.allowGeolocation ? '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' : ''}
    ${features.allowNotifications ? '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' : ''}
    
    <application
        android:allowBackup="true"

        <activity

            android:theme="@style/Theme.AppCompat.Light.NoActionBar">

                <action android:name="android.intent.action.MAIN" />

    // Template build.gradle
    const generateBuildGradle = (packageName, appName, version) => `// Top-level build file

    repositories {
        google()
        mavenCentral()
    }

        classpath 'com.android.tools.build:gradle:8.1.0'

allprojects {

// app/build.gradle
apply plugin: 'com.android.application'

android {
    namespace '${packageName}'
    compileSdk 34

        applicationId '${packageName}'

            minifyEnabled false

dependencies {

    // Template MainActivity.java
    const generateMainActivity = (packageName, websiteUrl) => `package ${packageName};

import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.webkit.WebChromeClient;
import android.webkit.WebSettings;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    private WebView webView;
    
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        
        webView = findViewById(R.id.webView);
        WebSettings webSettings = webView.getSettings();
        webSettings.setJavaScriptEnabled(true);
        webSettings.setDomStorageEnabled(true);
        webSettings.setLoadWithOverviewMode(true);
        webSettings.setUseWideViewPort(true);
        webSettings.setBuiltInZoomControls(true);
        webSettings.setDisplayZoomControls(false);
        
        webView.setWebViewClient(new WebViewClient());
        webView.setWebChromeClient(new WebChromeClient());
        webView.loadUrl("${websiteUrl}");
    }
    
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) {
            webView.goBack();
        } else {
            super.onBackPressed();
        }
    }
}`;

    // ==================== FUNÇÃO PRINCIPAL DE GERAÇÃO DO PACOTE ====================
    const generateCompletePackage = async (config, iconFile, splashFile) => {
      const JSZip = window.JSZip;
      const zip = new JSZip();
      
      const {
        appName,
        websiteUrl,
        themeColor,
        packageName,
        version,
        features,
        bgColor
      } = config;
      
      // Criar pasta principal
      const root = zip.folder(`${appName.replace(/[^a-z0-9]/gi, '_')}-v${version}`);
      
      // 1. Documentação
      const now = new Date();
      root.file("readme.txt", `WEB2APK PRO - PACOTE COMPLETO
================================
App Name: ${appName}
Version: ${version}
Package: ${packageName}
Website: ${websiteUrl}
Theme: ${themeColor}
Build Date: ${now.toISOString()}
Features: ${JSON.stringify(features, null, 2)}
================================
INSTRUÇÕES:
1. Este ZIP contém toda estrutura Android
2. Para gerar APK final, use Android Studio
3. Ou utilize nosso serviço premium de build
================================`);
      
      root.file("license.txt", `MIT License
Copyright (c) ${now.getFullYear()} Web2APK Pro
Permission is hereby granted...`);
      
      root.file("certification.txt", `CERTIFICAÇÃO
App ID: ${Math.floor(Math.random() * 10000000)}
App Key: ${Math.random().toString(36).substring(2, 15)}
Data: ${now.toLocaleString()}`);
      
      // 2. Arquivos .url
      root.file("home.url", `[InternetShortcut]
URL=${websiteUrl}
IDList=
HotKey=0
IconFile=${websiteUrl}/favicon.ico
IconIndex=0`);
      
      root.file("author.url", `[InternetShortcut]
URL=https://web2apk.app/author/dashboard
IDList=
HotKey=0
IconFile=https://web2apk.app/favicon.ico
IconIndex=0`);
      
      // 3. Assets HTML (splash, loading, error)
      const assetsFolder = root.folder("assets");
      const htmlappFolder = assetsFolder.folder("htmlapp");
      const rootFolder = htmlappFolder.folder("root");
      const helpersFolder = htmlappFolder.folder("helpers");
      
      rootFolder.file("index.html", `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${appName}</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe src="${websiteUrl}" allow="camera; microphone; geolocation"></iframe>
</body>
</html>`);
      
      helpersFolder.file("splash.html", generateSplashHTML(appName, themeColor, bgColor || "#0a0a1f"));
      helpersFolder.file("loading.html", generateLoadingHTML(themeColor));
      helpersFolder.file("error.html", generateErrorHTML(themeColor));
      
      // 4. Configurações JSON
      root.file("config.json", generateConfigJSON(appName, websiteUrl, themeColor, packageName, version, features));
      root.file("manifest.json", JSON.stringify({
        name: appName,
        short_name: appName.slice(0, 12),
        start_url: websiteUrl,
        display: features.fullscreen ? "fullscreen" : "standalone",
        theme_color: themeColor,
        background_color: bgColor || "#0a0a1f",
        icons: [{ src: "icon.png", sizes: "192x192", type: "image/png" }]
      }, null, 2));
      
      // 5. Estrutura Android
      const androidFolder = root.folder("android");
      androidFolder.file("AndroidManifest.xml", generateManifestXML(packageName, appName, themeColor, features));
      androidFolder.file("build.gradle", generateBuildGradle(packageName, appName, version));
      
      const javaFolder = androidFolder.folder("app").folder("src").folder("main").folder("java");
      const packagePath = packageName.replace(/\./g, "/");
      const packageFolder = javaFolder.folder(packagePath);
      packageFolder.file("MainActivity.java", generateMainActivity(packageName, websiteUrl));
      
      // 6. Recursos (res)
      const resFolder = androidFolder.folder("app").folder("src").folder("main").folder("res");
      const valuesFolder = resFolder.folder("values");
      valuesFolder.file("colors.xml", `<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">${themeColor}</color>
    <color name="colorPrimaryDark">${themeColor}</color>
    <color name="colorAccent">#06D9FF</color>
</resources>`);
      
      valuesFolder.file("strings.xml", `<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">${appName}</string>
    <string name="website_url">${websiteUrl}</string>
</resources>`);
      
      // Layout da activity
      const layoutFolder = resFolder.folder("layout");
      layoutFolder.file("activity_main.xml", `<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical">
    <WebView
        android:id="@+id/webView"
        android:layout_width="match_parent"
        android:layout_height="match_parent" />
</LinearLayout>`);
      
      // 7. Ícones (se fornecidos)
      if (iconFile) {
        const mipmapFolder = resFolder.folder("mipmap-hdpi");
        const iconData = await iconToBlob(iconFile);
        mipmapFolder.file("ic_launcher.png", iconData, { binary: true });
        mipmapFolder.file("ic_launcher_round.png", iconData, { binary: true });
      }
      
      // 8. Splash screen personalizada
      if (splashFile) {
        const drawableFolder = resFolder.folder("drawable");
        const splashData = await iconToBlob(splashFile);
        drawableFolder.file("splash.png", splashData, { binary: true });
      }
      
      // Gerar ZI? final
      return await zip.generateAsync({ type: "blob" });
    };
    
    const iconToBlob = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    };

    // ==================== COMPONENTE PRINCIPAL ====================
    const AppGenerator = () => {
      const [appName, setAppName] = useState("Meu App Incrível");
      const [websiteUrl, setWebsiteUrl] = useState("https://");
      const [themeColor, setThemeColor] = useState("#FF006E");
      const [bgColor, setBgColor] = useState("#0a0a1f");
      const [packageName, setPackageName] = useState("com.app.meuapp");
      const [version, setVersion] = useState("1.0");
      const [features, setFeatures] = useState({
        fullscreen: false,
        orientation: "portrait",
        pullToRefresh: true,
        allowCamera: false,
        allowMicrophone: false,
        allowGeolocation: false,
        allowNotifications: false,
        admobEnabled: false,
        analyticsEnabled: false
      });
      const [iconFile, setIconFile] = useState(null);
      const [splashFile, setSplashFile] = useState(null);
      const [iconPreview, setIconPreview] = useState(null);
      const [splashPreview, setSplashPreview] = useState(null);
      const [generating, setGenerating] = useState(false);
      const [progress, setProgress] = useState(0);
      const [logs, setLogs] = useState([]);
      
      const addLog = (msg) => setLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
      
      const handleIconUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setIconFile(file);
          const reader = new FileReader();
          reader.onloadend = () => setIconPreview(reader.result);
          reader.readAsDataURL(file);
        }
      };
      
      const handleSplashUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setSplashFile(file);
          const reader = new FileReader();
          reader.onloadend = () => setSplashPreview(reader.result);
          reader.readAsDataURL(file);
        }
      };
      
      const toggleFeature = (key) => {
        setFeatures(prev => ({ ...prev, [key]: !prev[key] }));
      };
      
      const generatePackage = async () => {
        setGenerating(true);
        setProgress(0);
        setLogs([]);
        
        addLog("Iniciando geração do pacote completo...");
        addLog(`App: ${appName}`);
        addLog(`URL: ${websiteUrl}`);
        addLog(`Package: ${packageName}`);
        
        setProgress(20);
        addLog("Criando templates HTML (splash, loading, error)...");
        
        setProgress(40);
        addLog("Gerando estrutura Android (manifest, gradle, activities)...");
        
        setProgress(60);
        addLog("Adicionando recursos e configurações...");
        
        setProgress(80);
        addLog("Empacotando ZIP...");
        
        try {
          const blob = await generateCompletePackage({
            appName,
            websiteUrl,
            themeColor,
            bgColor,
            packageName,
            version,
            features
          }, iconFile, splashFile);
          
          setProgress(100);
          addLog("✅ Pacote gerado com sucesso!");
          addLog("📦 Iniciando download...");
          
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}-v${version}-complete.zip`;
          a.click();
          URL.revokeObjectURL(url);
          
          addLog("✅ Download concluído!");
        } catch (error) {
          addLog(`❌ Erro: ${error.message}`);
        } finally {
          setTimeout(() => setGenerating(false), 1000);
        }
      };
      
      // Atualizar package name automaticamente
      useEffect(() => {
        if (appName && !packageName.includes(appName.toLowerCase().slice(0, 10))) {
          const clean = appName.toLowerCase().replace(/[^a-z0-9]/g, '');
          setPackageName(`com.app.${clean || 'meuapp'}`);
        }
      }, [appName]);
      
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
          {/* Header */}
          <div className="border-b border-pink-500/20 bg-slate-950/50 backdrop-blur-sm sticky top-0 z-50">
            <div className="container mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl flex items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                      <rect x="4" y="4" width="16" height="16" rx="2"/>
                      <rect x="9" y="9" width="6" height="6"/>
                    </svg>
                  </div>
                  <div>
                    <span className="text-2xl font-bold bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">Web2APK Pro</span>
                    <span className="text-[10px] text-cyan-400 block">Criador de APK/AAB/PWA</span>
                  </div>
                </div>
                <div className="flex gap-2">
                  <span className="px-3 py-1 bg-pink-500/20 text-pink-400 text-xs rounded-full">Beta</span>
                  <span className="px-3 py-1 bg-cyan-500/20 text-cyan-400 text-xs rounded-full">v4.2</span>
                </div>
              </div>
            </div>
          </div>
          
          <div className="container mx-auto px-6 py-8">
            <div className="grid lg:grid-cols-2 gap-8">
              {/* Formulário de Configuração */}
              <div className="space-y-6">
                <div className="bg-slate-900/60 backdrop-blur-sm border border-slate-800 rounded-2xl p-6">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Configurações Básicas
                  </h2>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Nome do App *</label>
                      <input type="text" value={appName} onChange={e => setAppName(e.target.value)} 
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-pink-500 transition" />
                    </div>
                    
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">URL do Site *</label>
                      <input type="url" value={websiteUrl} onChange={e => setWebsiteUrl(e.target.value)} 
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-pink-500 transition" />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Cor Principal</label>
                        <div className="flex gap-2">
                          <input type="color" value={themeColor} onChange={e => setThemeColor(e.target.value)} className="w-12 h-12 rounded-xl cursor-pointer" />
                          <input type="text" value={themeColor} onChange={e => setThemeColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 font-mono text-sm" />
                        </div>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Cor de Fundo</label>
                        <div className="flex gap-2">
                          <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="w-12 h-12 rounded-xl cursor-pointer" />
                          <input type="text" value={bgColor} onChange={e => setBgColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 font-mono text-sm" />
                        </div>
                      </div>
                    </div>
                    
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Package Name</label>
                      <input type="text" value={packageName} onChange={e => setPackageName(e.target.value)} 
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 font-mono text-sm" />
                      <p className="text-[10px] text-slate-500 mt-1">Identificador único do aplicativo</p>
                    </div>
                    
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Versão</label>
                      <input type="text" value={version} onChange={e => setVersion(e.target.value)} 
                        className="w-32 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3" />
                    </div>
                  </div>
                </div>
                
                {/* Upload de Imagens */}
                <div className="bg-slate-900/60 backdrop-blur-sm border border-slate-800 rounded-2xl p-6">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Imagens do App
                  </h2>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Ícone do App</label>
                      <div className="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:border-pink-500 transition"
                        onClick={() => document.getElementById('iconInput').click()}>
                        {iconPreview ? (
                          <img src={iconPreview} alt="Icon" className="w-16 h-16 mx-auto rounded-xl object-cover" />
                        ) : (
                          <div className="text-slate-500">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" className="mx-auto mb-2"><rect x="5" y="2" width="14" height="20" rx="2"/></svg>
                            <span className="text-xs">Clique para enviar</span>
                          </div>
                        )}
                        <input id="iconInput" type="file" accept="image/*" className="hidden" onChange={handleIconUpload} />
                      </div>
                    </div>
                    
                    <div>
                      <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Splash Screen</label>
                      <div className="border-2 border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer hover:border-pink-500 transition"
                        onClick={() => document.getElementById('splashInput').click()}>
                        {splashPreview ? (
                          <img src={splashPreview} alt="Splash" className="w-16 h-16 mx-auto rounded-xl object-cover" />
                        ) : (
                          <div className="text-slate-500">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" className="mx-auto mb-2"><circle cx="12" cy="12" r="10"/></svg>
                            <span className="text-xs">Clique para enviar</span>
                          </div>
                        )}
                        <input id="splashInput" type="file" accept="image/*" className="hidden" onChange={handleSplashUpload} />
                      </div>
                    </div>
                  </div>
                </div>
                
                {/* Recursos Premium */}
                <div className="bg-slate-900/60 backdrop-blur-sm border border-slate-800 rounded-2xl p-6">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Recursos Premium
                  </h2>
                  
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { key: "fullscreen", label: "📱 Modo Tela Cheia" },
                      { key: "pullToRefresh", label: "🔄 Pull to Refresh" },
                      { key: "allowCamera", label: "📷 Câmera" },
                      { key: "allowMicrophone", label: "🎤 Microfone" },
                      { key: "allowGeolocation", label: "📍 Geolocalização" },
                      { key: "allowNotifications", label: "🔔 Push Notifications" },
                      { key: "admobEnabled", label: "💰 AdMob Ads" },
                      { key: "analyticsEnabled", label: "📊 Analytics" }
                    ].map(feat => (
                      <label key={feat.key} className="flex items-center justify-between p-3 bg-slate-950/50 rounded-xl cursor-pointer hover:bg-slate-800/50 transition">
                        <span className="text-sm">{feat.label}</span>
                        <input type="checkbox" checked={features[feat.key]} onChange={() => toggleFeature(feat.key)} 
                          className="w-4 h-4 accent-pink-500" />
                      </label>
                    ))}
                  </div>
                  
                  <div className="mt-4">
                    <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Orientação da Tela</label>
                    <select value={features.orientation} onChange={e => setFeatures({...features, orientation: e.target.value})}
                      className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3">
                      <option value="portrait">Retrato (Vertical)</option>
                      <option value="landscape">Paisagem (Horizontal)</option>
                      <option value="fullSensor">Automático (Sensor)</option>
                    </select>
                  </div>
                </div>
                
                {/* Botão Gerar */}
                <button 
                  onClick={generatePackage}
                  disabled={generating || !appName || !websiteUrl}
                  className={`w-full py-4 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${
                    generating ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 hover:shadow-lg'
                  }`}>
                  {generating ? (
                    <>
                      <svg className="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" strokeDasharray="30" />
                      </svg>
                      Gerando Pacote... {progress}%
                    </>
                  ) : (
                    <>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 17 12 12 18 17"/><path d="M12 12V3"/><path d="M4 21h16"/></svg>
                      Gerar Pacote Completo
                    </>
                  )}
                </button>
              </div>
              
              {/* Preview e Logs */}
              <div className="space-y-6">
                {/* Preview do App */}
                <div className="bg-slate-900/60 backdrop-blur-sm border border-slate-800 rounded-2xl p-6">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                    Preview do Aplicativo
                  </h2>
                  
                  <div className="flex justify-center">
                    <div className="border-4 border-slate-800 rounded-3xl bg-slate-950 p-3 w-64">
                      <div className="relative">
                        <div className="w-24 h-5 bg-slate-800 rounded-b-2xl mx-auto absolute -top-3 left-1/2 -translate-x-1/2 z-10"></div>
                        <div className="flex justify-between text-[10px] text-slate-400 px-2 pt-1">
                          <span>12:00</span>
                          <span>📶 🔋</span>
                        </div>
                        <div className="bg-gradient-to-br from-slate-900 to-slate-950 rounded-2xl p-4 text-center min-h-[400px] flex flex-col items-center justify-center">
                          {iconPreview ? (
                            <img src={iconPreview} className="w-20 h-20 rounded-2xl mb-3 shadow-lg" />
                          ) : (
                            <div className="w-20 h-20 rounded-2xl bg-gradient-to-r from-pink-500 to-cyan-500 flex items-center justify-center mb-3 shadow-lg">
                              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white"><rect x="5" y="2" width="14" height="20" rx="2"/></svg>
                            </div>
                          )}
                          <h3 className="font-bold text-lg">{appName || "Meu App"}</h3>
                          <p className="text-xs text-slate-500 mt-1 break-all">{websiteUrl}</p>
                          <div className="mt-4 w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                            <div className="h-full rounded-full transition-all" style={{ width: '30%', backgroundColor: themeColor }}></div>
                          </div>
                          <p className="text-[10px] text-slate-600 mt-3">Carregando...</p>
                        </div>
                        <div className="flex justify-center gap-8 pt-2 pb-1 text-slate-600">
                          <span>◀</span>
                          <span>●</span>
                          <span>■</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                
                {/* Log Console */}
                <div className="bg-slate-900/60 backdrop-blur-sm border border-slate-800 rounded-2xl p-6">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    Console de Build
                  </h2>
                  
                  <div className="bg-black/60 rounded-xl p-4 h-64 overflow-y-auto font-mono text-xs">
                    {logs.length === 0 ? (
                      <div className="text-slate-500 text-center py-8">Aguardando comando...</div>
                    ) : (
                      logs.map((log, i) => (
                        <div key={i} className="text-green-400 mb-1">{log}</div>
                      ))
                    )}
                  </div>
                  
                  {progress > 0 && progress < 100 && (
                    <div className="mt-4">
                      <div className="flex justify-between text-xs mb-1">
                        <span>Progresso</span>
                        <span className="text-pink-400">{progress}%</span>
                      </div>
                      <div className="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                        <div className="bg-gradient-to-r from-pink-500 to-cyan-500 h-full rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                      </div>
                    </div>
                  )}
                </div>
                
                {/* O que está incluso */}
                <div className="bg-gradient-to-r from-pink-500/10 to-cyan-500/10 border border-pink-500/30 rounded-2xl p-6">
                  <h3 className="font-bold mb-3 flex items-center gap-2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
                    Conteúdo do Pacote ZIP
                  </h3>
                  <div className="grid grid-cols-2 gap-2 text-sm text-slate-300">
                    <div>📱 APK (estrutura)</div>
                    <div>📄 readme.txt</div>
                    <div>📜 license.txt</div>
                    <div>🔐 certification.txt</div>
                    <div>🌐 home.url</div>
                    <div>👤 author.url</div>
                    <div>🎨 Splash + Loading + Error</div>
                    <div>📁 AndroidManifest.xml</div>
                    <div>⚙️ build.gradle</div>
                    <div>📦 assets/ + res/</div>
                    <div>📋 config.json</div>
                    <div>🔧 Código Java/Kotlin</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <footer className="border-t border-pink-500/10 bg-slate-950/40 mt-12 py-6 text-center text-slate-500 text-xs">
            <div className="container mx-auto px-6">
              Web2APK Pro - Criador de APK/AAB/PWA | Pacote completo com estrutura Android + documentação + templates
            </div>
          </footer>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<AppGenerator />);
  </script>
</body>
</html>
