<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ConvertAPK • Criador de Apps para Android</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF006E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ConvertAPK">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { scroll-behavior: smooth; }
    body { background: #020617; font-family: 'Rajdhani', sans-serif; }
    h1,h2,h3,h4 { font-family: 'Orbitron', monospace; }
    .glass { backdrop-filter: blur(12px); background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6); }
    .glass-pink { border-color: rgba(255,0,110,0.3); }
    .btn-primary { background: linear-gradient(135deg, #FF006E, #9333ea); color: white; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.2s; border: none; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 20px rgba(255,0,110,0.4); }
    .btn-outline { background: transparent; border: 1px solid rgba(255,0,110,0.5); color: #FF006E; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: rgba(255,0,110,0.1); border-color: #FF006E; }
    .input-field { width: 100%; background: rgba(2,6,23,0.8); border: 1px solid #1e293b; color: #e2e8f0; padding: 0.65rem 1rem; border-radius: 0.75rem; outline: none; }
    .input-field:focus { border-color: #FF006E; box-shadow: 0 0 0 2px rgba(255,0,110,0.2); }
    .upload-zone { border: 2px dashed rgba(255,0,110,0.3); border-radius: 1rem; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; background: rgba(255,0,110,0.03); }
    .upload-zone:hover { border-color: #FF006E; background: rgba(255,0,110,0.08); }
    .toast { position: fixed; bottom: 2rem; right: 1.5rem; z-index: 9999; padding: 0.85rem 1.4rem; border-radius: 1rem; backdrop-filter: blur(12px); animation: slideUp 0.3s ease; }
    .toast-success { background: rgba(15,23,42,0.95); border: 1px solid #4ade80; color: #4ade80; }
    .toast-error { background: rgba(15,23,42,0.95); border: 1px solid #f87171; color: #f87171; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .app-icon-default { background: linear-gradient(135deg, #1e1b4b, #4c1d95); display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; flex-shrink: 0; font-size: 1.5rem; }
    .badge-pink { background: rgba(255,0,110,0.15); color: #ff6eb4; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { max-width: 500px; width: 90%; background: #0f172a; border: 1px solid #FF006E; border-radius: 1.5rem; padding: 1.5rem; color: white; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">

<div id="app-root" class="flex flex-col min-h-screen"></div>

<script>
// ======================== ESTADO GLOBAL ========================
let user = null;
let apps = [];
let toastQueue = [];
let editModalAppId = null;
let currentToast = null;
let deferredPrompt = null; // para instalação do PWA

// Capturar evento de instalação do PWA
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  } else {
    // Exibe tutorial manual
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3 class="text-xl font-bold mb-3">📱 Instalar como App</h3>
        <p class="text-sm text-slate-300 mb-3">Seu navegador não ofereceu instalação automática. Siga esses passos:</p>
        <ul class="list-disc list-inside text-sm space-y-2 text-slate-400">
          <li><strong>Chrome/Edge (Android):</strong> Menu → "Adicionar à tela inicial"</li>
          <li><strong>Samsung Internet:</strong> Menu → "Adicionar página à tela inicial"</li>
          <li><strong>iOS (Safari):</strong> Compartilhar → "Adicionar à Tela de Início"</li>
        </ul>
        <button class="btn-primary w-full mt-4" onclick="this.closest('.modal').remove()">Entendi</button>
      </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  }
}

// ======================== LOAD / PERSIST ========================
const loadStorage = () => {
  try {
    user = JSON.parse(localStorage.getItem('convertapk_user'));
    apps = JSON.parse(localStorage.getItem('convertapk_apps')) || [
      { id: 1, userId: 1, name: "TechNews Brasil", description: "Portal de tecnologia", websiteUrl: "https://technews.com.br", packageName: "com.convertapk.technews", version: "1.2.0", themeColor: "#FF006E", orientation: "portrait", permissions: ["INTERNET"], offlineSupport: true, deepLinking: false, analyticsEnabled: true, iconUrl: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=100&q=80", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }
    ];
  } catch(e) { console.warn(e); }
};
const persist = () => {
  localStorage.setItem('convertapk_user', JSON.stringify(user));
  localStorage.setItem('convertapk_apps', JSON.stringify(apps));
};

const getRoute = () => window.location.hash.slice(1) || '/';
const navigate = (route) => { window.location.hash = route; rerender(); };

const toast = (msg, type='success') => {
  toastQueue.push({ msg, type });
  if (!currentToast) showNextToast();
};
const showNextToast = () => {
  if (!toastQueue.length) { currentToast = null; rerender(); return; }
  currentToast = toastQueue.shift();
  rerender();
  setTimeout(showNextToast, 3000);
};

const esc = (str) => String(str ?? '').replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));

// ======================== CRUD APPS ========================
const createApp = (data) => {
  const newApp = { ...data, id: Date.now(), userId: user?.id || 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  apps = [newApp, ...apps];
  persist();
  toast(`"${newApp.name}" criado! ✨`);
  navigate('/dashboard');
};
const updateApp = (id, data) => {
  apps = apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a);
  persist();
  toast("App atualizado");
  rerender();
};
const deleteApp = (id) => {
  apps = apps.filter(a => a.id !== id);
  persist();
  toast("App removido");
  navigate('/dashboard');
};

// ======================== AUTENTICAÇÃO ========================
const handleLogin = () => {
  user = { id: 1, name: "Cyber Dev", email: "dev@convertapk.com", role: "user" };
  persist();
  toast("Conectado! 🖥️");
  navigate('/dashboard');
};
const handleLogout = () => {
  user = null;
  persist();
  toast("Desconectado");
  navigate('/');
};
const handleUpgrade = (tier) => {
  if (!user) user = { id: 1, name: "Cyber Dev", email: "dev@convertapk.com", role: tier };
  else user.role = tier;
  persist();
  toast(`Plano ${tier.toUpperCase()} ativado! 🚀`, 'success');
  navigate('/dashboard');
};

// ======================== DOWNLOAD DE APK DEMONSTRATIVO ========================
function downloadDemonstrationApk(app) {
  const filename = `${app.name.replace(/[^a-z0-9]/gi, '_')}_v${app.version}.apk`;
  const content = `APK DEMONSTRATIVO - NÃO FUNCIONAL\n\n` +
    `App: ${app.name}\nURL: ${app.websiteUrl}\nPacote: ${app.packageName}\n\n` +
    `⚠️ Este arquivo NÃO é um APK Android verdadeiro.\n\n` +
    `✅ Para ter este aplicativo funcionando no seu celular, clique no botão "Instalar App" – ele adicionará o ConvertAPK à tela inicial como um aplicativo nativo (PWA), sem erros de análise.\n\n` +
    `🔧 Para gerar APKs reais e distribuíveis, contrate o plano Premium (backend com Android SDK).`;
  const blob = new Blob([content], { type: 'application/vnd.android.package-archive' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  toast(`Download do APK demonstrativo: ${filename}. Instale o app via PWA (botão "Instalar App") para ter a experiência real.`, 'info');
}

// ======================== SIMULAÇÃO DE BUILD (apenas visual, sem APK falso) ========================
function startBuild(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;

  const pre = document.getElementById('buildPreChecks');
  const prog = document.getElementById('buildProgress');
  const result = document.getElementById('buildResult');
  if (pre) pre.style.display = 'none';
  if (prog) prog.style.display = 'block';

  const logsDiv = document.getElementById('buildLogs');
  const bar = document.getElementById('buildProgressBar');
  const pct = document.getElementById('buildPct');
  const phaseLabel = document.getElementById('buildPhaseLabel');
  const dot = document.getElementById('consoleStatusDot');
  if (dot) dot.style.background = '#facc15';

  const log = (msg, type = '') => {
    if (logsDiv) logsDiv.innerHTML += `\n<span class="${type ? 'text-'+type : ''}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
    logsDiv.scrollTop = logsDiv.scrollHeight;
  };
  log(`🚀 Build simulado para ${app.name}`, 'info');

  const phases = [
    "Preparando ambiente", "Coletando configurações", "Simulando compilação",
    "Empacotando APK demonstrativo", "Finalizando"
  ];
  let step = 0;
  const totalSteps = phases.length;
  const interval = setInterval(() => {
    if (step >= totalSteps) {
      clearInterval(interval);
      log("✅ Build concluída! (simulação)", "green-400");
      if (bar) bar.style.width = '100%';
      if (pct) pct.textContent = '100%';
      if (phaseLabel) phaseLabel.textContent = 'Pronto!';
      if (dot) dot.style.background = '#4ade80';
      if (result) {
        result.style.display = 'block';
        result.innerHTML = `
          <div class="text-center p-4 border border-green-500/30 rounded-xl bg-green-500/5">
            <div class="text-2xl mb-2">🎉</div>
            <div class="text-green-400 font-bold">Simulação concluída!</div>
            <div class="text-sm text-slate-400 my-2">O APK real requer backend.</div>
            <button class="btn-primary" onclick="installPWA()">📲 Instalar ConvertAPK como App</button>
            <button class="btn-outline mt-2" onclick="downloadDemonstrationApk(apps.find(a=>a.id===${app.id}))">⬇ Baixar APK demonstrativo</button>
            <p class="text-xs text-slate-500 mt-3">✅ Para ter este app específico no celular, instale o ConvertAPK via PWA e use-o diretamente – ele já é um aplicativo funcional.</p>
          </div>`;
      }
      return;
    }
    const percent = Math.round(((step+1) / totalSteps) * 100);
    if (bar) bar.style.width = percent + '%';
    if (pct) pct.textContent = percent + '%';
    if (phaseLabel) phaseLabel.textContent = phases[step];
    log(`[${phases[step]}] ...`, 'info');
    step++;
  }, 500);
}

// ======================== IMAGEM (UPLOAD / PREVIEW) ========================
const fileToBase64 = (file) => new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
let caIconData = null;
let quickIconData = null;
let editIconData = null;

window.handleCaImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return toast('Apenas imagens', 'error');
  if (file.size > 2e6) return toast('Máx 2MB', 'error');
  fileToBase64(file).then(b64 => { caIconData = b64; document.getElementById('caIconPreview').innerHTML = `<img src="${b64}" class="w-full h-full object-cover rounded-xl">`; });
};
window.clearCaIcon = () => { caIconData = null; document.getElementById('caIconPreview').innerHTML = '📱'; document.getElementById('caIconUrl').value = ''; };
window.submitCreateApp = () => {
  const name = document.getElementById('caName')?.value.trim();
  const url = document.getElementById('caUrl')?.value.trim();
  const pkg = document.getElementById('caPkg')?.value.trim();
  if (!name || !url || !pkg) return toast('Preencha todos os campos', 'error');
  createApp({
    name, websiteUrl: url, description: document.getElementById('caDesc')?.value || '',
    packageName: pkg, version: document.getElementById('caVersion')?.value || '1.0.0',
    themeColor: document.getElementById('caColor')?.value || '#FF006E', orientation: document.getElementById('caOrientation')?.value || 'portrait',
    permissions: ['INTERNET'], offlineSupport: document.getElementById('caOffline')?.checked || false,
    deepLinking: document.getElementById('caDeep')?.checked || false, analyticsEnabled: document.getElementById('caAnalytics')?.checked || false,
    iconUrl: caIconData || document.getElementById('caIconUrl')?.value || ''
  });
};
window.handleQuickImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return;
  fileToBase64(file).then(b64 => { quickIconData = b64; document.getElementById('quickIconPreview').innerHTML = `<img src="${b64}" class="h-12 rounded-lg">`; });
};
window.handleQuickForm = () => {
  const name = document.getElementById('qName')?.value.trim() || 'Quick App';
  const url = document.getElementById('qUrl')?.value.trim();
  if (!url) return toast('URL obrigatória', 'error');
  if (!user) handleLogin();
  createApp({
    name, websiteUrl: url, description: 'Criado rapidamente', packageName: `com.quick.${Date.now()}`, version: '1.0.0',
    themeColor: '#FF006E', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false,
    analyticsEnabled: true, iconUrl: quickIconData || ''
  });
  quickIconData = null;
};
window.openEditModal = (id) => { editModalAppId = id; editIconData = null; rerender(); };
window.saveEditModal = (id) => {
  const name = document.getElementById('editName')?.value.trim();
  const url = document.getElementById('editUrl')?.value.trim();
  if (!name || !url) return toast('Nome e URL obrigatórios', 'error');
  const icon = editIconData || document.getElementById('editIconUrl')?.value.trim() || apps.find(a=>a.id===id)?.iconUrl || '';
  updateApp(id, {
    name, websiteUrl: url, description: document.getElementById('editDesc')?.value || '',
    packageName: document.getElementById('editPkg')?.value || '', version: document.getElementById('editVersion')?.value || '1.0.0',
    themeColor: document.getElementById('editColor')?.value || '#FF006E', orientation: document.getElementById('editOrientation')?.value || 'portrait',
    offlineSupport: document.getElementById('editOffline')?.checked || false,
    deepLinking: document.getElementById('editDeep')?.checked || false, analyticsEnabled: document.getElementById('editAnalytics')?.checked || false,
    iconUrl: icon
  });
  editModalAppId = null;
  editIconData = null;
  rerender();
};
window.handleEditImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return;
  fileToBase64(file).then(b64 => { editIconData = b64; document.getElementById('editIconPreview').innerHTML = `<img src="${b64}" class="w-16 h-16 rounded-xl object-cover">`; });
};

// ======================== RENDERIZAÇÃO DAS PÁGINAS ========================
const renderNavbar = () => `
<nav class="sticky top-0 z-50 border-b border-pink-500/20 backdrop-blur-xl bg-slate-950/80">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div onclick="navigate('/')" class="flex items-center gap-3 cursor-pointer">
      <div class="w-10 h-10 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg">⚡</div>
      <div><div class="text-2xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">ConvertAPK</div><div class="text-[10px] text-cyan-400">PWA + APK Demo</div></div>
    </div>
    <div class="flex items-center gap-4">
      ${user ? `
        <span class="cursor-pointer hidden sm:block" onclick="navigate('/dashboard')">Painel</span>
        <span class="cursor-pointer hidden sm:block" onclick="navigate('/create-app')">Novo App</span>
        <button class="btn-outline text-sm py-1 px-3" onclick="installPWA()">📲 Instalar App</button>
        <div class="flex items-center gap-2 bg-slate-900/60 px-3 py-1 rounded-full"><span class="text-sm font-bold">${esc(user.name)}</span><div class="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-600 to-cyan-400 flex items-center justify-center">${user.name.charAt(0)}</div></div>
        <button class="btn-outline text-sm py-1 px-3" onclick="handleLogout()">Sair</button>
      ` : `<button class="btn-primary" onclick="handleLogin()">Entrar</button>`}
    </div>
  </div>
</nav>`;

const renderFooter = () => `<footer class="border-t border-pink-500/10 bg-slate-950/50 py-8 mt-auto"><div class="text-center text-xs text-slate-600">© 2026 ConvertAPK — Gerador de Apps (PWA + APK demonstrativo)</div></footer>`;
const renderToast = () => currentToast ? `<div class="toast toast-${currentToast.type === 'error' ? 'error' : 'success'}">${currentToast.msg}</div>` : '';
const renderEditModal = () => !editModalAppId ? '' : `<div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50" onclick="if(event.target===this) editModalAppId=null;rerender()"><div class="glass rounded-2xl p-6 max-w-md w-full"><h3 class="text-xl mb-4">Editar App</h3><input class="input-field mb-2" id="editName" placeholder="Nome" value="${esc(apps.find(a=>a.id===editModalAppId)?.name)}"><input class="input-field mb-2" id="editUrl" placeholder="URL" value="${esc(apps.find(a=>a.id===editModalAppId)?.websiteUrl)}"><textarea class="input-field mb-2" id="editDesc" rows="2">${esc(apps.find(a=>a.id===editModalAppId)?.description||'')}</textarea><div class="flex gap-2"><button class="btn-primary flex-1" onclick="saveEditModal(${editModalAppId})">Salvar</button><button class="btn-outline" onclick="editModalAppId=null;rerender()">Cancelar</button></div></div></div>`;

const renderLanding = () => `
<div class="max-w-7xl mx-auto px-6 py-16 text-center">
  <h1 class="text-5xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">ConvertAPK</h1>
  <p class="text-xl mt-4">Crie e instale apps Android a partir de qualquer site, <strong>sem código e sem erros</strong>.</p>
  <div class="flex justify-center gap-4 mt-8">
    <button class="btn-primary" onclick="handleLogin()">Começar Agora →</button>
    <button class="btn-outline" onclick="installPWA()">📲 Instalar App</button>
  </div>
  <div class="mt-12 grid md:grid-cols-3 gap-6">
    <div class="glass p-6 rounded-2xl"><div class="text-4xl mb-2">📱</div><h3>PWA 100% funcional</h3><p>Adicione à tela inicial e use como app nativo.</p></div>
    <div class="glass p-6 rounded-2xl"><div class="text-4xl mb-2">⚡</div><h3>Geração de APK real?</h3><p>O APK verdadeiro exige backend. Use o PWA enquanto isso.</p></div>
    <div class="glass p-6 rounded-2xl"><div class="text-4xl mb-2">🔧</div><h3>Plano Premium</h3><p>APKs assinados e prontos para distribuição.</p></div>
  </div>
</div>`;

const renderDashboard = () => `
<div class="max-w-7xl mx-auto px-6 py-10">
  <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-black">Meus Apps</h1><button class="btn-primary" onclick="navigate('/create-app')">+ Novo App</button></div>

    <div class="glass rounded-2xl p-4 cursor-pointer hover:border-pink-500/50 transition" onclick="navigate('/app/${app.id}')">

      <div class="flex justify-between mt-3"><span class="badge-pink">v${app.version}</span><button class="text-pink-400 text-sm" onclick="event.stopPropagation();navigate('/build/${app.id}')">Gerar APK</button></div>
    </div>`).join('')}</div>
  ${apps.length === 0 ? '<div class="text-center py-20">Nenhum app ainda. Crie o primeiro!</div>' : ''}

const renderCreateApp = () => `
<div class="max-w-3xl mx-auto px-6 py-10">
  <button class="btn-outline mb-4" onclick="navigate('/dashboard')">← Voltar</button>
  <div class="glass rounded-2xl p-6"><h2 class="text-2xl font-black mb-4">Criar novo app</h2>

    <input type="file" id="caIconFile" accept="image/*" style="display:none" onchange="handleCaImage(this.files[0])">
    <div id="caIconPreview" class="w-16 h-16 mb-3"></div>
    <div class="flex gap-4 mb-4"><label><input type="checkbox" id="caOffline" checked> Offline</label><label><input type="checkbox" id="caDeep"> Deep Link</label><label><input type="checkbox" id="caAnalytics" checked> Analytics</label></div>

</div>`;

const renderAppDetails = (id) => {
  const app = apps.find(a=>a.id===id);
  if(!app) return '<div class="text-center py-20">App não encontrado</div>';
  return `<div class="max-w-4xl mx-auto px-6 py-10"><button class="btn-outline mb-4" onclick="navigate('/dashboard')">← Voltar</button><div class="glass rounded-2xl p-6"><div class="flex gap-4"><div class="w-20 h-20 rounded-xl overflow-hidden">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-2xl font-black">${esc(app.name)}</h2><p>${esc(app.websiteUrl)}</p><button class="btn-primary mt-2" onclick="navigate('/build/${app.id}')">Gerar APK</button><button class="btn-outline mt-2 ml-2" onclick="installPWA()">Instalar ConvertAPK no celular</button></div></div></div></div>`;
};

const renderBuildPage = (id) => {
  const app = apps.find(a=>a.id===id);
  if(!app) return '<div>App não encontrado</div>';
  return `<div class="max-w-6xl mx-auto px-6 py-10"><button class="btn-outline mb-4" onclick="navigate('/app/${id}')">← Voltar</button><div class="grid md:grid-cols-3 gap-6"><div class="md:col-span-2 glass rounded-2xl p-6"><div id="buildPreChecks"><div class="flex gap-4 items-center mb-6"><div class="w-14 h-14 rounded-xl overflow-hidden">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-xl font-black">${esc(app.name)}</h2></div></div><button class="btn-primary w-full" onclick="startBuild(${id})">▶ Iniciar Simulação de Build</button></div><div id="buildProgress" style="display:none"><div id="buildPhaseLabel" class="font-bold mb-2"></div><div class="progress-bar-track"><div id="buildProgressBar" class="progress-bar-fill" style="width:0%"></div></div><div class="text-right text-sm mt-1" id="buildPct">0%</div></div><div id="buildResult" style="display:none"></div></div><div class="glass rounded-2xl p-4"><div class="flex items-center gap-2 mb-3"><span id="consoleStatusDot" class="w-2 h-2 bg-slate-500 rounded-full"></span><span class="text-xs font-bold">CONSOLE</span></div><div id="buildLogs" class="log-output h-80"><span class="text-slate-500">[READY] Ambiente pronto.</span></div></div></div></div>`;
};

const renderPricing = () => `<div class="max-w-4xl mx-auto px-6 py-16 text-center"><h1 class="text-4xl font-black">Planos</h1><div class="grid md:grid-cols-2 gap-6 mt-8"><div class="glass p-6 rounded-2xl"><h3>Grátis</h3><p>PWA completo + simulação de build</p><button class="btn-primary mt-4" onclick="installPWA()">Instalar App Grátis</button></div><div class="glass border-pink-500 p-6 rounded-2xl"><h3>Premium</h3><p>Geração real de APK (backend) + suporte</p><button class="btn-outline mt-4" onclick="handleUpgrade('premium')">Contratar</button></div></div></div>`;

function rerender() {
  const root = document.getElementById('app-root');
  if (!root) return;
  const route = getRoute();
  let main = '';
  if (!user && !['/', '/pricing'].includes(route)) main = renderLanding();
  else if (route === '/') main = renderLanding();
  else if (route === '/dashboard') main = renderDashboard();
  else if (route === '/create-app') main = renderCreateApp();
  else if (route === '/pricing') main = renderPricing();
  else if (route.startsWith('/app/')) main = renderAppDetails(parseInt(route.split('/')[2]));
  else if (route.startsWith('/build/')) main = renderBuildPage(parseInt(route.split('/')[2]));
  else main = renderLanding();
  root.innerHTML = renderNavbar() + `<main class="flex-1">${main}</main>` + renderFooter() + renderToast() + renderEditModal();
}

// Registrar Service Worker (se existir)
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW não encontrado, PWA pode não funcionar'));

loadStorage();
window.addEventListener('hashchange', rerender);
rerender();
</script>
</body>
</html>
