    // ==================== CRC32 + ZIP GENERATOR ====================
    const crcTable = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      crcTable[n] = c >>> 0;
    }

    const crc32 = (data) => {
      let crc = 0xffffffff;
      for (const byte of data) crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      return (crc ^ 0xffffffff) >>> 0;
    };

    const concatLength = (parts) => parts.reduce((a, b) => a + b.length, 0);

    // Gerar APK válido (baseado no template mínimo)
    const generateValidApk = () => {
      const binaryString = atob(MINIMAL_APK_BASE64);
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
      return bytes;
    };

    // Gerar AndroidManifest.xml personalizado
    const generateManifest = (appName, packageName, version, themeColor) => {
      return `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${packageName}"
    android:versionCode="1"
    android:versionName="${version}">

    <uses-permission android:name="android.permission.INTERNET" />
    
    <application

        android:icon="@mipmap/ic_launcher"
        android:label="${appName}"
        android:theme="@style/Theme.Web2APK"
        android:usesCleartextTraffic="true">
        
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden">

    };

    // Criar ZIP completo
    const createCompletePackage = (appName, version, packageName, themeColor, websiteUrl) => {
      const encoder = new TextEncoder();
      const docs = generateDocs(appName, packageName, version, websiteUrl, themeColor);
      const apkData = generateValidApk();
      const manifestXml = generateManifest(appName, packageName, version, themeColor);
      
      const files = [
        { name: `${appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}-v${version}.apk`, data: apkData },
        { name: 'readme.txt', data: encoder.encode(docs.readme) },
        { name: 'license.txt', data: encoder.encode(docs.license) },
        { name: 'certification.txt', data: encoder.encode(docs.certification) },
        { name: 'AndroidManifest.xml', data: encoder.encode(manifestXml) },
        { name: 'app-config.json', data: encoder.encode(JSON.stringify(docs.config, null, 2)) }
      ];

      const localParts = [], centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const checksum = crc32(file.data);
        const localHeader = new Uint8Array(30);
        const lv = new DataView(localHeader.buffer);
        lv.setUint32(0, 0x04034b50, true);
        lv.setUint16(4, 20, true);
        lv.setUint16(6, 0, true);
        lv.setUint16(8, 0, true);
        lv.setUint16(10, 0, true);
        lv.setUint16(12, 0, true);
        lv.setUint32(14, checksum, true);
        lv.setUint32(18, file.data.length, true);
        lv.setUint32(22, file.data.length, true);
        lv.setUint16(26, nameBytes.length, true);
        lv.setUint16(28, 0, true);
        localParts.push(localHeader, nameBytes, file.data);

        const centralHeader = new Uint8Array(46);
        const cv = new DataView(centralHeader.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true);
        cv.setUint16(10, 0, true);
        cv.setUint16(12, 0, true);
        cv.setUint16(14, 0, true);
        cv.setUint32(16, checksum, true);
        cv.setUint32(20, file.data.length, true);
        cv.setUint32(24, file.data.length, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint16(30, 0, true);
        cv.setUint16(32, 0, true);
        cv.setUint16(34, 0, true);
        cv.setUint16(36, 0, true);
        cv.setUint32(38, 0, true);
        cv.setUint32(42, offset, true);
        centralParts.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + file.data.length;
      }

      const endHeader = new Uint8Array(22);
      const ev = new DataView(endHeader.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true);
      ev.setUint16(6, 0, true);
      ev.setUint16(8, files.length, true);
      ev.setUint16(10, files.length, true);
      ev.setUint32(12, concatLength(centralParts), true);
      ev.setUint32(16, offset, true);
      ev.setUint16(20, 0, true);

      const blobParts = [...localParts, ...centralParts, endHeader].map(p => new Uint8Array(p));
      return new Blob(blobParts, { type: 'application/zip' });
    };

    const CreateAppPage = ({ onCreateApp, onNavigate }) => {
      const [name, setName] = useState('');

      const [version, setVersion] = useState('1.0');
      const [color, setColor] = useState('#FF006E');
      useEffect(() => { const su = sessionStorage.getItem('quick_create_url'); const sn = sessionStorage.getItem('quick_create_name'); if(su) { setUrl(su); sessionStorage.removeItem('quick_create_url'); } if(sn) { setName(sn); sessionStorage.removeItem('quick_create_name'); } }, []);
      useEffect(() => { if(!pkg && name) { const clean = name.toLowerCase().replace(/[^a-z0-9]/g, ''); setPkg(`com.app.${clean || 'myapp'}`); } }, [name]);
      const handleSubmit = (e) => { e.preventDefault(); onCreateApp({ name, websiteUrl: url, packageName: pkg, version, themeColor: color, description: '', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false, analyticsEnabled: true }); };
      return (<div className="container mx-auto px-6 py-12 max-w-2xl"><button onClick={() => onNavigate('/dashboard')} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><h1 className="text-3xl font-black mb-6">Criar Novo App</h1><form onSubmit={handleSubmit} className="space-y-5 bg-slate-900/40 p-8 rounded-2xl"><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Nome do App</label><input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="Ex: Meu App" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">URL do Site</label><input type="url" required value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="https://seusite.com" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Package Name</label><input type="text" value={pkg} onChange={e => setPkg(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono text-sm" placeholder="com.exemplo.app" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Versão</label><input type="text" value={version} onChange={e => setVersion(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Cor do Tema</label><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12 rounded-xl" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono" /></div></div><button type="submit" className="w-full py-3.5 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="save" className="w-4 h-4" />Criar App</button></form></div>);
    };

    const AppDetailsPage = ({ app, onNavigate, onUpdateApp, onDeleteApp, onDownload }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [name, setName] = useState(app.name);
      const [url, setUrl] = useState(app.websiteUrl);
      const [color, setColor] = useState(app.themeColor);
      const handleUpdate = (e) => { e.preventDefault(); onUpdateApp(app.id, { name, websiteUrl: url, themeColor: color }); setIsEditing(false); };
      return (<div className="container mx-auto px-6 py-12"><button onClick={() => onNavigate('/dashboard')} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><div className="grid md:grid-cols-3 gap-8"><div className="md:col-span-2"><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8 relative"><div style={{ backgroundColor: app.themeColor }} className="absolute top-0 right-0 w-3 h-3 rounded-bl-lg"></div>{!isEditing ? (<><div className="flex justify-between"><div><h2 className="text-3xl font-bold">{app.name}</h2><p className="text-cyan-400 text-sm">{app.websiteUrl}</p></div><button onClick={() => setIsEditing(true)} className="p-2 border border-slate-700 rounded-xl"><Icon name="edit" className="w-4 h-4" /></button></div><div className="mt-6 flex gap-3"><span className="px-3 py-1.5 bg-slate-800 rounded-lg">v{app.version}</span><span className="px-3 py-1.5 bg-slate-800 rounded-lg font-mono text-sm">{app.packageName}</span></div><div className="mt-6"><button onClick={() => onDownload(app.name, app.version, app.packageName, app.themeColor, app.websiteUrl)} className="px-6 py-3 bg-gradient-to-r from-green-600 to-cyan-500 rounded-xl font-bold flex items-center gap-2"><Icon name="download" className="w-4 h-4" />Baixar APK + Documentação</button></div></>) : (<form onSubmit={handleUpdate} className="space-y-4"><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><input type="url" value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12 rounded-xl" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3" /></div><div className="flex gap-3"><button type="button" onClick={() => setIsEditing(false)} className="flex-1 py-2 border border-slate-700 rounded-xl">Cancelar</button><button type="submit" className="flex-1 py-2 bg-pink-600 rounded-xl font-bold">Salvar</button></div></form>)}</div></div><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6"><h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="folder" className="w-4 h-4 text-cyan-400" />Conteúdo do ZIP</h3><div className="space-y-2 text-xs text-slate-400"><p>📱 APK válido (instalável no Android)</p><p>📄 readme.txt</p><p>📜 license.txt</p><p>🔐 certification.txt</p><p>📁 AndroidManifest.xml</p><p>📁 app-config.json</p></div></div></div></div>);
    };

    // ==================== MAIN APP ====================
    const App = () => {
      const [user, setUser] = useState(() => { const s = localStorage.getItem('w2a_user'); return s ? JSON.parse(s) : null; });
      const [apps, setApps] = useState(() => { const s = localStorage.getItem('w2a_apps'); return s ? JSON.parse(s) : INITIAL_APPS; });
      const [route, setRoute] = useState(() => window.location.hash.slice(1) || '/');
      const [toast, setToast] = useState(null);

      useEffect(() => { localStorage.setItem('w2a_user', JSON.stringify(user)); }, [user]);
      useEffect(() => { localStorage.setItem('w2a_apps', JSON.stringify(apps)); }, [apps]);
      useEffect(() => { const handler = () => setRoute(window.location.hash.slice(1) || '/'); window.addEventListener('hashchange', handler); return () => window.removeEventListener('hashchange', handler); }, []);

      const navigate = (r) => { window.location.hash = r; setRoute(r); };
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const login = () => { setUser({ id: 1, name: "Dev", role: "user" }); showToast("✅ Conectado!"); navigate('/dashboard'); };
      const logout = () => { setUser(null); showToast("👋 Desconectado"); navigate('/'); };
      const createApp = (data) => { const newApp = { ...data, id: Date.now(), userId: 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }; setApps([newApp, ...apps]); showToast(`🎉 App "${newApp.name}" criado!`); navigate('/dashboard'); };
      const deleteApp = (id) => { setApps(apps.filter(a => a.id !== id)); showToast("🗑️ App removido"); };
      const updateApp = (id, data) => { setApps(apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a)); showToast("💾 App atualizado"); };
      const handleDownload = (appName, version, packageName, themeColor, websiteUrl) => {
        const blob = createCompletePackage(appName, version, packageName, themeColor, websiteUrl);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}-v${version}.zip`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 100);
        showToast(`📦 Pacote gerado! Contém APK válido + documentação completa.`);
      };

      let content;
      if (route === '/') content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (!user && (route === '/dashboard' || route === '/create-app' || route.startsWith('/app/'))) content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (route === '/dashboard') content = <DashboardPage apps={apps} onNavigate={navigate} onDeleteApp={deleteApp} />;
      else if (route === '/create-app') content = <CreateAppPage onCreateApp={createApp} onNavigate={navigate} />;
      else if (route.startsWith('/app/')) { const id = parseInt(route.split('/')[2]); const app = apps.find(a => a.id === id); if (!app) content = <DashboardPage apps={apps} onNavigate={navigate} onDeleteApp={deleteApp} />; else content = <AppDetailsPage app={app} onNavigate={navigate} onUpdateApp={updateApp} onDeleteApp={deleteApp} onDownload={handleDownload} />; }
      else content = <LandingPage onLogin={login} onNavigate={navigate} />;

      return (<div className="flex flex-col min-h-screen bg-slate-950"><Navbar user={user} onNavigate={navigate} onLogin={login} onLogout={logout} /><main className="flex-1">{content}</main>{toast && <div className="fixed bottom-6 right-6 bg-slate-900 border border-pink-500 rounded-2xl px-5 py-3 z-50 animate-fade-in-up">{toast}</div>}<Footer /></div>);
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
