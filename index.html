<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ConvertAPK • Criador de APK No-Code</title>
  <!-- PWA metas -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF006E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CnvertAPK">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- Tailwind + fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { scroll-behavior: smooth; }
    body { background-color: #020617; font-family: 'Rajdhani', sans-serif; }
    h1,h2,h3,h4 { font-family: 'Orbitron', monospace; }
    .glass { backdrop-filter: blur(12px); background: rgba(15,23,42,0.7); border: 1px solid rgba(51,65,85,0.6); }
    .glass-pink { border-color: rgba(255,0,110,0.3); }
    .btn-primary { background: linear-gradient(135deg, #FF006E, #9333ea); color: white; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 0.75rem; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 20px rgba(255,0,110,0.4); }
    .btn-outline { background: transparent; border: 1px solid rgba(255,0,110,0.5); color: #FF006E; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: rgba(255,0,110,0.1); border-color: #FF006E; }
    .input-field { width: 100%; background: rgba(2,6,23,0.8); border: 1px solid #1e293b; color: #e2e8f0; padding: 0.65rem 1rem; border-radius: 0.75rem; outline: none; }
    .input-field:focus { border-color: #FF006E; box-shadow: 0 0 0 2px rgba(255,0,110,0.2); }
    .upload-zone { border: 2px dashed rgba(255,0,110,0.3); border-radius: 1rem; padding: 1rem; text-align: center; cursor: pointer; transition: 0.2s; background: rgba(255,0,110,0.03); }
    .upload-zone:hover { border-color: #FF006E; background: rgba(255,0,110,0.08); }
    .toast { position: fixed; bottom: 2rem; right: 1.5rem; z-index: 9999; padding: 0.85rem 1.4rem; border-radius: 1rem; backdrop-filter: blur(12px); animation: slideUp 0.3s ease; }
    .toast-success { background: rgba(15,23,42,0.95); border: 1px solid #4ade80; color: #4ade80; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .app-icon-default { background: linear-gradient(135deg, #1e1b4b, #4c1d95); display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; flex-shrink: 0; font-size: 1.5rem; }
    .progress-bar-track { width: 100%; height: 8px; background: #1e293b; border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #FF006E, #00d9ff); transition: width 0.3s ease; }
    .log-output { background: #020617; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8; height: 280px; overflow-y: auto; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">

<div id="app-root" class="flex flex-col min-h-screen"></div>

<script>
// ======================== ESTADO GLOBAL ========================
let user = null;
let apps = [];
let builds = [];
let toastQueue = [];
let editModalAppId = null;
let currentToast = null;

// Carregar / salvar
const loadStorage = () => {
  try {
    user = JSON.parse(localStorage.getItem('w2a_user'));
    apps = JSON.parse(localStorage.getItem('w2a_apps')) || [
      { id: 1, userId: 1, name: "TechNews Brasil", description: "Portal de tecnologia", websiteUrl: "https://technews.com.br", packageName: "com.Convertapk.technews", version: "1.2.0", themeColor: "#FF006E", orientation: "portrait", permissions: ["INTERNET"], offlineSupport: true, deepLinking: false, analyticsEnabled: true, iconUrl: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=100&q=80", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }
    ];
    builds = JSON.parse(localStorage.getItem('w2a_builds')) || [];
  } catch(e) { console.warn(e); }
};
const persist = () => {
  localStorage.setItem('w2a_user', JSON.stringify(user));
  localStorage.setItem('w2a_apps', JSON.stringify(apps));
  localStorage.setItem('w2a_builds', JSON.stringify(builds));
};

// Rotas
const getRoute = () => window.location.hash.slice(1) || '/';
const navigate = (route) => { window.location.hash = route; rerender(); };

// Toast
const toast = (msg, type='success') => {
  toastQueue.push({ msg, type });
  if (!currentToast) showNextToast();
};
const showNextToast = () => {
  if (!toastQueue.length) { currentToast = null; rerender(); return; }
  currentToast = toastQueue.shift();
  rerender();
  setTimeout(showNextToast, 3000);
};

// Helpers
const esc = (str) => String(str ?? '').replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
const formatBytes = (b) => b ? (b/1e6).toFixed(1)+' MB' : '-';
const formatDate = (s) => s ? new Date(s).toLocaleDateString('pt-BR') : '-';

// Gerenciamento de apps e builds
const createApp = (data) => {
  const newApp = { ...data, id: Date.now(), userId: user?.id || 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  apps = [newApp, ...apps];
  persist();
  toast(`"${newApp.name}" criado! ✨`);
  navigate('/dashboard');
};
const updateApp = (id, data) => {
  apps = apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a);
  persist();
  toast("App atualizado");
  rerender();
};
const deleteApp = (id) => {
  apps = apps.filter(a => a.id !== id);
  builds = builds.filter(b => b.appId !== id);
  persist();
  toast("App removido");
  navigate('/dashboard');
};
const addBuild = (build) => {
  const idx = builds.findIndex(b => b.id === build.id);
  if (idx >= 0) builds[idx] = build;
  else builds = [build, ...builds];
  persist();
  rerender();
};

// Auth
const handleLogin = () => {
  user = { id: 1, name: "Cyber Dev", email: "dev@convertapk.com", role: "user" };
  persist();
  toast("Conectado! 🖥️");
  navigate('/dashboard');
};
const handleLogout = () => {
  user = null;
  persist();
  toast("Desconectado");
  navigate('/');
};
const handleUpgrade = (tier) => {
  if (!user) user = { id: 1, name: "Cyber Dev", email: "dev@web2apk.com", role: tier };
  else user.role = tier;
  persist();
  toast(`Plano ${tier.toUpperCase()} ativado! 🚀`);
  navigate('/dashboard');
};

// ======================== DOWNLOAD APK (MENSAGEM EDUCATIVA) ========================
const downloadApk = (appName, version) => {
  // Em vez de gerar APK inválido, exibimos um alerta explicativo
  // Isso evita o erro "Falha ao analisar o pacote" no celular.
  const msg = `⚠️ APK REAL requer BACKEND.\n\nO arquivo gerado pelo navegador NÃO é um APK Android válido.\n\n✅ Para gerar APKs funcionais e instaláveis, ative o plano Premium e utilize nossa API de compilação em servidor.\n\n📱 Teste a versão PWA: adicione este site à tela inicial e use como um app nativo!`;
  alert(msg);
  toast("APK real só é gerado no servidor (Plano Premium)", "error");
};

// ======================== SIMULAÇÃO DE BUILD (sem download falso) ========================
function startBuild(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;

  const pre = document.getElementById('buildPreChecks');
  const prog = document.getElementById('buildProgress');
  const result = document.getElementById('buildResult');
  if (pre) pre.style.display = 'none';
  if (prog) prog.style.display = 'block';

  const buildId = Date.now();
  const newBuild = { id: buildId, appId, userId: user?.id || 1, status: 'building', createdAt: new Date().toISOString(), buildStartedAt: new Date().toISOString() };
  addBuild(newBuild);

  const logsDiv = document.getElementById('buildLogs');
  const bar = document.getElementById('buildProgressBar');
  const pct = document.getElementById('buildPct');
  const phaseLabel = document.getElementById('buildPhaseLabel');
  const dot = document.getElementById('consoleStatusDot');
  if (dot) dot.style.background = '#facc15';

  const log = (msg, type = '') => {
    if (logsDiv) logsDiv.innerHTML += `\n<span class="${type ? 'text-'+type : ''}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
    logsDiv.scrollTop = logsDiv.scrollHeight;
  };
  log(`🚀 Build iniciado para ${app.name}`, 'info');

  const phases = [
    "Validando URL", "Baixando assets", "Compilando WebView", "Gerando manifesto",
    "Assinando certificado", "Empacotando APK", "Verificando integridade"
  ];
  let step = 0;
  const totalSteps = phases.length;
  const interval = setInterval(() => {
    if (step >= totalSteps) {
      clearInterval(interval);
      const completedBuild = { ...newBuild, status: 'completed', fileSize: 28_000_000 + Math.floor(Math.random() * 10_000_000), buildCompletedAt: new Date().toISOString() };
      addBuild(completedBuild);
      log("✅ Build concluída com sucesso!", "green-400");
      if (bar) bar.style.width = '100%';
      if (pct) pct.textContent = '100%';
      if (phaseLabel) phaseLabel.textContent = 'Finalizado!';
      if (dot) dot.style.background = '#4ade80';
      if (result) {
        result.style.display = 'block';
        result.innerHTML = `
          <div class="text-center p-4 border border-green-500/30 rounded-xl bg-green-500/5">
            <div class="text-2xl mb-2">🎉</div>
            <div class="text-green-400 font-bold">APK Gerado (Simulação)</div>
            <div class="text-sm text-slate-400 my-2">Tamanho aproximado: ${formatBytes(completedBuild.fileSize)}</div>
            <button class="btn-primary" onclick="downloadApk('${esc(app.name)}','${esc(app.version)}')">⬇ Baixar APK (somente backend real)</button>
            <div class="text-xs text-slate-500 mt-3">🔒 APK funcional requer assinatura em servidor. Ative o plano Premium para gerar APKs reais.</div>
          </div>`;
      }
      return;
    }
    const percent = Math.round(((step+1) / totalSteps) * 100);
    if (bar) bar.style.width = percent + '%';
    if (pct) pct.textContent = percent + '%';
    if (phaseLabel) phaseLabel.textContent = phases[step];
    log(`[${phases[step]}] ...`, 'info');
    step++;
  }, 700);
}

// ======================== IMAGEM (UPLOAD / PREVIEW) ========================
const fileToBase64 = (file) => new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
let caIconData = null;
let quickIconData = null;
let editIconData = null;

// Create page handlers
window.handleCaImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return toast('Apenas imagens', 'error');
  if (file.size > 2e6) return toast('Máx 2MB', 'error');
  fileToBase64(file).then(b64 => { caIconData = b64; document.getElementById('caIconPreview').innerHTML = `<img src="${b64}" class="w-full h-full object-cover rounded-xl">`; });
};
window.clearCaIcon = () => { caIconData = null; document.getElementById('caIconPreview').innerHTML = '📱'; document.getElementById('caIconUrl').value = ''; };
window.submitCreateApp = () => {
  const name = document.getElementById('caName')?.value.trim();
  const url = document.getElementById('caUrl')?.value.trim();
  const pkg = document.getElementById('caPkg')?.value.trim();
  if (!name || !url || !pkg) return toast('Preencha todos os campos', 'error');
  createApp({
    name, websiteUrl: url, description: document.getElementById('caDesc')?.value || '',
    packageName: pkg, version: document.getElementById('caVersion')?.value || '1.0.0',
    themeColor: document.getElementById('caColor')?.value || '#FF006E', orientation: document.getElementById('caOrientation')?.value || 'portrait',
    permissions: ['INTERNET'], offlineSupport: document.getElementById('caOffline')?.checked || false,
    deepLinking: document.getElementById('caDeep')?.checked || false, analyticsEnabled: document.getElementById('caAnalytics')?.checked || false,
    iconUrl: caIconData || document.getElementById('caIconUrl')?.value || ''
  });
};

// Quick form
window.handleQuickImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return;
  fileToBase64(file).then(b64 => { quickIconData = b64; document.getElementById('quickIconPreview').innerHTML = `<img src="${b64}" class="h-12 rounded-lg">`; });
};
window.handleQuickForm = () => {
  const name = document.getElementById('qName')?.value.trim() || 'Quick App';
  const url = document.getElementById('qUrl')?.value.trim();
  if (!url) return toast('URL obrigatória', 'error');
  if (!user) handleLogin();
  createApp({
    name, websiteUrl: url, description: 'Criado rapidamente', packageName: `com.quick.${Date.now()}`, version: '1.0.0',
    themeColor: '#FF006E', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false,
    analyticsEnabled: true, iconUrl: quickIconData || ''
  });
  quickIconData = null;
};

// Edit modal
window.openEditModal = (id) => { editModalAppId = id; editIconData = null; rerender(); };
window.saveEditModal = (id) => {
  const name = document.getElementById('editName')?.value.trim();
  const url = document.getElementById('editUrl')?.value.trim();
  if (!name || !url) return toast('Nome e URL obrigatórios', 'error');
  const icon = editIconData || document.getElementById('editIconUrl')?.value.trim() || apps.find(a=>a.id===id)?.iconUrl || '';
  updateApp(id, {
    name, websiteUrl: url, description: document.getElementById('editDesc')?.value || '',
    packageName: document.getElementById('editPkg')?.value || '', version: document.getElementById('editVersion')?.value || '1.0.0',
    themeColor: document.getElementById('editColor')?.value || '#FF006E', orientation: document.getElementById('editOrientation')?.value || 'portrait',
    offlineSupport: document.getElementById('editOffline')?.checked || false,
    deepLinking: document.getElementById('editDeep')?.checked || false, analyticsEnabled: document.getElementById('editAnalytics')?.checked || false,
    iconUrl: icon
  });
  editModalAppId = null;
  editIconData = null;
  rerender();
};
window.handleEditImage = (file) => {
  if (!file || !file.type.startsWith('image/')) return;
  fileToBase64(file).then(b64 => { editIconData = b64; document.getElementById('editIconPreview').innerHTML = `<img src="${b64}" class="w-16 h-16 rounded-xl object-cover">`; });
};

// ======================== RENDERIZAÇÃO DAS PÁGINAS ========================
const renderNavbar = () => `
  <nav class="sticky top-0 z-50 border-b border-pink-500/20 backdrop-blur-xl bg-slate-950/80">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div onclick="navigate('/')" class="flex items-center gap-3 cursor-pointer">
        <div class="w-10 h-10 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg">⚡</div>
        <div><div class="text-2xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">ConvertAPK</div><div class="text-[10px] text-cyan-400">CYBER ENGINE</div></div>
      </div>
      <div class="flex items-center gap-4">
        ${user ? `
          <span class="nav-link hidden sm:block cursor-pointer" onclick="navigate('/dashboard')">Painel</span>
          <span class="nav-link hidden sm:block cursor-pointer" onclick="navigate('/create-app')">Novo App</span>
          <div class="flex items-center gap-2 bg-slate-900/60 px-3 py-1 rounded-full border border-pink-500/20">
            <span class="text-sm font-bold">${esc(user.name)}</span>
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-600 to-cyan-400 flex items-center justify-center font-bold">${user.name.charAt(0)}</div>
          </div>
          <button class="btn-outline text-sm py-1 px-3" onclick="handleLogout()">Sair</button>
        ` : `
          <span class="nav-link cursor-pointer" onclick="navigate('/pricing')">Planos</span>
          <button class="btn-primary" onclick="handleLogin()">Entrar</button>
        `}
      </div>
    </div>
  </nav>`;

const renderFooter = () => `
  <footer class="border-t border-pink-500/10 bg-slate-950/50 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-4 gap-8 text-sm text-slate-400">
      <div><div class="font-bold text-pink-500">ConvertAPK</div><p>Converta sites em APKs sem código.</p></div>
      <div><div class="font-bold text-cyan-400">Funcionalidades</div><ul><li>Offline</li><li>Push</li><li>AdMob</li></ul></div>
      <div><div class="font-bold text-purple-400">Links</div><ul><li class="cursor-pointer hover:text-pink-400" onclick="navigate('/dashboard')">Dashboard</li><li class="cursor-pointer hover:text-pink-400" onclick="navigate('/create-app')">Criar App</li></ul></div>
      <div><div class="font-bold text-yellow-400">Status</div><div>✅ Build Engine Online</div></div>
    </div>
    <div class="text-center text-xs text-slate-600 mt-8">© 2026 Web2APK — PWA instalável</div>
  </footer>`;

const renderToast = () => currentToast ? `<div class="toast toast-success">${currentToast.msg}</div>` : '';

const renderEditModal = () => {
  if (!editModalAppId) return '';
  const app = apps.find(a => a.id === editModalAppId);
  if (!app) return '';
  return `
  <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onclick="if(event.target===this) editModalAppId=null; rerender()">
    <div class="glass glass-pink rounded-2xl p-6 max-w-lg w-full">
      <div class="flex justify-between items-center mb-4"><h3 class="text-xl">✏️ Editar App</h3><button onclick="editModalAppId=null;rerender()" class="text-slate-400 text-2xl">✕</button></div>
      <div class="space-y-3">
        <div><label class="field-label">Ícone</label><div class="flex gap-3"><div id="editIconPreview" class="w-16 h-16 rounded-xl overflow-hidden bg-slate-800">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div class="flex-1"><div class="upload-zone" onclick="document.getElementById('editIconFile').click()">📸 Clique para trocar</div><input type="file" id="editIconFile" accept="image/*" style="display:none" onchange="handleEditImage(this.files[0])"><input class="input-field mt-2" id="editIconUrl" placeholder="Ou URL da imagem" value="${esc(app.iconUrl?.startsWith('http') ? app.iconUrl : '')}"></div></div></div>
        <input class="input-field" id="editName" placeholder="Nome" value="${esc(app.name)}">
        <input class="input-field" id="editUrl" placeholder="URL" value="${esc(app.websiteUrl)}">
        <textarea class="input-field" id="editDesc" rows="2" placeholder="Descrição">${esc(app.description)}</textarea>
        <input class="input-field" id="editPkg" value="${esc(app.packageName)}">
        <input class="input-field" id="editVersion" value="${esc(app.version)}">
        <input type="color" id="editColor" value="${app.themeColor}" class="w-full h-10 rounded-xl">
        <div class="flex gap-4 items-center"><label class="flex items-center gap-2"><input type="checkbox" id="editOffline" ${app.offlineSupport ? 'checked' : ''}> Offline</label><label><input type="checkbox" id="editDeep" ${app.deepLinking ? 'checked' : ''}> Deep Link</label><label><input type="checkbox" id="editAnalytics" ${app.analyticsEnabled ? 'checked' : ''}> Analytics</label></div>
        <div class="flex gap-3 pt-2"><button class="btn-primary flex-1" onclick="saveEditModal(${app.id})">Salvar</button><button class="btn-outline" onclick="editModalAppId=null;rerender()">Cancelar</button></div>
      </div>
    </div>
  </div>`;
};

const renderLanding = () => `
<div class="max-w-7xl mx-auto px-6 py-16 grid md:grid-cols-2 gap-12 items-center">
  <div><div class="inline-flex gap-2 bg-pink-500/10 border border-pink-500/30 rounded-full px-4 py-1 mb-4"><span class="w-2 h-2 bg-pink-500 rounded-full"></span><span class="text-xs font-bold text-pink-400">PWA INSTALÁVEL</span></div>
  <h1 class="text-4xl md:text-6xl font-black leading-tight">Transforme seu <span class="bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">site em app</span> Android</h1>
  <p class="text-slate-400 text-lg my-6">Crie APKs profissionais sem código — e instale esta ferramenta na tela inicial do seu celular como um app nativo!</p>
  <div class="flex gap-4"><button class="btn-primary" onclick="handleLogin()">Criar App Grátis →</button><button class="btn-outline" onclick="navigate('/pricing')">Planos</button></div>
  <div class="flex gap-8 mt-8"><div><div class="text-3xl font-black text-pink-500">12K+</div><div>APKs gerados</div></div><div><div class="text-3xl font-black text-cyan-400">30s</div><div>build média</div></div></div></div>
  <div class="glass rounded-2xl p-6"><h3 class="text-xl font-black mb-4">⚡ Criador Expresso</h3><div class="space-y-3"><input class="input-field" id="qName" placeholder="Nome do App"><input class="input-field" id="qUrl" placeholder="https://meusite.com"><div class="upload-zone" onclick="document.getElementById('quickIconInput').click()"><div id="quickIconPreview">📸 Clique para adicionar ícone</div></div><input type="file" id="quickIconInput" accept="image/*" style="display:none" onchange="handleQuickImage(this.files[0])"><button class="btn-primary w-full justify-center" onclick="handleQuickForm()">Gerar APK →</button></div></div>
</div>
<div class="text-center py-16"><h2 class="text-3xl font-black">Como funciona em 4 passos</h2><div class="grid md:grid-cols-4 gap-6 mt-10 max-w-6xl mx-auto px-6">${['Cole a URL','Personalize ícone','Compile APK','Baixe e instale'].map((t,i)=>`<div class="glass p-6 rounded-2xl"><div class="text-5xl text-pink-500">0${i+1}</div><h3 class="font-bold mt-2">${t}</h3></div>`).join('')}</div></div>`;

const renderDashboard = () => {
  const totalBuilds = builds.filter(b=>b.status==='completed').length;
  return `
  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">Painel do Dev</h1><button class="btn-primary" onclick="navigate('/create-app')">+ Novo App</button></div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"><div class="glass p-5 rounded-2xl"><div>Total Apps</div><div class="text-4xl font-black">${apps.length}</div></div><div class="glass p-5"><div>Builds Concluídas</div><div class="text-4xl font-black">${totalBuilds}</div></div><div class="glass p-5"><div>Plano</div><div class="text-xl font-bold">${user?.role === 'premium' ? '⭐ Premium' : 'Free'}</div></div></div>
    <div class="grid md:grid-cols-2 gap-5">${apps.map(app => `
      <div class="glass glass-pink rounded-2xl p-4 hover:border-pink-500/50 transition cursor-pointer" onclick="navigate('/app/${app.id}')">
        <div class="flex justify-between items-start"><div class="flex gap-3"><div class="w-12 h-12 rounded-xl overflow-hidden bg-slate-800">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><div class="font-bold">${esc(app.name)}</div><div class="text-xs text-slate-400 truncate w-48">${esc(app.websiteUrl)}</div></div></div><button class="text-red-400 text-sm" onclick="event.stopPropagation(); if(confirm('Deletar?')) deleteApp(${app.id})">🗑️</button></div>
        <div class="flex justify-between mt-3 text-xs"><span>📅 ${formatDate(app.createdAt)}</span><span class="bg-slate-800 px-2 py-0.5 rounded">v${esc(app.version)}</span></div>
      </div>`).join('')}</div>
    ${!apps.length ? '<div class="text-center py-20">Nenhum app criado ainda.<br><button class="btn-primary mt-4" onclick="navigate(\'/create-app\')">Criar primeiro app</button></div>' : ''}
  </div>`;
};

const renderCreateApp = () => `
<div class="max-w-4xl mx-auto px-6 py-10">
  <button class="btn-outline mb-6" onclick="navigate('/dashboard')">← Voltar</button>
  <div class="glass glass-pink rounded-2xl p-8"><h2 class="text-2xl font-black mb-6">Criar novo aplicativo</h2>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="space-y-4"><input class="input-field" id="caName" placeholder="Nome do App *"><input class="input-field" id="caUrl" placeholder="URL do Site *"><textarea class="input-field" id="caDesc" rows="3" placeholder="Descrição"></textarea><input class="input-field" id="caPkg" placeholder="Package Name (ex: com.exemplo.app)"><input class="input-field" id="caVersion" value="1.0.0"><input type="color" id="caColor" value="#FF006E" class="w-full h-10 rounded-xl"></div>
      <div class="space-y-4"><div><label class="field-label">Ícone do App</label><div id="caIconPreview" class="w-32 h-32 mx-auto rounded-xl bg-slate-800 flex items-center justify-center text-4xl mb-3">📱</div><div class="upload-zone" onclick="document.getElementById('caIconFile').click()">📸 Clique para enviar imagem</div><input type="file" id="caIconFile" accept="image/*" style="display:none" onchange="handleCaImage(this.files[0])"><input class="input-field mt-2" id="caIconUrl" placeholder="Ou URL da imagem"></div><div><button class="btn-danger w-full" onclick="clearCaIcon()">Remover ícone</button></div><select class="input-field" id="caOrientation"><option value="portrait">Portrait</option><option value="landscape">Landscape</option></select><div class="flex gap-4"><label><input type="checkbox" id="caOffline" checked> Offline</label><label><input type="checkbox" id="caDeep"> Deep Link</label><label><input type="checkbox" id="caAnalytics" checked> Analytics</label></div></div>
    </div>
    <div class="flex gap-4 mt-8"><button class="btn-primary flex-1" onclick="submitCreateApp()">Criar App</button><button class="btn-outline" onclick="navigate('/dashboard')">Cancelar</button></div>
  </div>
</div>`;

const renderAppDetails = (id) => {
  const app = apps.find(a => a.id === id);
  if (!app) return '<div class="text-center py-20">App não encontrado</div>';
  const appBuilds = builds.filter(b => b.appId === id);
  return `
  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center flex-wrap gap-4 mb-8"><button class="btn-outline" onclick="navigate('/dashboard')">← Dashboard</button><div><button class="btn-primary" onclick="navigate('/build/${id}')">📱 Nova Compilação</button><button class="btn-outline ml-3" onclick="openEditModal(${id})">✏️ Editar</button><button class="btn-danger ml-3" onclick="if(confirm('Excluir?')) deleteApp(${id})">🗑️</button></div></div>
    <div class="grid lg:grid-cols-3 gap-8"><div class="lg:col-span-2 glass rounded-2xl p-6"><div class="flex gap-4"><div class="w-20 h-20 rounded-xl overflow-hidden bg-slate-800">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-2xl font-black">${esc(app.name)}</h2><a href="${app.websiteUrl}" target="_blank" class="text-pink-400 text-sm">${app.websiteUrl} ↗</a><div class="flex gap-2 mt-2"><span class="badge-pink px-2 py-0.5 rounded-full text-xs">v${app.version}</span>${app.offlineSupport ? '<span class="badge-green px-2 py-0.5 rounded-full text-xs">Offline</span>' : ''}</div></div></div><div class="mt-4"><p>${esc(app.description || 'Sem descrição')}</p><div class="grid grid-cols-2 gap-3 text-sm mt-4"><span>📦 ${app.packageName}</span><span>🎨 Cor: ${app.themeColor}</span><span>📱 ${app.orientation}</span><span>📅 Criado: ${formatDate(app.createdAt)}</span></div></div></div>
      <div class="glass rounded-2xl p-5"><h3 class="font-bold mb-3">📋 Histórico de builds</h3>${appBuilds.length ? appBuilds.map(b => `<div class="border-b border-slate-800 py-2"><div class="flex justify-between"><span class="text-${b.status==='completed'?'green-400':'yellow-400'}">${b.status}</span><span class="text-xs">${formatDate(b.createdAt)}</span></div>${b.fileSize ? `<div class="text-xs text-slate-400">${formatBytes(b.fileSize)}</div>` : ''}${b.status==='completed' ? `<button class="text-pink-400 text-xs mt-1" onclick="downloadApk('${esc(app.name)}','${esc(app.version)}')">⬇ Baixar APK (simulado)</button>` : ''}</div>`).join('') : '<p class="text-slate-500">Nenhum build ainda. Clique em "Nova Compilação".</p>'}</div>
    </div>
  </div>`;
};

const renderBuildPage = (id) => {
  const app = apps.find(a => a.id === id);
  if (!app) return '<div class="text-center py-20">App não encontrado</div>';
  return `
  <div class="max-w-6xl mx-auto px-6 py-10">
    <button class="btn-outline mb-6" onclick="navigate('/app/${id}')">← Voltar</button>
    <div class="grid md:grid-cols-3 gap-6"><div class="md:col-span-2 glass rounded-2xl p-6"><div id="buildPreChecks"><div class="flex gap-4 items-center mb-6"><div class="w-14 h-14 rounded-xl overflow-hidden">${app.iconUrl ? `<img src="${app.iconUrl}" class="w-full h-full object-cover">` : '<div class="app-icon-default w-full h-full">📱</div>'}</div><div><h2 class="text-xl font-black">${esc(app.name)}</h2><div class="text-sm text-slate-400">${app.websiteUrl}</div></div></div><button class="btn-primary w-full justify-center" onclick="startBuild(${id})">▶ Iniciar Compilação</button></div><div id="buildProgress" style="display:none"><div id="buildPhaseLabel" class="font-bold mb-2"></div><div class="progress-bar-track"><div id="buildProgressBar" class="progress-bar-fill" style="width:0%"></div></div><div class="text-right text-sm mt-1" id="buildPct">0%</div><div id="buildPhases" class="mt-3 space-y-1"></div></div><div id="buildResult" style="display:none"></div></div><div class="glass rounded-2xl p-4"><div class="flex items-center gap-2 mb-3"><span id="consoleStatusDot" class="w-2 h-2 bg-slate-500 rounded-full"></span><span class="text-xs font-bold">CONSOLE</span></div><div id="buildLogs" class="log-output"><span class="text-slate-500">[READY] Engine aguardando...</span></div></div></div>
  </div>`;
};

const renderPricing = () => `
<div class="max-w-6xl mx-auto px-6 py-16 text-center"><h1 class="text-4xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">Planos Cyberpunk</h1><div class="grid md:grid-cols-3 gap-8 mt-12"><div class="glass p-6 rounded-2xl"><h3>Free</h3><div class="text-3xl font-black">R$ 0</div><ul class="my-4"><li>✓ 2 apps</li><li>✓ Simulação de build</li><li>✗ APK real</li></ul><button class="btn-outline w-full" onclick="handleLogin()">Começar</button></div><div class="glass border-pink-500 shadow-lg p-6 rounded-2xl relative"><div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-pink-500 text-black text-xs px-3 py-1 rounded-full">🔥 Popular</div><h3>Premium Pro</h3><div class="text-3xl font-black">R$ 29/mês</div><ul class="my-4"><li>✓ Apps ilimitados</li><li>✓ Geração real de APK (backend)</li><li>✓ AdMob + notificações</li></ul><button class="btn-primary w-full" onclick="handleUpgrade('premium')">Ativar Premium</button></div><div class="glass p-6 rounded-2xl"><h3>Enterprise</h3><div class="text-3xl font-black">R$ 99</div><ul><li>✓ Tudo do Premium</li><li>✓ API Rest</li></ul><button class="btn-outline w-full" onclick="handleUpgrade('enterprise')">Contratar</button></div></div></div>`;

// ======================== RENDER PRINCIPAL ========================
function rerender() {
  const root = document.getElementById('app-root');
  if (!root) return;
  const route = getRoute();
  let main = '';
  if (!user && !['/', '/pricing'].includes(route)) main = renderLanding();
  else if (route === '/') main = renderLanding();
  else if (route === '/dashboard') main = renderDashboard();
  else if (route === '/create-app') main = renderCreateApp();
  else if (route === '/pricing') main = renderPricing();
  else if (route.startsWith('/app/')) main = renderAppDetails(parseInt(route.split('/')[2]));
  else if (route.startsWith('/build/')) main = renderBuildPage(parseInt(route.split('/')[2]));
  else main = renderLanding();
  root.innerHTML = renderNavbar() + `<main class="flex-1">${main}</main>` + renderFooter() + renderToast() + renderEditModal();
}

// Registrar Service Worker para PWA (se existir)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW não registrado (arquivo ausente)', e));
}

// Inicializar
loadStorage();
window.addEventListener('hashchange', rerender);
rerender();
</script>
</body>
</html>
