<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ConvertAPK • Instale qualquer site como app nativo</title>
  <meta name="theme-color" content="#FF006E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ConvertAPK">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF006E; --cyan: #00d9ff; --purple: #7C3AED;
      --bg: #020617; --surface: rgba(15,23,42,.72);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); font-family: 'Rajdhani', sans-serif; font-size: 16px; min-height: 100vh; color: #e2e8f0; }
    h1,h2,h3,h4 { font-family: 'Orbitron', monospace; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }

    /* ── Grid bg ── */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,0,110,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,110,.04) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── Glass ── */
    .glass { backdrop-filter: blur(14px); background: var(--surface); border: 1px solid rgba(51,65,85,.55); }
    .glass-pink  { border-color: rgba(255,0,110,.35) !important; }
    .glass-cyan  { border-color: rgba(0,217,255,.3) !important; background: rgba(0,217,255,.04) !important; }
    .glass-green { border-color: rgba(74,222,128,.3) !important; background: rgba(74,222,128,.04) !important; }

    /* ── Buttons ── */
    .btn { font-family: 'Rajdhani', sans-serif; font-weight: 700; border: none; cursor: pointer;
           display: inline-flex; align-items: center; gap: .4rem; border-radius: .75rem;
           padding: .6rem 1.4rem; transition: all .2s; font-size: 1rem; line-height: 1; }
    .btn-primary { background: linear-gradient(135deg, var(--pink), #9333ea); color: #fff; }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); box-shadow: 0 0 24px rgba(255,0,110,.45); }
    .btn-cyan  { background: linear-gradient(135deg, #0891b2, var(--cyan)); color: #000; }
    .btn-cyan:hover  { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-green { background: linear-gradient(135deg, #15803d, #4ade80); color: #000; }
    .btn-green:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid rgba(255,0,110,.5); color: var(--pink); }
    .btn-outline:hover { background: rgba(255,0,110,.1); border-color: var(--pink); }
    .btn-ghost  { background: transparent; border: 1px solid rgba(51,65,85,.7); color: #94a3b8; }
    .btn-ghost:hover  { border-color: #94a3b8; color: #e2e8f0; }
    .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,.4); color: #f87171; }
    .btn-danger:hover { background: rgba(239,68,68,.1); }
    .btn-pwa { background: linear-gradient(135deg, #7C3AED, #06b6d4); color: #fff; }
    .btn-pwa:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 24px rgba(124,58,237,.45); }

    /* ── Inputs ── */
    .input-field { width: 100%; background: rgba(2,6,23,.85); border: 1px solid #1e293b; color: #e2e8f0;
                   padding: .65rem 1rem; border-radius: .75rem; outline: none;
                   font-family: 'Rajdhani', sans-serif; font-size: 1rem; transition: border-color .2s, box-shadow .2s; }
    .input-field:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,0,110,.15); }
    .input-field::placeholder { color: #475569; }
    .field-label { display: block; font-size: .7rem; font-weight: 700; letter-spacing: .08em;
                   text-transform: uppercase; color: #64748b; margin-bottom: .35rem; }

    /* ── Upload zone ── */
    .upload-zone { border: 2px dashed rgba(255,0,110,.3); border-radius: 1rem; padding: 1.2rem;
                   text-align: center; cursor: pointer; transition: all .2s; background: rgba(255,0,110,.03); }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--pink); background: rgba(255,0,110,.09); }

    /* ── Progress ── */
    .prog-track { width: 100%; height: 8px; background: #1e293b; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 99px;
                 background: linear-gradient(90deg, var(--pink), var(--cyan)); transition: width .45s ease; }

    /* ── Log console ── */
    .log-box { background: #020617; border: 1px solid #1e293b; border-radius: .75rem; padding: .75rem;
               font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: #64748b;
               overflow-y: auto; height: 280px; line-height: 1.6; }
    .log-ok   { color: #4ade80; } .log-info { color: #38bdf8; }
    .log-warn { color: #facc15; } .log-err  { color: #f87171; }
    .log-pink { color: #f472b6; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 2rem; right: 1.5rem; z-index: 9999;
             padding: .85rem 1.4rem; border-radius: 1rem; backdrop-filter: blur(14px);
             animation: slideUp .3s ease; display: flex; align-items: center; gap: .6rem;
             max-width: 400px; font-weight: 700; font-size: .9rem; }
    .toast-success { background: rgba(15,23,42,.97); border: 1px solid #4ade80; color: #4ade80; }
    .toast-error   { background: rgba(15,23,42,.97); border: 1px solid #f87171; color: #f87171; }
    .toast-info    { background: rgba(15,23,42,.97); border: 1px solid #38bdf8; color: #38bdf8; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; padding: .15rem .6rem; border-radius: 99px; font-size: .68rem; font-weight: 700; }
    .b-pink  { background: rgba(255,0,110,.15); color: #ff6eb4; border: 1px solid rgba(255,0,110,.3); }
    .b-green { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .b-cyan  { background: rgba(0,217,255,.12); color: #00d9ff; border: 1px solid rgba(0,217,255,.3); }
    .b-purple{ background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }

    /* ── Cards ── */
    .app-card { transition: border-color .2s, box-shadow .2s, transform .15s; cursor: pointer; }
    .app-card:hover { border-color: rgba(255,0,110,.55)!important; box-shadow: 0 0 28px rgba(255,0,110,.15); transform: translateY(-2px); }

    /* ── Icon default ── */
    .icon-def { background: linear-gradient(135deg, #1e1b4b, #4c1d95); display: flex; align-items: center;
                justify-content: center; font-size: 1.4rem; border-radius: .75rem; flex-shrink: 0; }

    /* ── Modal ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
                display: flex; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }

    /* ── Step cards ── */
    .step-card { border-radius: 1rem; padding: 1rem; display: flex; gap: .75rem; align-items: flex-start; }
    .step-num  { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
                 justify-content: center; font-weight: 900; font-size: .85rem; flex-shrink: 0; font-family: 'Orbitron', monospace; }

    /* ── Divider ── */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,0,110,.4), rgba(0,217,255,.4), transparent); margin: 1.5rem 0; }

    /* ── Method cards ── */
    .method-card { border-radius: 1.25rem; padding: 1.25rem; cursor: pointer; transition: all .2s; }
    .method-card:hover { transform: translateY(-2px); }
    .method-card.selected { box-shadow: 0 0 0 2px var(--pink); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .grid-2 { grid-template-columns: 1fr !important; }
    }

    @keyframes pulse-dot { 0%,100%{opacity:.5} 50%{opacity:1} }
    .pulse { animation: pulse-dot 1.2s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
<div id="app-root" style="display:flex;flex-direction:column;min-height:100vh;"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════
//  ConvertAPK — Conversor de Sites para App
//
//  CORREÇÃO PRINCIPAL EXPLICADA:
//  ─────────────────────────────
//  O bug original: installMainPWA() e installAppAsPWA() ambos
//  tentavam instalar o PRÓPRIO site (jovena3000.github.io) porque:
//
//  1. O manifest do ConvertAPK tinha start_url: "/" → instala o criador
//  2. installAppAsPWA() criava blob URLs no contexto PAI e as passava
//     para a nova aba — blob: URLs são cross-origin, o manifest e SW
//     nunca carregavam, o Chrome nunca disparava beforeinstallprompt.
//
//  SOLUÇÃO ADOTADA (honesta e funcional):
//  ─────────────────────────────────────
//  A. installMainPWA() → continua instalando o ConvertAPK (correto)
//
//  B. Para instalar apps criados pelo usuário, temos 3 métodos reais:
//
//     MÉTODO 1 — PWABuilder (Microsoft/Google, GRATUITO):
//       Abre https://www.pwabuilder.com/?site=URL_DO_APP
//       Gera APK real assinado, AAB para Play Store, etc.
//       É a forma OFICIAL recomendada pelo Google.
//
//     MÉTODO 2 — Instalação manual via Chrome:
//       Abre a URL do app em nova aba + guia visual passo a passo
//       Chrome no Android oferece "Adicionar à tela inicial"
//       Funciona em qualquer site HTTPS
//
//     MÉTODO 3 — Download do manifest.json:
//       Gera e baixa o manifest.json correto para o site do usuário
//       O usuário pode hospedar no próprio site e o Chrome instala
//
//  Esta abordagem é honesta: sem simular algo que não funciona.
// ════════════════════════════════════════════════════════════════════

// ── Estado ──────────────────────────────────────────────────────────
var user = null, apps = [], toastQueue = [], currentToast = null;
var editModalAppId = null, installModalApp = null;
var deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
});

// ── Storage ──────────────────────────────────────────────────────────
function loadStorage() {
  try {
    user = JSON.parse(localStorage.getItem('ca_user') || 'null');
    apps = JSON.parse(localStorage.getItem('ca_apps') || '[]');
  } catch(e) { apps = []; }
  if (!apps.length) {
    apps = [{
      id: 1, userId: 1, name: 'TechNews Brasil',
      description: 'Portal de notícias de tecnologia.',
      websiteUrl: 'https://technews.com.br',
      packageName: 'com.convertapk.technews',
      version: '1.0.0', themeColor: '#FF006E', orientation: 'portrait',
      permissions: ['INTERNET'], offlineSupport: true,
      deepLinking: false, analyticsEnabled: true,
      iconUrl: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=100&q=80',
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    }];
  }
}
function persist() {
  try {
    localStorage.setItem('ca_user', JSON.stringify(user));
    localStorage.setItem('ca_apps', JSON.stringify(apps));
  } catch(e) {}
}

// ── Router ───────────────────────────────────────────────────────────
function getRoute() { return window.location.hash.slice(1) || '/'; }
function navigate(r) { window.location.hash = r; rerender(); }
window.navigate = navigate;

// ── Toast ────────────────────────────────────────────────────────────
function toast(msg, type) {
  type = type || 'success';
  toastQueue.push({ msg: msg, type: type });
  if (!currentToast) nextToast();
}
function nextToast() {
  if (!toastQueue.length) { currentToast = null; rerender(); return; }
  currentToast = toastQueue.shift(); rerender();
  setTimeout(nextToast, 3500);
}
window.toast = toast;

// ── Helpers ──────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtDate(s) {
  try { return new Date(s).toLocaleDateString('pt-BR'); } catch(e) { return ''; }
}
function fileToB64(f) {
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function() { res(r.result); };
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}
function validImg(f) {
  if (!f.type.match(/^image\/(jpeg|png|gif|webp)$/)) { toast('Apenas JPG/PNG/GIF/WEBP', 'error'); return false; }
  if (f.size > 2097152) { toast('Máx 2MB', 'error'); return false; }
  return true;
}
function iconHtml(url, sz) {
  sz = sz || 48;
  if (url && url !== '[base64-image]') {
    return '<img src="' + esc(url) + '" style="width:' + sz + 'px;height:' + sz + 'px;border-radius:.75rem;object-fit:cover;flex-shrink:0;display:block;" onerror="this.outerHTML=\'<div class=icon-def style=width:' + sz + 'px;height:' + sz + 'px;>&#128241;</div>\'">';
  }
  return '<div class="icon-def" style="width:' + sz + 'px;height:' + sz + 'px;">&#128241;</div>';
}

// ── Auth ─────────────────────────────────────────────────────────────
window.handleLogin = function() {
  user = { id: 1, name: 'Cyber Dev', email: 'dev@convertapk.com', role: 'free' };
  persist(); toast('Bem-vindo, Cyber Dev! 🖥'); navigate('/dashboard');
};
window.handleLogout = function() { user = null; persist(); toast('Desconectado', 'info'); navigate('/'); };
window.handleUpgrade = function(tier) {
  if (!user) user = { id: 1, name: 'Cyber Dev', email: 'dev@convertapk.com', role: tier };
  else user.role = tier;
  persist(); toast('Plano ' + tier.toUpperCase() + ' ativado! 🚀'); navigate('/dashboard');
};

// ── CRUD ─────────────────────────────────────────────────────────────
window.createApp = function(data) {
  var a = Object.assign({}, data, {
    id: Date.now(), userId: user ? user.id : 1,
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  });
  apps = [a].concat(apps); persist();
  toast('"' + a.name + '" criado! ✨'); navigate('/dashboard');
};
window.updateApp = function(id, data) {
  apps = apps.map(function(a) {
    return a.id === id ? Object.assign({}, a, data, { updatedAt: new Date().toISOString() }) : a;
  });
  persist(); toast('App atualizado!'); rerender();
};
window.deleteApp = function(id) {
  var n = (apps.find(function(a) { return a.id === id; }) || {}).name || 'App';
  apps = apps.filter(function(a) { return a.id !== id; });
  persist(); toast('"' + n + '" removido', 'info'); navigate('/dashboard');
};

// ════════════════════════════════════════════════════════════════════
//  INSTALAR O PRÓPRIO ConvertAPK
//  ─────────────────────────────
//  Aqui SIM instalamos o próprio site criador (jovena3000.github.io)
//  como PWA. Isso é correto e esperado.
// ════════════════════════════════════════════════════════════════════
window.installMainPWA = function() {
  // Injeta manifest do ConvertAPK apontando para o próprio site
  if (!document.querySelector('link[rel="manifest"]')) {
    var manifestData = JSON.stringify({
      name: 'ConvertAPK - Criador de Apps',
      short_name: 'ConvertAPK',
      start_url: window.location.pathname || '/',
      scope: window.location.pathname || '/',
      display: 'standalone',
      theme_color: '#FF006E',
      background_color: '#020617',
      description: 'Transforme qualquer site em app Android',
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23FF006E'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E",
        sizes: 'any', type: 'image/svg+xml'
      }]
    });
    var mBlob = new Blob([manifestData], { type: 'application/manifest+json' });
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(mBlob);
    document.head.appendChild(link);
  }

  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(function() { deferredInstallPrompt = null; });
  } else {
    // Abre modal de instruções manuais para instalar o ConvertAPK
    installModalApp = '__main__'; rerender();
  }
};

// ════════════════════════════════════════════════════════════════════
//  INSTALAR UM APP CRIADO PELO USUÁRIO
//  ────────────────────────────────────
//  CORREÇÃO: Não tentamos mais instalar o jovena3000.github.io.
//  Em vez disso, abrimos um modal com 3 métodos reais:
//
//  1) PWABuilder → gera APK real GRÁTIS a partir da URL do app
//  2) Chrome manual → abre a URL do app em nova aba + guia de instalação
//  3) Download manifest.json → para quem tem acesso ao servidor do app
// ════════════════════════════════════════════════════════════════════
window.openInstallModal = function(app) {
  installModalApp = app; rerender();
};

// Método 1: PWABuilder — gera APK real gratuito
window.openPWABuilder = function(url) {
  var pwaUrl = 'https://www.pwabuilder.com/?site=' + encodeURIComponent(url);
  window.open(pwaUrl, '_blank');
  toast('PWABuilder aberto! Cole a URL e clique em "Start" para gerar o APK.', 'info');
};

// Método 2: Abrir o site do app em nova aba para instalação manual
window.openAppTab = function(url, appName) {
  var tab = window.open(url, '_blank');
  if (tab) {
    toast('"' + appName + '" aberto! No Chrome Android: Menu ⋮ → "Adicionar à tela inicial"', 'success');
  } else {
    toast('Permita pop-ups nas configurações do navegador.', 'error');
  }
};

// Método 3: Baixar manifest.json gerado para o app
window.downloadManifest = function(app) {
  var iconUrl = (app.iconUrl && app.iconUrl !== '[base64-image]')
    ? app.iconUrl
    : "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='" + encodeURIComponent(app.themeColor || '#FF006E') + "'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white'%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E";

  var manifest = {
    name: app.name,
    short_name: app.name.substring(0, 12),
    description: app.description || '',
    start_url: '/',
    scope: '/',
    display: 'standalone',
    orientation: app.orientation || 'portrait',
    theme_color: app.themeColor || '#FF006E',
    background_color: '#ffffff',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };

  var blob = new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'manifest.json';
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
  toast('manifest.json baixado! Adicione ao servidor do app e o Chrome instalará automaticamente.', 'success');
};

// ── Build simulator ───────────────────────────────────────────────────
window.startBuild = function(appId) {
  var app = apps.find(function(a) { return a.id === appId; });
  if (!app) return;
  var pre   = document.getElementById('buildPreChecks');
  var prog  = document.getElementById('buildProgress');
  var result= document.getElementById('buildResult');
  var logs  = document.getElementById('buildLogs');
  var bar   = document.getElementById('buildProgressBar');
  var pct   = document.getElementById('buildPct');
  var phase = document.getElementById('buildPhaseLabel');
  var dot   = document.getElementById('consoleStatusDot');
  if (pre)  pre.style.display  = 'none';
  if (prog) prog.style.display = 'block';
  if (dot)  { dot.style.background = '#facc15'; dot.classList.add('pulse'); }

  function log(msg, cls) {
    if (!logs) return;
    logs.innerHTML += '\n<span class="' + (cls || '') + '">[' + new Date().toLocaleTimeString() + '] ' + msg + '</span>';
    logs.scrollTop = logs.scrollHeight;
  }
  log('Iniciando análise: ' + app.name, 'log-pink');
  log('URL: ' + app.websiteUrl, 'log-info');

  var phases = [
    { l: 'Verificando URL do site',        p: 14 },
    { l: 'Checando compatibilidade PWA',   p: 28 },
    { l: 'Analisando recursos da página',  p: 42 },
    { l: 'Gerando manifest.json',          p: 58 },
    { l: 'Configurando Service Worker',    p: 72 },
    { l: 'Preparando pacote de instalação',p: 86 },
    { l: 'Finalizando',                    p: 100 }
  ];
  var i = 0;
  function run() {
    if (i >= phases.length) {
      if (dot) { dot.style.background = '#4ade80'; dot.classList.remove('pulse'); }
      log('Análise concluída. Escolha o método de instalação abaixo.', 'log-ok');
      if (result) {
        result.style.display = 'block';
        result.innerHTML =
          '<div class="glass glass-green" style="border-radius:1rem;padding:1.25rem;margin-top:1rem;">'
          + '<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;">'
          + '<span style="font-size:2rem;">🎉</span>'
          + '<div><div style="color:#4ade80;font-weight:700;font-size:1rem;">Análise concluída!</div>'
          + '<div style="font-size:.8rem;color:#64748b;">' + esc(app.name) + ' está pronto para instalação</div></div></div>'
          + '<p style="font-size:.82rem;color:#94a3b8;margin-bottom:1rem;">Escolha o método mais adequado para você:</p>'
          + '<div style="display:flex;flex-direction:column;gap:.6rem;">'

          + '</div></div>';
      }
      return;
    }
    var p = phases[i];
    if (bar)   bar.style.width   = p.p + '%';
    if (pct)   pct.textContent   = p.p + '%';
    if (phase) phase.textContent = p.l;
    log('[' + p.l + ']...');
    i++; setTimeout(run, 520);
  }
  setTimeout(run, 150);
};

      }).join('')
    + '</div>'
    + '<button class="btn btn-primary" onclick="startBuild(' + app.id + ')" style="width:100%;justify-content:center;padding:.8rem;">▶ Analisar Compatibilidade</button></div>'
    + '<div id="buildProgress" style="display:none;">'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.875rem;">'
    + '<span id="buildPhaseLabel" style="font-weight:700;">Iniciando...</span>'
    + '<span id="buildPct" style="color:#94a3b8;">0%</span></div>'
    + '<div class="prog-track"><div class="prog-fill" id="buildProgressBar" style="width:0%"></div></div></div>'
    + '<div id="buildResult" style="display:none;"></div></div>'
    + '<div class="glass" style="border-radius:1.25rem;padding:1.25rem;">'
    + '<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;">'
    + '<span style="width:8px;height:8px;background:#64748b;border-radius:50%;display:inline-block;" id="consoleStatusDot"></span>'
    + '<span style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;">Console</span></div>'
    + '<div class="log-box" id="buildLogs"><span class="log-info">[READY] Aguardando início da análise...</span></div>'
    + '</div></div></div>';
}

function renderPricing() {
  return '<div style="max-width:1000px;margin:0 auto;padding:3.5rem 1.5rem;text-align:center;">'
    + '<h1 style="font-size:2rem;margin-bottom:.5rem;">Planos <span style="color:#FF006E;">ConvertAPK</span></h1>'
    + '<p style="color:#64748b;margin-bottom:2.5rem;">Escolha o plano ideal</p>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;text-align:left;">'
    + [
        { name: 'Grátis', price: 'R$ 0', per: '', color: '#94a3b8',
          features: ['Apps ilimitados', 'PWABuilder (APK real)', 'Instalação via Chrome', 'manifest.json automático', 'Ícones personalizados'],
          missing: ['Notificações push avançadas', 'Whitelabel'], cta: 'Começar Grátis', action: 'handleLogin()', popular: false },
        { name: 'Premium', price: 'R$ 29', per: '/mês', color: '#FF006E',
          features: ['Tudo do Grátis', 'Notificações push', 'Whitelabel total', 'Suporte prioritário', 'Analytics avançado'],
          missing: [], cta: 'Ativar Premium', action: "handleUpgrade('premium')", popular: true }
      ].map(function(p) {
        return '<div class="glass" style="border-radius:1.5rem;padding:1.75rem;position:relative;' + (p.popular ? 'border-color:rgba(255,0,110,.45);box-shadow:0 0 28px rgba(255,0,110,.18);' : '') + '">'
          + (p.popular ? '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#FF006E,#9333ea);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:.3rem 1rem;border-radius:99px;">🔥 POPULAR</div>' : '')
          + '<div style="font-family:\'Orbitron\',monospace;color:' + p.color + ';font-size:.85rem;margin-bottom:.5rem;">' + p.name + '</div>'
          + '<div style="display:flex;align-items:baseline;gap:.2rem;margin-bottom:1.25rem;">'
          + '<span style="font-family:\'Orbitron\',monospace;font-size:2rem;font-weight:900;">' + p.price + '</span>'
          + '<span style="color:#64748b;font-size:.875rem;">' + p.per + '</span></div>'
          + '<div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem;font-size:.85rem;">'
          + p.features.map(function(f) { return '<div style="display:flex;align-items:center;gap:.4rem;"><span style="color:#4ade80;">✓</span>' + f + '</div>'; }).join('')
          + p.missing.map(function(f) { return '<div style="display:flex;align-items:center;gap:.4rem;color:#475569;"><span>✗</span>' + f + '</div>'; }).join('')
          + '</div>'
          + '<button class="btn ' + (p.popular ? 'btn-primary' : 'btn-outline') + '" onclick="' + p.action + '" style="width:100%;justify-content:center;' + (!p.popular ? 'border-color:' + p.color + ';color:' + p.color + ';' : '') + '">' + p.cta + '</button>'
          + '</div>';
      }).join('')
    + '</div></div>';
}

// ── Main Rerender ─────────────────────────────────────────────────────
function rerender() {
  var root = document.getElementById('app-root');
  if (!root) return;
  var route = getRoute();
  var main = '';
  if (!user && route !== '/' && route !== '/pricing') main = renderLanding();
  else if (route === '/')            main = renderLanding();
  else if (route === '/dashboard')   main = renderDashboard();
  else if (route === '/create-app')  main = renderCreateApp();
  else if (route === '/pricing')     main = renderPricing();
  else if (/^\/app\/\d+$/.test(route))   main = renderAppDetails(parseInt(route.split('/')[2]));
  else if (/^\/build\/\d+$/.test(route)) main = renderBuildPage(parseInt(route.split('/')[2]));
  else main = renderLanding();

  root.innerHTML = renderNavbar()
    + '<main style="flex:1;">' + main + '</main>'
    + renderFooter()
    + renderToast()
    + renderEditModal()
    + renderInstallModal();
}

window.rerender = rerender;
window.addEventListener('hashchange', rerender);
loadStorage();
rerender();
</script>
</body>
</html>
