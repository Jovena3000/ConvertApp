      for (let i = 0; i < 32; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));

app_name - \t\t\t\t\t${appName}
app_alias - \t\t\t\t\t${appName.toLowerCase().replace(/[^a-z0-9]/g, '')}

---------------------------------------------------

      };
    };

    // Gerador de APK com estrutura válida
    const generateValidApkFiles = (appName, version, packageName, themeColor = "#FF006E") => {
      const encoder = new TextEncoder();
      const timestamp = new Date().toISOString();
      
      const manifest = `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${packageName}"
    android:versionCode="1"
    android:versionName="${version}">
    <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" />
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="${appName}"
        android:usesCleartextTraffic="true"
        android:theme="@style/Theme.Web2APK">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>`;

      // Simula um DEX válido
      const dexHeader = new Uint8Array([
        0x64, 0x65, 0x78, 0x0A, 0x30, 0x33, 0x35, 0x00,
        0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00
      ]);
      const dexData = encoder.encode(`Web2APK Cyber Engine\nApp: ${appName}\nPackage: ${packageName}\nVersion: ${version}\nBuild: ${timestamp}\n\nEste APK foi gerado pela plataforma Web2APK.\nO aplicativo será convertido para WebView apontando para o site configurado.`);
      const dexFile = new Uint8Array(dexHeader.length + dexData.length);
      dexFile.set(dexHeader);
      dexFile.set(dexData, dexHeader.length);
      
      const resources = encoder.encode(`ARSC\x01\x00\x00\x00${themeColor}\x00${appName}\x00resources\x00strings\x00colors\x00`);
      
      return {
        manifest: encoder.encode(manifest),
        dex: dexFile,
        resources: resources
      };
    };

    // ==================== CRC32 + ZIP GENERATOR ====================
    const crcTable = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      crcTable[n] = c >>> 0;
    }

    const crc32 = (data) => {
      let crc = 0xffffffff;
      for (const byte of data) crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      return (crc ^ 0xffffffff) >>> 0;
    };

    const concatLength = (parts) => parts.reduce((a, b) => a + b.length, 0);

    const createCompletePackageBlob = (appName, version, packageName, themeColor, websiteUrl, companyName = "My Company") => {
      const encoder = new TextEncoder();
      const certData = generateCertificationData(appName, packageName, version, companyName);
      const apkFiles = generateValidApkFiles(appName, version, packageName, themeColor);
      
      // Lista completa de arquivos no ZIP
      const files = [
        // APK principal
        { name: `${appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}-v${version}.apk`, data: apkFiles.dex },
        // Documentação
        { name: 'readme.txt', data: encoder.encode(certData.readme) },
        { name: 'license.txt', data: encoder.encode(certData.license) },
        { name: 'certification.txt', data: encoder.encode(certData.certification) },
        // Estrutura Android
        { name: 'AndroidManifest.xml', data: apkFiles.manifest },
        { name: 'classes.dex', data: apkFiles.dex },
        { name: 'resources.arsc', data: apkFiles.resources },
        // META-INF para assinatura
        { name: 'META-INF/MANIFEST.MF', data: encoder.encode(`Manifest-Version: 1.0\nCreated-By: Web2APK Cyber Engine v4.2\nApp-Name: ${appName}\nVersion: ${version}\nPackage: ${packageName}\nWebsite: ${websiteUrl}\nBuild-Time: ${new Date().toISOString()}`) },
        { name: 'META-INF/CERT.SF', data: encoder.encode(`Signature-Version: 1.0\nSHA-256-Digest-Manifest: ${btoa(appName + version + packageName).slice(0, 32)}\nCreated-By: Web2APK\nX-Android-Package: ${packageName}\nX-Android-VersionCode: 1`) },
        { name: 'META-INF/CERT.RSA', data: encoder.encode(`RSA_SIGNATURE_BLOCK\n${btoa(packageName + themeColor + new Date().toISOString())}\nWeb2APK_CERTIFICATE\n-----BEGIN CERTIFICATE-----\nMIIDXTCCAkWgAwIBAgIJAJC1HiIAZAi2MA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV\nBAYTAkJSMQ8wDQYDVQQIDAZQYXJhbmExDzANBgNVBAcMBkxvbmRybjEUMBIGA1UE\nAwwLV2ViMkFQSyBDQTAeFw0yNDAxMDEwMDAwMDBaFw0zNDAxMDEwMDAwMDBaMEUx\nCzAJBgNVBAYTAkJSMQ8wDQYDVQQIDAZQYXJhbmExDzANBgNVBAcMBkxvbmRybjEU\nMBIGA1UEAwwLV2ViMkFQSyBDQTCCASIwDQYJKoZIhvcNAQEBBQADggEPADCCAQoC\nggEBAKj4x8X3vZLx8X3vZLx8X3vZLx8X3vZLx8X3vZLx8X3vZLx8X3vZLx8X3vZL\n-----END CERTIFICATE-----`) },
        // Arquivos de configuração adicionais
        { name: 'assets/app-config.json', data: encoder.encode(JSON.stringify({
          app_name: appName,
          app_version: version,
          package_name: packageName,
          website_url: websiteUrl,
          theme_color: themeColor,
          build_date: new Date().toISOString(),
          app_id: certData.appId,
          app_key: certData.appKey
        }, null, 2)) },
        { name: 'res/values/colors.xml', data: encoder.encode(`<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="colorPrimary">${themeColor}</color>\n    <color name="colorPrimaryDark">${themeColor}</color>\n    <color name="colorAccent">#06D9FF</color>\n</resources>`) },
        { name: 'res/values/strings.xml', data: encoder.encode(`<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">${appName}</string>\n    <string name="website_url">${websiteUrl}</string>\n</resources>`) }
      ];

      const localParts = [], centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const checksum = crc32(file.data);
        const localHeader = new Uint8Array(30);
        const lv = new DataView(localHeader.buffer);
        lv.setUint32(0, 0x04034b50, true);
        lv.setUint16(4, 20, true);
        lv.setUint16(6, 0, true);
        lv.setUint16(8, 0, true);
        lv.setUint16(10, 0, true);
        lv.setUint16(12, 0, true);
        lv.setUint32(14, checksum, true);
        lv.setUint32(18, file.data.length, true);
        lv.setUint32(22, file.data.length, true);
        lv.setUint16(26, nameBytes.length, true);
        lv.setUint16(28, 0, true);
        localParts.push(localHeader, nameBytes, file.data);

        const centralHeader = new Uint8Array(46);
        const cv = new DataView(centralHeader.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true);
        cv.setUint16(10, 0, true);
        cv.setUint16(12, 0, true);
        cv.setUint16(14, 0, true);
        cv.setUint32(16, checksum, true);
        cv.setUint32(20, file.data.length, true);
        cv.setUint32(24, file.data.length, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint16(30, 0, true);
        cv.setUint16(32, 0, true);
        cv.setUint16(34, 0, true);
        cv.setUint16(36, 0, true);
        cv.setUint32(38, 0, true);
        cv.setUint32(42, offset, true);
        centralParts.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + file.data.length;
      }

      const endHeader = new Uint8Array(22);
      const ev = new DataView(endHeader.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true);
      ev.setUint16(6, 0, true);
      ev.setUint16(8, files.length, true);
      ev.setUint16(10, files.length, true);
      ev.setUint32(12, concatLength(centralParts), true);
      ev.setUint32(16, offset, true);
      ev.setUint16(20, 0, true);

      const blobParts = [...localParts, ...centralParts, endHeader].map(p => new Uint8Array(p));
      return new Blob(blobParts, { type: 'application/zip' });
    };

    // ==================== MOCK DATA ====================
    const INITIAL_APPS = [
      { id: 1, userId: 1, name: "TechNews Brasil", description: "Portal de notícias tech", websiteUrl: "https://technews.com.br", packageName: "com.web2apk.technews", version: "1.2.0", themeColor: "#FF006E", orientation: "portrait", permissions: ["INTERNET"], offlineSupport: true, deepLinking: false, analyticsEnabled: true, iconUrl: null, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: 2, userId: 1, name: "Karaoke Multiplayer", description: "App de karaokê multiplayer", websiteUrl: "https://karaoke.com", packageName: "com.mycompany.karaokemultiplayer", version: "1.0", themeColor: "#9D00FF", orientation: "portrait", permissions: ["INTERNET", "RECORD_AUDIO"], offlineSupport: false, deepLinking: false, analyticsEnabled: true, iconUrl: null, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }
    ];
    const INITIAL_BUILDS = [

    // ==================== ICONS ====================
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      const icons = {
        cpu: <path d="M4 4h16v16H4zM9 9h6v6H9zM9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3" />,
        login: <><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></>,
        logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
        shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>,

        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
        arrowLeft: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
        save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        edit: <><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="m15 5 4 4"/></>,
        play: <><polygon points="5 3 19 12 5 21 5 3"/></>,
        terminal: <><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>,
        sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></>,
        chevronDown: <><polyline points="6 9 12 15 18 9"/></>,
        chevronUp: <><polyline points="18 15 12 9 6 15"/></>,
        home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></>,
        folder: <><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2Z"/></>
      };
      return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{icons[name] || icons.home}</svg>;
    };

    // ==================== COMPONENTES PRINCIPAIS ====================
    const Navbar = ({ user, onNavigate, onLogin, onLogout }) => (
      <nav className="border-b border-pink-500/30 backdrop-blur-md bg-slate-950/80 sticky top-0 z-40">

              <Icon name="cpu" className="w-6 h-6 text-white" />
            </div>
            <div><span className="text-2xl font-extrabold bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400 bg-clip-text text-transparent">Web2APK</span><span className="text-[10px] text-cyan-400 font-bold uppercase block">Complete Package v4.2</span></div>
          </div>
          <div className="flex items-center gap-4">
            {user ? (
              <>
                <button onClick={() => onNavigate('/dashboard')} className="hidden sm:block text-gray-300 hover:text-pink-400 text-sm font-semibold">Dashboard</button>
                <button onClick={() => onNavigate('/create-app')} className="hidden sm:block text-gray-300 hover:text-cyan-400 text-sm font-semibold">Novo App</button>
                <div className="flex items-center gap-2 bg-slate-900/60 px-3 py-1.5 rounded-full"><span className="text-xs font-bold">{user.name}</span><div className="w-7 h-7 rounded-full bg-gradient-to-r from-pink-500 to-cyan-400 flex items-center justify-center text-xs font-bold">{user.name[0]}</div></div>
                <button onClick={onLogout} className="p-2 rounded-full hover:bg-pink-500/10 transition"><Icon name="logout" className="w-5 h-5" /></button>
              </>
            ) : (
              <button onClick={onLogin} className="px-5 py-2 rounded-full border border-pink-500 bg-pink-500/10 hover:bg-pink-500/20 text-pink-400 text-sm flex items-center gap-2 transition"><Icon name="login" className="w-4 h-4" />Entrar</button>
            )}
          </div>
        </div>
      </nav>
    );

    const Footer = () => (
      <footer className="border-t border-pink-500/10 bg-slate-950/40 mt-auto py-8">
        <div className="container mx-auto px-6 text-center text-slate-500 text-xs">© 2026 Web2APK - Pacote completo: APK + readme.txt + license.txt + certification.txt</div>
      </footer>
    );

    const LandingPage = ({ onLogin, onNavigate }) => {
      const [url, setUrl] = useState('');
      const [name, setName] = useState('');
      const handleQuick = (e) => { e.preventDefault(); if(url) { sessionStorage.setItem('quick_create_url', url); sessionStorage.setItem('quick_create_name', name); onNavigate('/create-app'); } };
      return (
        <div className="container mx-auto px-6 py-20 text-center max-w-4xl">
          <div className="inline-flex items-center gap-2 bg-pink-500/10 border border-pink-500/30 px-4 py-1.5 rounded-full mb-6"><span className="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></span><span className="text-xs font-bold text-pink-400 uppercase">Geração Completa</span></div>
          <h1 className="text-5xl md:text-6xl font-black mb-6">Transforme Seu Site em <span className="bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400 bg-clip-text text-transparent">APK Completo</span></h1>
          <p className="text-slate-400 text-xl mb-8">Gere um pacote ZIP com APK + readme.txt + license.txt + certification.txt + estrutura Android completa!</p>
          <div className="flex gap-4 justify-center mb-12">
            <button onClick={onLogin} className="px-8 py-4 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center gap-2"><Icon name="arrowRight" className="w-4 h-4" />Começar Grátis</button>
          </div>
          <div className="bg-slate-900/40 border border-pink-500/30 rounded-2xl p-8 max-w-md mx-auto">
            <h3 className="text-xl font-bold mb-4 flex items-center gap-2 justify-center"><Icon name="folder" className="w-5 h-5 text-cyan-400" />Pacote Inclui</h3>
            <div className="text-left space-y-2 text-sm text-slate-400">
              <p>📱 app-release.apk (APK para instalação)</p>
              <p>📄 readme.txt (Instruções para publicação)</p>
              <p>📜 license.txt (Licença MIT)</p>

              <p>📁 AndroidManifest.xml + classes.dex + resources.arsc</p>
              <p>📁 META-INF/ (Arquivos de assinatura)</p>
              <p>📁 res/ (Recursos do app)</p>
              <p>📁 assets/ (Configurações JSON)</p>
            </div>
          </div>
        </div>
      );
    };

    const DashboardPage = ({ apps, onNavigate, onDeleteApp }) => (
      <div className="container mx-auto px-6 py-12">
        <div className="flex justify-between items-center mb-8"><h1 className="text-3xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">Meus Apps</h1><button onClick={() => onNavigate('/create-app')} className="px-5 py-2.5 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center gap-2"><Icon name="plus" className="w-4 h-4" />Novo App</button></div>
        <div className="grid md:grid-cols-2 gap-6">{apps.map(app => (
          <div key={app.id} onClick={() => onNavigate(`/app/${app.id}`)} className="bg-slate-900/50 border border-slate-800 hover:border-pink-500/40 rounded-2xl p-6 cursor-pointer transition group">
            <div style={{ backgroundColor: app.themeColor }} className="w-3 h-3 rounded-bl-lg absolute"></div>
            <h3 className="text-xl font-bold group-hover:text-pink-400 transition">{app.name}</h3>
            <p className="text-slate-400 text-sm">{app.websiteUrl}</p>
            <div className="mt-4 flex justify-between"><span className="text-slate-400">v{app.version}</span><span className="text-pink-400 flex items-center gap-1">Detalhes <Icon name="arrowRight" className="w-3 h-3" /></span></div>
          </div>
        ))}</div>
      </div>
    );

    const CreateAppPage = ({ onCreateApp, onNavigate }) => {
      const [name, setName] = useState('');
      const [url, setUrl] = useState('');
      const [pkg, setPkg] = useState('');
      const [version, setVersion] = useState('1.0');
      const [color, setColor] = useState('#FF006E');
      const [company, setCompany] = useState('My Company');
      useEffect(() => { const su = sessionStorage.getItem('quick_create_url'); const sn = sessionStorage.getItem('quick_create_name'); if(su) { setUrl(su); sessionStorage.removeItem('quick_create_url'); } if(sn) { setName(sn); sessionStorage.removeItem('quick_create_name'); } }, []);
      useEffect(() => { if(!pkg && name) { const clean = name.toLowerCase().replace(/[^a-z0-9]/g, ''); setPkg(`com.app.${clean || 'myapp'}`); } }, [name]);
      const handleSubmit = (e) => { e.preventDefault(); onCreateApp({ name, websiteUrl: url, packageName: pkg, version, themeColor: color, companyName: company, description: '', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false, analyticsEnabled: true }); };
      return (<div className="container mx-auto px-6 py-12 max-w-2xl"><button onClick={() => onNavigate('/dashboard')} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><h1 className="text-3xl font-black mb-6">Criar Novo App</h1><form onSubmit={handleSubmit} className="space-y-5 bg-slate-900/40 p-8 rounded-2xl"><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Nome do App *</label><input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="Ex: Karaoke Multiplayer" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">URL do Site *</label><input type="url" required value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="https://seusite.com" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Package Name</label><input type="text" value={pkg} onChange={e => setPkg(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono text-sm" placeholder="com.exemplo.app" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Versão</label><input type="text" value={version} onChange={e => setVersion(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="1.0" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Empresa/Organização</label><input type="text" value={company} onChange={e => setCompany(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" placeholder="My Company" /></div><div><label className="text-xs font-bold text-slate-400 uppercase block mb-1">Cor do Tema</label><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12 rounded-xl" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono" /></div></div><button type="submit" className="w-full py-3.5 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="save" className="w-4 h-4" />Criar e Gerar Pacote</button></form></div>);
    };

    const AppDetailsPage = ({ app, onNavigate, onUpdateApp, onDeleteApp, onDownloadMockApk }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [name, setName] = useState(app.name);
      const [url, setUrl] = useState(app.websiteUrl);
      const [color, setColor] = useState(app.themeColor);
      const handleUpdate = (e) => { e.preventDefault(); onUpdateApp(app.id, { name, websiteUrl: url, themeColor: color }); setIsEditing(false); };
      return (<div className="container mx-auto px-6 py-12"><button onClick={() => onNavigate('/dashboard')} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><div className="grid md:grid-cols-3 gap-8"><div className="md:col-span-2"><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8 relative"><div style={{ backgroundColor: app.themeColor }} className="absolute top-0 right-0 w-3 h-3 rounded-bl-lg"></div>{!isEditing ? (<><div className="flex justify-between"><div><h2 className="text-3xl font-bold">{app.name}</h2><p className="text-cyan-400 text-sm">{app.websiteUrl}</p></div><button onClick={() => setIsEditing(true)} className="p-2 border border-slate-700 rounded-xl"><Icon name="edit" className="w-4 h-4" /></button></div><div className="mt-6 flex gap-3"><span className="px-3 py-1.5 bg-slate-800 rounded-lg">v{app.version}</span><span className="px-3 py-1.5 bg-slate-800 rounded-lg font-mono text-sm">{app.packageName}</span></div><div className="mt-6 flex gap-3"><button onClick={() => onNavigate(`/build/${app.id}`)} className="px-6 py-3 bg-gradient-to-r from-pink-600 to-purple-600 rounded-xl font-bold flex items-center gap-2"><Icon name="play" className="w-4 h-4" />Build APK</button><button onClick={() => onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor, app.websiteUrl, app.companyName)} className="px-6 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-xl font-bold flex items-center gap-2"><Icon name="download" className="w-4 h-4" />Baixar Pacote ZIP</button></div></>) : (<form onSubmit={handleUpdate} className="space-y-4"><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><input type="url" value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12 rounded-xl" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3" /></div><div className="flex gap-3"><button type="button" onClick={() => setIsEditing(false)} className="flex-1 py-2 border border-slate-700 rounded-xl">Cancelar</button><button type="submit" className="flex-1 py-2 bg-pink-600 rounded-xl font-bold">Salvar</button></div></form>)}</div></div><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6"><h3 className="font-bold mb-4">Conteúdo do Pacote</h3><div className="space-y-2 text-xs text-slate-400"><p>📱 APK para instalação</p><p>📄 readme.txt</p><p>📜 license.txt</p><p>🔐 certification.txt</p><p>📁 Estrutura Android completa</p></div></div></div></div>);
    };

    const BuildAPKPage = ({ app, onNavigate, onDownloadMockApk }) => {
      const [progress, setProgress] = useState(0);
      const [building, setBuilding] = useState(false);
      const [logs, setLogs] = useState([]);
      const startBuild = () => {
        setBuilding(true); setProgress(0); setLogs(['[00:00:00] Iniciando geração do pacote completo...']);
        const interval = setInterval(() => {
          setProgress(p => { 
            if (p >= 100) { clearInterval(interval); setBuilding(false); setLogs(l => [...l, '[00:00:16] ✅ Pacote ZIP gerado com sucesso!', '[00:00:16] Inclui: APK + readme.txt + license.txt + certification.txt']); return 100; }
            if (p % 20 === 0) setLogs(l => [...l, `[00:00:${Math.floor(p/6)}] ${p === 20 ? 'Gerando documentação...' : p === 40 ? 'Criando estrutura Android...' : p === 60 ? 'Assinando APK...' : 'Finalizando pacote...'}`]);
            return p + 5;
          });
        }, 300);
      };
      return (<div className="container mx-auto px-6 py-12 max-w-3xl"><button onClick={() => onNavigate(`/app/${app.id}`)} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-4">Gerando Pacote: {app.name}</h2><div className="mb-6"><div className="flex justify-between text-sm mb-2"><span>Progresso</span><span className="text-pink-400 font-bold">{progress}%</span></div><div className="w-full bg-slate-800 rounded-full h-3 overflow-hidden"><div className="bg-gradient-to-r from-pink-500 to-cyan-500 h-full rounded-full transition-all" style={{ width: `${progress}%` }}></div></div></div><div className="bg-black/60 rounded-xl p-4 h-40 overflow-y-auto font-mono text-xs text-green-400 mb-6">{logs.map((l,i) => <div key={i}>&gt; {l}</div>)}</div>{!building && progress === 0 && <button onClick={startBuild} className="w-full py-3 bg-pink-600 rounded-xl font-bold">Gerar Pacote ZIP</button>}{progress === 100 && <button onClick={() => onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor, app.websiteUrl, app.companyName)} className="w-full py-3 bg-green-600 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="download" className="w-4 h-4" />Baixar Pacote Completo</button>}</div></div>);
    };

    const PremiumPage = ({ user, onUpgrade, onNavigate }) => (
      <div className="container mx-auto px-6 py-12 text-center"><h1 className="text-4xl font-black mb-4">Planos Premium</h1><div className="grid md:grid-cols-2 gap-8 max-w-3xl mx-auto"><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-2">Free</h2><p className="text-3xl font-black mb-4">R$ 0</p><button onClick={() => onNavigate('/create-app')} className="w-full py-2 border border-pink-500 rounded-xl">Começar</button></div><div className="bg-gradient-to-br from-pink-600/20 to-cyan-600/20 border border-pink-500 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-2">Premium Pro</h2><p className="text-3xl font-black mb-4">R$ 29<span className="text-sm">/mês</span></p>{user?.role === 'premium' ? <button disabled className="w-full py-2 bg-pink-500 rounded-xl opacity-60">Ativo</button> : <button onClick={() => onUpgrade('premium')} className="w-full py-2 bg-pink-500 rounded-xl font-bold">Ativar Premium</button>}</div></div></div>
    );

    // ==================== MAIN APP ====================
    const App = () => {
      const [user, setUser] = useState(() => { const s = localStorage.getItem('w2a_user'); return s ? JSON.parse(s) : null; });
      const [apps, setApps] = useState(() => { const s = localStorage.getItem('w2a_apps'); return s ? JSON.parse(s) : INITIAL_APPS; });
      const [builds, setBuilds] = useState(() => { const s = localStorage.getItem('w2a_builds'); return s ? JSON.parse(s) : INITIAL_BUILDS; });
      const [route, setRoute] = useState(() => window.location.hash.slice(1) || '/');
      const [toast, setToast] = useState(null);

      useEffect(() => { localStorage.setItem('w2a_user', JSON.stringify(user)); }, [user]);
      useEffect(() => { localStorage.setItem('w2a_apps', JSON.stringify(apps)); }, [apps]);
      useEffect(() => { localStorage.setItem('w2a_builds', JSON.stringify(builds)); }, [builds]);
      useEffect(() => { const handler = () => setRoute(window.location.hash.slice(1) || '/'); window.addEventListener('hashchange', handler); return () => window.removeEventListener('hashchange', handler); }, []);

      const navigate = (r) => { window.location.hash = r; setRoute(r); };
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const login = () => { setUser({ id: 1, name: "Cyber Dev", role: "user" }); showToast("✅ Conectado!"); navigate('/dashboard'); };
      const logout = () => { setUser(null); showToast("👋 Desconectado"); navigate('/'); };
      const createApp = (data) => { const newApp = { ...data, id: Date.now(), userId: 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }; setApps([newApp, ...apps]); showToast(`🎉 App "${newApp.name}" criado!`); navigate('/dashboard'); };
      const deleteApp = (id) => { setApps(apps.filter(a => a.id !== id)); showToast("🗑️ App removido"); };
      const updateApp = (id, data) => { setApps(apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a)); showToast("💾 App atualizado"); };
      const upgrade = (tier) => { setUser(prev => prev ? { ...prev, role: tier } : { id: 1, name: "Cyber Dev", role: tier }); showToast(`🚀 Plano ${tier} ativado!`); navigate('/dashboard'); };
      const handleDownload = (appName, version, packageName, themeColor, websiteUrl, companyName = "My Company") => { 
        const blob = createCompletePackageBlob(appName, version, packageName, themeColor, websiteUrl, companyName); 
        const url = URL.createObjectURL(blob); 
        const a = document.createElement('a'); 
        a.href = url; 
        a.download = `${appName.toLowerCase().replace(/[^a-z0-9]/g, '_')}-v${version}-complete-package.zip`; 
        a.click(); 
        setTimeout(() => URL.revokeObjectURL(url), 100); 
        showToast(`📦 Pacote completo gerado! ZIP contém APK + documentação completa.`); 
      };

      let content;
      if (route === '/') content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (route === '/pricing') content = <PremiumPage user={user} onUpgrade={upgrade} onNavigate={navigate} />;
      else if (!user && (route === '/dashboard' || route === '/create-app' || route.startsWith('/app/') || route.startsWith('/build/'))) content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (route === '/dashboard') content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />;
      else if (route === '/create-app') content = <CreateAppPage onCreateApp={createApp} onNavigate={navigate} />;
      else if (route.startsWith('/app/')) { const id = parseInt(route.split('/')[2]); const app = apps.find(a => a.id === id); if (!app) content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />; else content = <AppDetailsPage app={app} builds={builds} onNavigate={navigate} onUpdateApp={updateApp} onDeleteApp={deleteApp} onDownloadMockApk={handleDownload} />; }
      else if (route.startsWith('/build/')) { const id = parseInt(route.split('/')[2]); const app = apps.find(a => a.id === id); if (!app) content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />; else content = <BuildAPKPage app={app} onNavigate={navigate} onAddBuild={()=>{}} onDownloadMockApk={handleDownload} />; }
      else content = <LandingPage onLogin={login} onNavigate={navigate} />;

      return (<div className="flex flex-col min-h-screen bg-slate-950"><Navbar user={user} onNavigate={navigate} onLogin={login} onLogout={logout} /><main className="flex-1">{content}</main>{toast && <div className="fixed bottom-6 right-6 bg-slate-900 border border-pink-500 rounded-2xl px-5 py-3 z-50 animate-fade-in-up">{toast}</div>}<Footer /></div>);
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
