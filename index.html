<body class="text-slate-200">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==================== UTILS: CRC32 + ZIP GENERATOR ====================
    const crcTable = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) {
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      crcTable[n] = c >>> 0;
    }

    const crc32 = (data) => {
      let crc = 0xffffffff;
      for (const byte of data) crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      return (crc ^ 0xffffffff) >>> 0;
    };

    const concatLength = (parts) => parts.reduce((a, b) => a + b.length, 0);

    const createApkZipBlob = (appName, version, packageName = "com.web2apk.generated", themeColor = "#FF006E") => {
      const encoder = new TextEncoder();
      const timestamp = new Date().toISOString();
      const files = [
        { name: 'AndroidManifest.xml', data: encoder.encode(`<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="${packageName}" android:versionCode="1" android:versionName="${version}">\n    <application android:label="${appName}" android:theme="@style/Theme.Web2APK" android:icon="@mipmap/ic_launcher" android:allowBackup="true">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>`) },
        { name: 'assets/web2apk-build.txt', data: encoder.encode(`WEB2APK CYBER PLATFORM\nApp: ${appName}\nVersion: ${version}\nPackage: ${packageName}\nColor: ${themeColor}\nDate: ${timestamp}\nSDK: 34`) },
        { name: 'META-INF/MANIFEST.MF', data: encoder.encode(`Manifest-Version: 1.0\nCreated-By: Web2APK Engine\nApp: ${appName}\nVersion: ${version}`) }
      ];

      const localParts = [], centralParts = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = encoder.encode(file.name);
        const checksum = crc32(file.data);
        const localHeader = new Uint8Array(30);
        const lv = new DataView(localHeader.buffer);
        lv.setUint32(0, 0x04034b50, true);
        lv.setUint16(4, 20, true); lv.setUint16(6, 0, true); lv.setUint16(8, 0, true);
        lv.setUint16(10, 0, true); lv.setUint16(12, 0, true);
        lv.setUint32(14, checksum, true);
        lv.setUint32(18, file.data.length, true);
        lv.setUint32(22, file.data.length, true);
        lv.setUint16(26, nameBytes.length, true);
        lv.setUint16(28, 0, true);
        localParts.push(localHeader, nameBytes, file.data);

        const centralHeader = new Uint8Array(46);
        const cv = new DataView(centralHeader.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true); cv.setUint16(10, 0, true);
        cv.setUint16(12, 0, true); cv.setUint16(14, 0, true);
        cv.setUint32(16, checksum, true);
        cv.setUint32(20, file.data.length, true);
        cv.setUint32(24, file.data.length, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint16(30, 0, true); cv.setUint16(32, 0, true);
        cv.setUint16(34, 0, true); cv.setUint16(36, 0, true);
        cv.setUint32(38, 0, true);
        cv.setUint32(42, offset, true);
        centralParts.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + file.data.length;
      }

      const endHeader = new Uint8Array(22);
      const ev = new DataView(endHeader.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true); ev.setUint16(6, 0, true);
      ev.setUint16(8, files.length, true); ev.setUint16(10, files.length, true);
      ev.setUint32(12, concatLength(centralParts), true);
      ev.setUint32(16, offset, true);
      ev.setUint16(20, 0, true);

      const blobParts = [...localParts, ...centralParts, endHeader].map(p => new Uint8Array(p));
      return new Blob(blobParts, { type: 'application/zip' });
    };

    // ==================== MOCK DATA ====================
    const INITIAL_APPS = [
      { id: 1, userId: 1, name: "TechNews Brasil", description: "Portal de notícias tech cyberpunk", websiteUrl: "https://technews.com.br", packageName: "com.web2apk.technews", version: "1.2.0", themeColor: "#FF006E", orientation: "portrait", permissions: ["INTERNET", "ACCESS_FINE_LOCATION"], offlineSupport: true, deepLinking: false, analyticsEnabled: true, iconUrl: null, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: 2, userId: 1, name: "Cyber Fitness", description: "App de treinos e biohacking", websiteUrl: "https://cyberfitness.fit", packageName: "com.web2apk.fitness", version: "1.0.1", themeColor: "#00d9ff", orientation: "portrait", permissions: ["INTERNET", "CAMERA"], offlineSupport: true, deepLinking: true, analyticsEnabled: true, iconUrl: null, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }
    ];
    const INITIAL_BUILDS = [
      { id: 101, appId: 1, userId: 1, status: "completed", apkUrl: "mock", fileSize: 45219876, createdAt: new Date().toISOString(), errorMessage: null },
      { id: 102, appId: 1, userId: 1, status: "error", apkUrl: null, fileSize: null, createdAt: new Date().toISOString(), errorMessage: "Erro de assinatura SSL" }
    ];

    // ==================== ICONS (Lucide simplified) ====================
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      const paths = {
        cpu: <path d="M12 2v4M4 12H2m20 0h-2M12 22v-4M8 2v2M16 2v2M8 20v2M16 20v2M6 6h12v12H6z"/><rect x="8" y="8" width="8" height="8"/><path d="M2 8h2M2 16h2M20 8h2M20 16h2"/>,
        login: <><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></>,
        logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
        shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>,
        award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
        smartphone: <><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        refresh: <><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
        check: <><polyline points="20 6 9 17 4 12"/></>,
        arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
        arrowLeft: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
        globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
        save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        edit: <><path d="M17 3l4 4L7 21H3v-4L17 3z"/><path d="m15 5 4 4"/></>,
        play: <><polygon points="5 3 19 12 5 21 5 3"/></>,
        terminal: <><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>,
        layout: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></>,
        sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></>,
        chevronDown: <><polyline points="6 9 12 15 18 9"/></>,
        chevronUp: <><polyline points="18 15 12 9 6 15"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>
      };
      return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{paths[name]}</svg>;
    };

    // ==================== COMPONENTS ====================
    const Navbar = ({ user, onNavigate, onLogin, onLogout }) => (
      <nav className="border-b border-pink-500/30 backdrop-blur-md bg-slate-950/80 sticky top-0 z-40">
        <div className="container mx-auto px-6 py-4 flex justify-between items-center">

            </div>
            <div><span className="text-2xl font-extrabold bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400 bg-clip-text text-transparent">Web2APK</span><span className="text-[10px] text-cyan-400 font-bold uppercase block">v4.2</span></div>
          </div>
          <div className="flex items-center gap-4">
            {user ? (
              <>
                <button onClick={() => onNavigate('/dashboard')} className="hidden sm:block text-gray-300 hover:text-pink-400 text-sm">Dashboard</button>
                <button onClick={() => onNavigate('/create-app')} className="hidden sm:block text-gray-300 hover:text-cyan-400 text-sm">Novo App</button>
                <div className="flex items-center gap-2 bg-slate-900/60 px-3 py-1.5 rounded-full"><span className="text-xs">{user.name}</span><div className="w-7 h-7 rounded-full bg-pink-500 flex items-center justify-center text-xs font-bold">{user.name[0]}</div></div>
                <button onClick={onLogout} className="p-2 rounded-full hover:bg-pink-500/10"><Icon name="logout" className="w-5 h-5" /></button>
              </>
            ) : (
              <button onClick={onLogin} className="px-5 py-2 rounded-full border border-pink-500 bg-pink-500/10 text-pink-400 text-sm flex items-center gap-2"><Icon name="login" className="w-4 h-4" />Entrar</button>
            )}
          </div>
        </div>
      </nav>
    );

    const Footer = () => (
      <footer className="border-t border-pink-500/10 bg-slate-950/40 mt-auto py-8 text-center text-slate-500 text-xs">
        <div className="container mx-auto px-6">© 2026 Web2APK Cyber Platform - Transforme sites em apps Android instantaneamente</div>
      </footer>
    );

    // Landing Page
    const LandingPage = ({ onLogin, onNavigate }) => {
      const [url, setUrl] = useState('');
      const [name, setName] = useState('');
      const [faqOpen, setFaqOpen] = useState(0);
      const handleQuick = (e) => { e.preventDefault(); if(url) { sessionStorage.setItem('quick_create_url', url); sessionStorage.setItem('quick_create_name', name); onNavigate('/create-app'); } };
      return (
        <div className="container mx-auto px-6 py-20">
          <div className="text-center max-w-4xl mx-auto">
            <div className="inline-flex items-center gap-2 bg-pink-500/10 border border-pink-500/30 px-4 py-1.5 rounded-full mb-6"><span className="w-2 h-2 rounded-full bg-pink-500"></span><span className="text-xs font-bold text-pink-400 uppercase">No-Code Revolution</span></div>
            <h1 className="text-5xl md:text-6xl font-black mb-6">Transforme Qualquer <span className="bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400 bg-clip-text text-transparent">Site em App</span> Android</h1>
            <p className="text-slate-400 text-xl mb-8">Crie APKs profissionais sem programar. Rápido, seguro e totalmente white-label.</p>
            <div className="flex gap-4 justify-center mb-16">
              <button onClick={onLogin} className="px-8 py-4 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:scale-105 transition">Criar App Grátis <Icon name="arrowRight" className="w-4 h-4" /></button>
              <button onClick={() => onNavigate('/pricing')} className="px-8 py-4 border border-pink-500/30 rounded-xl font-bold hover:bg-pink-500/10">Ver Planos</button>
            </div>
            <div className="bg-slate-900/40 border border-pink-500/30 rounded-2xl p-8 max-w-md mx-auto">
              <h3 className="text-xl font-bold mb-4 flex items-center gap-2 justify-center"><Icon name="globe" className="w-5 h-5 text-cyan-400" />Criador Expresso</h3>
              <form onSubmit={handleQuick} className="space-y-4">
                <input type="text" placeholder="Nome do App" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm" />
                <input type="url" placeholder="URL do seu site" value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm" required />
                <button type="submit" className="w-full py-3 bg-pink-600 rounded-xl font-bold flex items-center justify-center gap-2">Testar Geração <Icon name="arrowRight" className="w-4 h-4" /></button>
              </form>
            </div>
          </div>
        </div>
      );
    };

    // Dashboard
    const DashboardPage = ({ apps, builds, onNavigate, onDeleteApp }) => (
      <div className="container mx-auto px-6 py-12">
        <div className="flex justify-between items-center mb-8"><h1 className="text-3xl font-black">Meus Apps</h1><button onClick={() => onNavigate('/create-app')} className="px-5 py-2 bg-pink-600 rounded-xl flex items-center gap-2"><Icon name="plus" className="w-4 h-4" />Novo App</button></div>
        <div className="grid md:grid-cols-2 gap-6">{apps.map(app => (
          <div key={app.id} onClick={() => onNavigate(`/app/${app.id}`)} className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 cursor-pointer hover:border-pink-500/40 transition relative overflow-hidden">
            <div className="flex justify-between"><div><h3 className="text-xl font-bold">{app.name}</h3><p className="text-slate-400 text-sm">{app.websiteUrl}</p></div><button onClick={(e) => { e.stopPropagation(); onDeleteApp(app.id); }} className="text-slate-500 hover:text-red-400"><Icon name="trash" className="w-4 h-4" /></button></div>
            <div className="mt-4 flex justify-between text-sm"><span className="text-slate-400">v{app.version}</span><span className="text-pink-400">Ver detalhes →</span></div>
          </div>
        ))}</div>
      </div>
    );

    // Create App
    const CreateAppPage = ({ onCreateApp, onNavigate }) => {
      const [name, setName] = useState('');
      const [url, setUrl] = useState('');
      const [pkg, setPkg] = useState('');
      const [version, setVersion] = useState('1.0.0');
      const [color, setColor] = useState('#FF006E');
      const handleSubmit = (e) => { e.preventDefault(); onCreateApp({ name, websiteUrl: url, packageName: pkg || 'com.app.generated', version, themeColor: color, description: '', orientation: 'portrait', permissions: ['INTERNET'], offlineSupport: true, deepLinking: false, analyticsEnabled: true }); };
      return (<div className="container mx-auto px-6 py-12 max-w-2xl"><h1 className="text-3xl font-black mb-6">Criar Novo App</h1><form onSubmit={handleSubmit} className="space-y-4 bg-slate-900/40 p-8 rounded-2xl"><input type="text" placeholder="Nome do App" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" required /><input type="url" placeholder="URL do Site" value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" required /><input type="text" placeholder="Package Name (ex: com.app.meuapp)" value={pkg} onChange={e => setPkg(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><input type="text" placeholder="Versão" value={version} onChange={e => setVersion(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12 rounded-xl" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3" /></div><button type="submit" className="w-full py-3 bg-gradient-to-r from-pink-600 to-cyan-500 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="save" className="w-4 h-4" />Criar Aplicativo</button></form></div>);
    };

    // App Details
    const AppDetailsPage = ({ app, builds, onNavigate, onUpdateApp, onDeleteApp, onDownloadMockApk }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [name, setName] = useState(app.name);
      const [url, setUrl] = useState(app.websiteUrl);
      const [color, setColor] = useState(app.themeColor);
      const handleUpdate = (e) => { e.preventDefault(); onUpdateApp(app.id, { name, websiteUrl: url, themeColor: color }); setIsEditing(false); };
      return (<div className="container mx-auto px-6 py-12"><button onClick={() => onNavigate('/dashboard')} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><div className="grid md:grid-cols-3 gap-8"><div className="md:col-span-2"><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8">{!isEditing ? (<><div className="flex justify-between"><div><h2 className="text-3xl font-bold">{app.name}</h2><p className="text-slate-400">{app.websiteUrl}</p></div><button onClick={() => setIsEditing(true)} className="p-2 border border-slate-700 rounded-xl"><Icon name="edit" className="w-4 h-4" /></button></div><div className="mt-6 flex gap-3"><span className="px-3 py-1 bg-slate-800 rounded-lg">v{app.version}</span><span className="px-3 py-1 bg-slate-800 rounded-lg font-mono text-sm">{app.packageName}</span></div><div className="mt-6 flex gap-3"><button onClick={() => onNavigate(`/build/${app.id}`)} className="px-6 py-3 bg-pink-600 rounded-xl font-bold flex items-center gap-2"><Icon name="play" className="w-4 h-4" />Nova Compilação</button><button onClick={() => onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor)} className="px-6 py-3 bg-cyan-600 rounded-xl font-bold flex items-center gap-2"><Icon name="download" className="w-4 h-4" />Baixar APK (ZIP)</button></div></>) : (<form onSubmit={handleUpdate} className="space-y-4"><input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><input type="url" value={url} onChange={e => setUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3" /><div className="flex gap-3"><input type="color" value={color} onChange={e => setColor(e.target.value)} className="w-12 h-12" /><input type="text" value={color} onChange={e => setColor(e.target.value)} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3" /></div><button type="submit" className="px-6 py-3 bg-pink-600 rounded-xl">Salvar</button></form>)}</div></div><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6"><h3 className="font-bold mb-4">Preview do App</h3><div className="border-4 border-slate-800 rounded-3xl bg-slate-950 p-4"><div className="flex justify-center"><div className="w-16 h-16 rounded-xl bg-pink-500/20 flex items-center justify-center"><Icon name="smartphone" className="w-8 h-8 text-pink-400" /></div></div><h4 className="text-center font-bold mt-3">{app.name}</h4><p className="text-center text-xs text-slate-400 mt-2">{app.packageName}</p></div></div></div></div>);

    // Build Page
    const BuildAPKPage = ({ app, onNavigate, onAddBuild, onDownloadMockApk }) => {
      const [progress, setProgress] = useState(0);
      const [building, setBuilding] = useState(false);
      const [logs, setLogs] = useState([]);
      const startBuild = () => {
        setBuilding(true); setProgress(0); setLogs(['[00:00:00] Iniciando compilação...']);
        const interval = setInterval(() => { setProgress(p => { if (p >= 100) { clearInterval(interval); setBuilding(false); setLogs(l => [...l, '[00:00:15] Build concluída com sucesso!']); return 100; } if (p % 20 === 0) setLogs(l => [...l, `[00:00:${Math.floor(p/6)}] Compilando... ${p}%`]); return p + 5; }); }, 300);
      };
      return (<div className="container mx-auto px-6 py-12"><button onClick={() => onNavigate(`/app/${app.id}`)} className="flex items-center gap-2 text-slate-400 hover:text-pink-400 mb-6"><Icon name="arrowLeft" className="w-4 h-4" />Voltar</button><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-4">Compilando: {app.name}</h2><div className="w-full bg-slate-800 rounded-full h-4 mb-6"><div className="bg-gradient-to-r from-pink-500 to-cyan-500 h-4 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div></div><div className="bg-black/50 rounded-xl p-4 h-40 overflow-y-auto font-mono text-xs text-green-400 mb-6">{logs.map((l,i) => <div key={i}>{l}</div>)}</div>{!building && progress === 0 && <button onClick={startBuild} className="w-full py-3 bg-pink-600 rounded-xl font-bold">Iniciar Build</button>}{progress === 100 && <button onClick={() => onDownloadMockApk(app.name, app.version, app.packageName, app.themeColor)} className="w-full py-3 bg-green-600 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="download" className="w-4 h-4" />Baixar APK</button>}</div></div>);
    };

    const PremiumPage = ({ user, onUpgrade, onNavigate }) => (
      <div className="container mx-auto px-6 py-12 text-center"><h1 className="text-4xl font-black mb-4">Planos Premium</h1><div className="grid md:grid-cols-2 gap-8 max-w-3xl mx-auto"><div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-2">Free</h2><p className="text-3xl font-black mb-4">R$ 0</p><ul className="text-left space-y-2 mb-6"><li>✓ Até 2 apps</li><li>✓ APK básico</li></ul><button onClick={() => onNavigate('/create-app')} className="w-full py-2 border border-pink-500 rounded-xl">Começar</button></div><div className="bg-gradient-to-br from-pink-600/20 to-cyan-600/20 border border-pink-500 rounded-2xl p-8"><h2 className="text-2xl font-bold mb-2">Premium Pro</h2><p className="text-3xl font-black mb-4">R$ 29<span className="text-sm">/mês</span></p><ul className="text-left space-y-2 mb-6"><li>✓ Apps ilimitados</li><li>✓ Whitelabel completo</li><li>✓ Builds em 30s</li><li>✓ AdMob integrado</li></ul>{user?.role === 'premium' ? <button disabled className="w-full py-2 bg-pink-500 rounded-xl opacity-60">Plano Ativo</button> : <button onClick={() => onUpgrade('premium')} className="w-full py-2 bg-pink-500 rounded-xl font-bold">Ativar Premium</button>}</div></div></div>
    );

    // Main App
    const App = () => {
      const [user, setUser] = useState(() => { const s = localStorage.getItem('w2a_user'); return s ? JSON.parse(s) : null; });
      const [apps, setApps] = useState(() => { const s = localStorage.getItem('w2a_apps'); return s ? JSON.parse(s) : INITIAL_APPS; });
      const [builds, setBuilds] = useState(() => { const s = localStorage.getItem('w2a_builds'); return s ? JSON.parse(s) : INITIAL_BUILDS; });
      const [route, setRoute] = useState(() => window.location.hash.slice(1) || '/');
      const [toast, setToast] = useState(null);
      const [downloadFile, setDownloadFile] = useState(null);

      useEffect(() => { localStorage.setItem('w2a_user', JSON.stringify(user)); }, [user]);
      useEffect(() => { localStorage.setItem('w2a_apps', JSON.stringify(apps)); }, [apps]);
      useEffect(() => { localStorage.setItem('w2a_builds', JSON.stringify(builds)); }, [builds]);
      useEffect(() => { const handler = () => setRoute(window.location.hash.slice(1) || '/'); window.addEventListener('hashchange', handler); return () => window.removeEventListener('hashchange', handler); }, []);

      const navigate = (r) => { window.location.hash = r; setRoute(r); };
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const login = () => { setUser({ id: 1, name: "Cyber Dev", email: "dev@web2apk.com", role: "user" }); showToast("Conectado!"); navigate('/dashboard'); };
      const logout = () => { setUser(null); showToast("Desconectado"); navigate('/'); };
      const createApp = (data) => { const newApp = { ...data, id: Date.now(), userId: 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }; setApps([newApp, ...apps]); showToast(`App "${newApp.name}" criado!`); navigate('/dashboard'); };
      const deleteApp = (id) => { setApps(apps.filter(a => a.id !== id)); setBuilds(builds.filter(b => b.appId !== id)); showToast("App removido"); };
      const updateApp = (id, data) => { setApps(apps.map(a => a.id === id ? { ...a, ...data, updatedAt: new Date().toISOString() } : a)); showToast("App atualizado"); };
      const addBuild = (build) => setBuilds(prev => [build, ...prev]);
      const upgrade = (tier) => { setUser(prev => prev ? { ...prev, role: tier } : { id: 1, name: "Cyber Dev", email: "dev@web2apk.com", role: tier }); showToast(`Plano ${tier} ativado!`); navigate('/dashboard'); };
      const handleDownload = (appName, version, packageName, themeColor) => { const blob = createApkZipBlob(appName, version, packageName, themeColor); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${appName.replace(/[^a-z0-9]/gi, '_')}-v${version}.zip`; a.click(); setTimeout(() => URL.revokeObjectURL(url), 100); showToast(`Download iniciado: ${appName}`); };

      let content;
      if (route === '/') content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (route === '/pricing') content = <PremiumPage user={user} onUpgrade={upgrade} onNavigate={navigate} />;
      else if (!user && (route === '/dashboard' || route === '/create-app' || route.startsWith('/app/') || route.startsWith('/build/'))) content = <LandingPage onLogin={login} onNavigate={navigate} />;
      else if (route === '/dashboard') content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />;
      else if (route === '/create-app') content = <CreateAppPage onCreateApp={createApp} onNavigate={navigate} />;
      else if (route.startsWith('/app/')) { const id = parseInt(route.split('/')[2]); const app = apps.find(a => a.id === id); if (!app) content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />; else content = <AppDetailsPage app={app} builds={builds} onNavigate={navigate} onUpdateApp={updateApp} onDeleteApp={deleteApp} onDownloadMockApk={handleDownload} />; }
      else if (route.startsWith('/build/')) { const id = parseInt(route.split('/')[2]); const app = apps.find(a => a.id === id); if (!app) content = <DashboardPage apps={apps} builds={builds} onNavigate={navigate} onDeleteApp={deleteApp} />; else content = <BuildAPKPage app={app} onNavigate={navigate} onAddBuild={addBuild} onDownloadMockApk={handleDownload} />; }
      else content = <LandingPage onLogin={login} onNavigate={navigate} />;

      return (<div className="flex flex-col min-h-screen bg-slate-950"><Navbar user={user} onNavigate={navigate} onLogin={login} onLogout={logout} /><main className="flex-1">{content}</main>{toast && <div className="fixed bottom-6 right-6 bg-slate-900 border border-pink-500 rounded-2xl px-5 py-3 z-50 animate-fade-in-up">{toast}</div>}<Footer /></div>);
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
