<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Web2APK • Criador de APK No-Code para Android</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF006E;
      --cyan: #00d9ff;
      --purple: #7C3AED;
      --bg: #020617;
      --surface: rgba(15,23,42,0.7);
    }
    * { scroll-behavior: smooth; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      font-family: 'Rajdhani', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    h1,h2,h3,h4 { font-family: 'Orbitron', monospace; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }

    /* Glow effects */
    .glow-pink  { box-shadow: 0 0 24px rgba(255,0,110,0.35); }
    .glow-cyan  { box-shadow: 0 0 24px rgba(0,217,255,0.25); }
    .text-glow  { text-shadow: 0 0 16px rgba(255,0,110,0.5); }
    .text-glow-cyan { text-shadow: 0 0 16px rgba(0,217,255,0.5); }

    /* Glass panel */
    .glass {
      backdrop-filter: blur(14px);
      background: rgba(15,23,42,0.65);
      border: 1px solid rgba(51,65,85,0.55);
    }
    .glass-pink { border-color: rgba(255,0,110,0.3); }

    /* Grid background */
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,0,110,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,110,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    /* Scanline */
    .scanlines::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), #9333ea);
      border: none; color:#fff; font-family:'Rajdhani',sans-serif;
      font-weight:700; font-size:1rem; letter-spacing:.05em;
      padding:.6rem 1.4rem; border-radius:.75rem; cursor:pointer;
      transition: all .2s; display:inline-flex; align-items:center; gap:.4rem;
    }
    .btn-primary:hover { filter:brightness(1.15); transform:translateY(-1px); box-shadow:0 0 20px rgba(255,0,110,.45); }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,0,110,.5); color:var(--pink);
      font-family:'Rajdhani',sans-serif; font-weight:700;
      padding:.6rem 1.4rem; border-radius:.75rem; cursor:pointer;
      transition:all .2s;
    }
    .btn-outline:hover { background:rgba(255,0,110,.1); border-color:var(--pink); }
    .btn-cyan {
      background: linear-gradient(135deg, #0891b2, var(--cyan));
      border:none; color:#000; font-weight:700; font-family:'Rajdhani',sans-serif;
      padding:.6rem 1.4rem; border-radius:.75rem; cursor:pointer; transition:all .2s;
    }
    .btn-cyan:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn-danger {
      background: transparent; border: 1px solid rgba(239,68,68,.5);
      color:#f87171; font-family:'Rajdhani',sans-serif; font-weight:700;
      padding:.5rem 1rem; border-radius:.75rem; cursor:pointer; transition:all .2s;
    }
    .btn-danger:hover { background:rgba(239,68,68,.12); }

    /* Input */
    .input-field {
      width:100%; background:rgba(2,6,23,.8);
      border:1px solid rgba(51,65,85,.8); color:#e2e8f0;
      font-family:'Rajdhani',sans-serif; font-size:1rem;
      padding:.65rem 1rem; border-radius:.75rem; outline:none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-field:focus { border-color:var(--pink); box-shadow:0 0 0 3px rgba(255,0,110,.12); }
    .input-field::placeholder { color:#475569; }
    label.field-label {
      display:block; font-size:.75rem; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase; color:#94a3b8; margin-bottom:.4rem;
    }

    /* Card hover */
    .app-card {
      transition: border-color .2s, box-shadow .2s, transform .15s;
      cursor:pointer;
    }
    .app-card:hover {
      border-color: rgba(255,0,110,.5) !important;
      box-shadow: 0 0 24px rgba(255,0,110,.15);
      transform: translateY(-2px);
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed rgba(255,0,110,.3); border-radius:1rem;
      padding:1.5rem; text-align:center; cursor:pointer;
      transition: all .2s; background:rgba(255,0,110,.03);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color:var(--pink); background:rgba(255,0,110,.08);
    }

    /* Build progress bar */
    .progress-bar-track {
      width:100%; height:8px; background:#1e293b; border-radius:99px; overflow:hidden;
    }
    .progress-bar-fill {
      height:100%; border-radius:99px;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      transition: width .4s ease;
    }

    /* Log output */
    .log-output {
      background:#020617; border:1px solid rgba(51,65,85,.6);
      border-radius:.75rem; padding:.75rem; font-family:'JetBrains Mono',monospace;
      font-size:.7rem; color:#94a3b8; overflow-y:auto; height:280px;
    }
    .log-output .log-ok   { color:#4ade80; }
    .log-output .log-warn { color:#facc15; }
    .log-output .log-err  { color:#f87171; }
    .log-output .log-info { color:#38bdf8; }

    /* Toast */
    .toast {
      position:fixed; bottom:2rem; right:1.5rem; z-index:9999;
      padding:.85rem 1.4rem; border-radius:1rem;
      font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem;
      backdrop-filter:blur(12px); animation:slideUp .3s ease;
      display:flex; align-items:center; gap:.6rem; max-width:360px;
    }
    .toast-success { background:rgba(15,23,42,.95); border:1px solid rgba(74,222,128,.5); color:#4ade80; }
    .toast-error   { background:rgba(15,23,42,.95); border:1px solid rgba(248,113,113,.5); color:#f87171; }
    .toast-info    { background:rgba(15,23,42,.95); border:1px solid rgba(56,189,248,.5); color:#38bdf8; }
    @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

    /* Badge */
    .badge { display:inline-flex; align-items:center; padding:.15rem .6rem; border-radius:99px; font-size:.7rem; font-weight:700; letter-spacing:.05em; }
    .badge-pink   { background:rgba(255,0,110,.15); color:#ff6eb4; border:1px solid rgba(255,0,110,.3); }
    .badge-green  { background:rgba(74,222,128,.12); color:#4ade80; border:1px solid rgba(74,222,128,.3); }
    .badge-red    { background:rgba(248,113,113,.12); color:#f87171; border:1px solid rgba(248,113,113,.3); }
    .badge-cyan   { background:rgba(0,217,255,.12); color:#00d9ff; border:1px solid rgba(0,217,255,.3); }
    .badge-yellow { background:rgba(250,204,21,.12); color:#facc15; border:1px solid rgba(250,204,21,.3); }

    /* Stat card */
    .stat-card { glass; border-radius:1rem; padding:1.2rem 1.5rem; }

    /* Default app icon */
    .app-icon-default {
      background: linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);
      display:flex; align-items:center; justify-content:center;
      font-size:1.6rem; border-radius:.75rem; flex-shrink:0;
    }

    /* Nav link */
    .nav-link {
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:.9rem; letter-spacing:.06em; text-transform:uppercase;
      color:#94a3b8; transition:color .2s; cursor:pointer; padding:.25rem 0;
      border-bottom:2px solid transparent;
    }
    .nav-link:hover { color:var(--pink); border-bottom-color:rgba(255,0,110,.4); }

    /* Modal backdrop */
    .modal-backdrop {
      position:fixed; inset:0; z-index:200;
      background:rgba(2,6,23,.85); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center; padding:1rem;
    }

    /* Section divider */
    .cyber-divider {
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,0,110,.4), rgba(0,217,255,.4), transparent);
      margin: 2rem 0;
    }

    /* Animations */
    @keyframes pulse-slow { 0%,100% { opacity:.6; } 50% { opacity:1; } }
    .animate-pulse-slow { animation: pulse-slow 3s infinite; }
    @keyframes spin-slow { to { transform:rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">

<div id="app-root" class="flex flex-col min-h-screen"></div>

<script>
// ============================================================
//  WEB2APK — Full Featured App (Corrected + Enhanced)

// ---- State ----
let user = null;
let apps = [];
let builds = [];
let toastQueue = [];
let toastTimer = null;
let editModalAppId = null;

// ---- Storage ----
const KEYS = { user:'w2a_user', apps:'w2a_apps', builds:'w2a_builds' };

function loadStorage() {
  try {
    const u = localStorage.getItem(KEYS.user);
    if (u) user = JSON.parse(u);
    const a = localStorage.getItem(KEYS.apps);
    if (a) apps = JSON.parse(a);
    else seedApps();
    const b = localStorage.getItem(KEYS.builds);
    if (b) builds = JSON.parse(b);
    else seedBuilds();
  } catch(e) { seedApps(); seedBuilds(); }
}
function persist() {
  try {
    localStorage.setItem(KEYS.user, JSON.stringify(user));
    localStorage.setItem(KEYS.apps, JSON.stringify(apps));
    localStorage.setItem(KEYS.builds, JSON.stringify(builds));
  } catch(e) {
    // If localStorage is full (e.g. due to base64 images), try to save without large images
    try {
      const appsLight = apps.map(a => ({ ...a, iconUrl: a.iconUrl && a.iconUrl.startsWith('data:') ? '[base64-image]' : a.iconUrl }));
      localStorage.setItem(KEYS.apps, JSON.stringify(appsLight));
      toast('Aviso: imagem não persistida (localStorage cheio)', 'error');
    } catch(e2) {}
  }
}

    },

      updatedAt: new Date().toISOString()
    }

}
function seedBuilds() {
  builds = [
    { id:101, appId:1, userId:1, status:"completed", apkUrl:"mock", fileSize:45219876,
      buildStartedAt: new Date(Date.now()-86400000*2).toISOString(),
      buildCompletedAt: new Date(Date.now()-86400000*1.9).toISOString(),
      createdAt: new Date(Date.now()-86400000*2).toISOString(), errorMessage:null },
    { id:102, appId:1, userId:1, status:"error", apkUrl:null, fileSize:null,
      createdAt: new Date(Date.now()-86400000).toISOString(), errorMessage:"Erro de assinatura SSL" },
    { id:103, appId:2, userId:1, status:"completed", apkUrl:"mock", fileSize:31250000,

  ];
}

// ---- Router ----
function getRoute() { return window.location.hash.slice(1) || '/'; }
function navigate(route) { window.location.hash = route; rerender(); }

// ---- Toast ----
function toast(msg, type='success') {
  toastQueue.push({ msg, type, id: Date.now() });
  if (!toastTimer) showNextToast();
}
function showNextToast() {
  if (!toastQueue.length) { toastTimer = null; rerender(); return; }
  const t = toastQueue.shift();
  window._currentToast = t;
  rerender();
  toastTimer = setTimeout(() => {
    window._currentToast = null;
    showNextToast();
  }, 3000);
}

// ---- Image Helpers ----
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Falha ao ler arquivo'));
    r.readAsDataURL(file);
  });
}
function validateImage(file) {
  if (!file.type.match(/^image\/(jpeg|png|gif|webp)$/)) {
    toast('Apenas JPG, PNG, GIF ou WEBP', 'error'); return false;
  }
  if (file.size > 2 * 1024 * 1024) {
    toast('Imagem muito grande (máx 2MB)', 'error'); return false;
  }
  return true;
}

// ---- APK Download (Minimal valid ZIP/APK placeholder) ----
// Generates a tiny binary that is a valid ZIP file (APKs are ZIPs),
// containing a placeholder AndroidManifest.xml comment.
function generateMockApkBytes(appName, version, packageName) {
  // Helper: write little-endian 16/32-bit
  function u16(v) { return [v & 0xff, (v >> 8) & 0xff]; }
  function u32(v) { return [v & 0xff,(v>>8)&0xff,(v>>16)&0xff,(v>>24)&0xff]; }

  const encoder = new TextEncoder();
  const filename = 'META-INF/MANIFEST.MF';
  const content =
    `Manifest-Version: 1.0\r\n` +
    `Created-By: Web2APK Build Engine\r\n` +
    `App-Name: ${appName}\r\n` +
    `App-Version: ${version}\r\n` +
    `Package: ${packageName || 'com.web2apk.app'}\r\n` +
    `Build-Date: ${new Date().toISOString()}\r\n`;

  const fnBytes = encoder.encode(filename);
  const dataBytes = encoder.encode(content);

  // CRC32 of data
  function crc32(buf) {
    let crc = 0xFFFFFFFF;
    const table = [];
    for (let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++){c=c&1?0xEDB88320^(c>>>1):c>>>1;}table[i]=c;}
    for (let b of buf) crc = table[(crc^b)&0xff]^(crc>>>8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }
  const crc = crc32(dataBytes);
  const now = new Date();
  const dosTime = ((now.getHours()<<11)|(now.getMinutes()<<5)|(now.getSeconds()>>1));
  const dosDate = (((now.getFullYear()-1980)<<9)|((now.getMonth()+1)<<5)|now.getDate());

  // Local file header
  const localHeader = [
    ...u32(0x04034b50), // signature
    ...u16(20),         // version needed
    ...u16(0),          // flags
    ...u16(0),          // compression (stored)
    ...u16(dosTime), ...u16(dosDate),
    ...u32(crc),
    ...u32(dataBytes.length),
    ...u32(dataBytes.length),
    ...u16(fnBytes.length),
    ...u16(0),          // extra len
    ...fnBytes
  ];

  const localHeaderOffset = 0;
  const centralDir = [
    ...u32(0x02014b50),
    ...u16(20), ...u16(20),
    ...u16(0), ...u16(0), ...u16(0),
    ...u16(dosTime), ...u16(dosDate),
    ...u32(crc),
    ...u32(dataBytes.length),
    ...u32(dataBytes.length),
    ...u16(fnBytes.length),
    ...u16(0), ...u16(0),
    ...u16(0), ...u16(0),
    ...u32(0),
    ...u32(localHeaderOffset),
    ...fnBytes
  ];

  const cdOffset = localHeader.length + dataBytes.length;
  const cdSize = centralDir.length;

  const eocd = [
    ...u32(0x06054b50),
    ...u16(0), ...u16(0),
    ...u16(1), ...u16(1),
    ...u32(cdSize),
    ...u32(cdOffset),
    ...u16(0)
  ];

  const all = new Uint8Array([...localHeader, ...dataBytes, ...centralDir, ...eocd]);
  return all;
}

function downloadApk(appName, version, packageName) {
  const safeNameBase = (appName || 'app').replace(/[^a-zA-Z0-9_\-]/g, '_');
  const safeVersion = (version || '1.0.0').replace(/[^a-zA-Z0-9._\-]/g, '_');
  const filename = `${safeNameBase}-v${safeVersion}.apk`;

  const bytes = generateMockApkBytes(appName, version, packageName);
  const blob = new Blob([bytes], { type: 'application/vnd.android.package-archive' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
  toast(`⬇ Download iniciado: ${filename}`, 'success');
}

// ---- Auth ----
function handleLogin() {
  user = { id:1, name:"Cyber Dev", email:"dev@web2apk.com", role:"user" };
  persist(); toast("Bem-vindo, Cyber Dev! 🖥", "success"); navigate('/dashboard');
}
function handleLogout() {
  user = null; persist(); toast("Desconectado.", "info"); navigate('/');
}
function handleUpgrade(tier) {
  if (!user) user = { id:1, name:"Cyber Dev", email:"dev@web2apk.com", role:tier };
  else user.role = tier;
  persist(); toast(`Plano ${tier.toUpperCase()} ativado! 🚀`, "success"); navigate('/dashboard');
}

// ---- App CRUD ----
function createApp(data) {
  const a = { ...data, id:Date.now(), userId:user?.id||1,
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
  apps = [a, ...apps]; persist();
  toast(`"${a.name}" criado com sucesso! ✨`); navigate('/dashboard');
}
function updateApp(id, data) {
  apps = apps.map(a => a.id===id ? { ...a, ...data, updatedAt:new Date().toISOString() } : a);
  persist(); toast("App atualizado!"); rerender();
}
function deleteApp(id) {
  const name = apps.find(a=>a.id===id)?.name || 'App';
  apps = apps.filter(a=>a.id!==id);
  builds = builds.filter(b=>b.appId!==id);
  persist(); toast(`"${name}" removido.`, 'info'); navigate('/dashboard');
}

// ---- Build ----
function addBuild(b) {
  const i = builds.findIndex(x=>x.id===b.id);
  if (i>=0) builds[i]=b; else builds=[b,...builds];
  persist(); rerender();
}

// ---- Render helpers ----
function appIconHtml(iconUrl, size='48') {
  const s = `width:${size}px;height:${size}px;border-radius:.75rem;object-fit:cover;flex-shrink:0;`;
  if (iconUrl && iconUrl !== '[base64-image]') {
    return `<img src="${iconUrl}" style="${s}" onerror="this.replaceWith(defaultIconEl(${size}))" alt="icon">`;
  }
  return `<div class="app-icon-default" style="width:${size}px;height:${size}px;">📱</div>`;
}

function formatBytes(b) {
  if (!b) return '-';
  if (b > 1e6) return (b/1e6).toFixed(1)+' MB';
  if (b > 1e3) return (b/1e3).toFixed(1)+' KB';
  return b+' B';
}
function formatDate(s) {
  if (!s) return '-';
  try { return new Date(s).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch { return s; }
}
function formatDateTime(s) {
  if (!s) return '-';
  try { return new Date(s).toLocaleString('pt-BR'); }
  catch { return s; }
}

// ====== RENDER NAVBAR ======
function renderNavbar() {
  return `
  <nav style="border-bottom:1px solid rgba(255,0,110,.2);backdrop-filter:blur(16px);background:rgba(2,6,23,.85);position:sticky;top:0;z-index:100;">
    <div style="max-width:1280px;margin:0 auto;padding:.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;">
      <div onclick="nav('/')" style="display:flex;align-items:center;gap:.75rem;cursor:pointer;">
        <div style="width:42px;height:42px;background:linear-gradient(135deg,#FF006E,#7C3AED,#00d9ff);border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 0 18px rgba(255,0,110,.4);">⚡</div>
        <div>
          <div style="font-family:'Orbitron',monospace;font-size:1.3rem;background:linear-gradient(90deg,#FF006E,#a855f7,#00d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;line-height:1;">Web2APK</div>
          <div style="font-size:.6rem;color:#00d9ff;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;">CYBER ENGINE v4.2</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        ${user ? `
          <span class="nav-link" onclick="nav('/dashboard')">Painel</span>
          <span class="nav-link" onclick="nav('/create-app')">+ Novo App</span>
          <span class="nav-link" style="color:#facc15;" onclick="nav('/pricing')">⭐ Planos</span>
          <div style="display:flex;align-items:center;gap:.6rem;background:rgba(15,23,42,.7);border:1px solid rgba(255,0,110,.2);padding:.35rem .75rem;border-radius:99px;">
            <div style="text-align:right;line-height:1.2;">
              <div style="font-size:.8rem;font-weight:700;color:#e2e8f0;">${esc(user.name)}</div>

// ====== RENDER TOAST ======
function renderToast() {
  const t = window._currentToast;
  if (!t) return '';
  const cls = t.type==='error'?'toast-error':t.type==='info'?'toast-info':'toast-success';
  const icon = t.type==='error'?'❌':t.type==='info'?'ℹ️':'✅';
  return `<div class="toast ${cls}">${icon} ${esc(t.msg)}</div>`;
}

// Edit modal state for image
window._editIconData = null;

function handleEditImageFile(file) {
  if (!file || !validateImage(file)) return;
  fileToBase64(file).then(b64 => {
    window._editIconData = b64;
    const preview = document.getElementById('editIconPreview');
    if (preview) preview.innerHTML = `<img src="${b64}" style="width:64px;height:64px;border-radius:.75rem;object-fit:cover;">`;
    const urlInput = document.getElementById('editIconUrl');
    if (urlInput) urlInput.value = '';
  }).catch(() => toast('Falha ao ler imagem', 'error'));
}
function handleEditImageDrop(file) { handleEditImageFile(file); }
function handleEditIconUrlInput(val) {
  window._editIconData = null;
  if (val && val.startsWith('http')) {
    const preview = document.getElementById('editIconPreview');
    if (preview) preview.innerHTML = `<img src="${val}" style="width:64px;height:64px;border-radius:.75rem;object-fit:cover;" onerror="this.outerHTML='<div class=app-icon-default style=width:64px;height:64px;>📱</div>'">`;
  }
}
function saveEditModal(id) {
  const name = document.getElementById('editName')?.value?.trim();
  const url = document.getElementById('editUrl')?.value?.trim();
  if (!name || !url) { toast('Nome e URL são obrigatórios', 'error'); return; }
  const iconUrlField = document.getElementById('editIconUrl')?.value?.trim();
  const iconUrl = window._editIconData || iconUrlField || apps.find(a=>a.id===id)?.iconUrl || '';
  updateApp(id, {
    name, websiteUrl: url,
    description: document.getElementById('editDesc')?.value||'',
    packageName: document.getElementById('editPkg')?.value||'',
    version: document.getElementById('editVersion')?.value||'1.0.0',
    themeColor: document.getElementById('editColor')?.value||'#FF006E',
    orientation: document.getElementById('editOrientation')?.value||'portrait',
    offlineSupport: document.getElementById('editOffline')?.checked||false,
    deepLinking: document.getElementById('editDeep')?.checked||false,
    analyticsEnabled: document.getElementById('editAnalytics')?.checked||false,
    iconUrl
  });

  editModalAppId = null;
  rerender();
}

window._caIconData = null;

function handleCaImageFile(file) {
  if (!file || !validateImage(file)) return;
  fileToBase64(file).then(b64 => {
    window._caIconData = b64;
    setCaPreview(b64); showCaClearBtn(true);
    const urlInput = document.getElementById('caIconUrl');
    if (urlInput) urlInput.value = '';
    const status = document.getElementById('caIconUrlStatus');
    if (status) status.textContent = '✅ Imagem carregada do dispositivo';
  }).catch(() => toast('Falha ao ler imagem', 'error'));
}
function handleCaImageDrop(file) { handleCaImageFile(file); }
function handleCaIconUrl(val) {
  window._caIconData = null;
  if (val && val.startsWith('http')) {
    setCaPreview(val);
    showCaClearBtn(true);
    const status = document.getElementById('caIconUrlStatus');
    if (status) status.textContent = '🔗 URL inserida — verificando...';
  } else if (!val) {
    setCaPreview(null); showCaClearBtn(false);
  }
}
function setCaPreview(src) {
  const p = document.getElementById('caIconPreview');
  if (!p) return;
  if (src) p.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='📱'">`;
  else p.innerHTML = '📱';
}
function showCaClearBtn(show) {
  const btn = document.getElementById('caClearIcon');
  if (btn) btn.style.display = show ? '' : 'none';
}
function clearCaIcon() {
  window._caIconData = null;
  setCaPreview(null); showCaClearBtn(false);
  const urlInput = document.getElementById('caIconUrl');
  if (urlInput) urlInput.value = '';
  const iconFile = document.getElementById('caIconFile');
  if (iconFile) iconFile.value = '';
  const status = document.getElementById('caIconUrlStatus');
  if (status) status.textContent = '';
}
function submitCreateApp() {
  const name = document.getElementById('caName')?.value?.trim();
  const url = document.getElementById('caUrl')?.value?.trim();
  const pkg = document.getElementById('caPkg')?.value?.trim();
  if (!name) { toast('Nome é obrigatório', 'error'); return; }
  if (!url) { toast('URL do site é obrigatória', 'error'); return; }
  if (!pkg) { toast('Package name é obrigatório', 'error'); return; }
  const iconUrlField = document.getElementById('caIconUrl')?.value?.trim();
  const iconUrl = window._caIconData || iconUrlField || '';
  window._caIconData = null;
  createApp({
    name, websiteUrl: url,
    description: document.getElementById('caDesc')?.value||'',
    packageName: pkg,
    version: document.getElementById('caVersion')?.value||'1.0.0',
    themeColor: document.getElementById('caColor')?.value||'#FF006E',
    orientation: document.getElementById('caOrientation')?.value||'portrait',
    permissions: ['INTERNET'],
    offlineSupport: document.getElementById('caOffline')?.checked||false,
    deepLinking: document.getElementById('caDeep')?.checked||false,
    analyticsEnabled: document.getElementById('caAnalytics')?.checked||false,
    iconUrl
  });
}

const BUILD_PHASES = [
  { label:'Validando configurações', duration:600 },
  { label:'Baixando dependências', duration:900 },
  { label:'Compilando WebView wrapper', duration:1200 },
  { label:'Empacotando assets', duration:800 },
  { label:'Gerando AndroidManifest.xml', duration:600 },
  { label:'Assinando APK', duration:1000 },
  { label:'Verificando integridade', duration:600 },
  { label:'Finalizando build', duration:400 }
];

function startBuild(appId) {
  const app = apps.find(a=>a.id===appId);
  if (!app) return;

  // Hide pre-checks, show progress
  const pre = document.getElementById('buildPreChecks');
  const prog = document.getElementById('buildProgress');
  const result = document.getElementById('buildResult');
  if (pre) pre.style.display='none';
  if (prog) prog.style.display='block';

  const buildId = Date.now();
  const newBuild = { id:buildId, appId, userId:user?.id||1, status:'building',
    apkUrl:null, fileSize:null, createdAt:new Date().toISOString(),
    buildStartedAt:new Date().toISOString() };
  addBuild(newBuild);

  const logsDiv = document.getElementById('buildLogs');
  const bar = document.getElementById('buildProgressBar');
  const pct = document.getElementById('buildPct');
  const phase = document.getElementById('buildPhaseLabel');
  const phasesDiv = document.getElementById('buildPhases');
  const dot = document.getElementById('consoleStatusDot');

  if (dot) { dot.style.background='#facc15'; dot.style.animation='pulse-slow 1s infinite'; }

  function log(msg, type='') {
    if (logsDiv) logsDiv.innerHTML += `\n<span class="${type?'log-'+type:''}">[${new Date().toLocaleTimeString()}] ${msg}</span>`;
    logsDiv.scrollTop = logsDiv.scrollHeight;
  }

  log('[INIT] Web2APK Build Engine iniciado', 'info');
  log(`[APP] ${app.name} (${app.packageName}) v${app.version}`, 'info');
  log(`[URL] ${app.websiteUrl}`, 'info');

  let phaseIdx = 0;
  let progress = 0;
  const totalDuration = BUILD_PHASES.reduce((s,p)=>s+p.duration,0);
  let elapsed = 0;

  const completedPhases = [];

  function runPhase() {
    if (phaseIdx >= BUILD_PHASES.length) {
      // Done!
      progress = 100;
      if (bar) bar.style.width = '100%';
      if (pct) pct.textContent = '100%';
      if (phase) phase.textContent = 'Build concluída!';
      if (dot) { dot.style.background='#4ade80'; dot.style.animation='none'; }
      log('[SUCCESS] APK gerado com sucesso!', 'ok');
      log(`[SIZE] ${(28 + Math.random()*10).toFixed(1)} MB`, 'ok');
      log('[SIGN] Assinado com Web2APK Release Key', 'ok');

      const completedBuild = { ...newBuild, status:'completed', apkUrl:'mock',
        fileSize: Math.floor((28+Math.random()*10)*1e6),
        buildCompletedAt:new Date().toISOString() };
      addBuild(completedBuild);

      if (result) {
        result.style.display='block';
        result.innerHTML = `
          <div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:1rem;padding:1.25rem;text-align:center;">
            <div style="font-size:2rem;margin-bottom:.5rem;">🎉</div>
            <div style="font-size:1.1rem;font-weight:700;color:#4ade80;margin-bottom:.25rem;">APK Gerado com Sucesso!</div>
            <div style="font-size:.8rem;color:#64748b;margin-bottom:1rem;">${esc(app.name)} v${esc(app.version)} • ${formatBytes(completedBuild.fileSize)}</div>
            <button class="btn-cyan" onclick="downloadApk('${esc(app.name)}','${esc(app.version)}','${esc(app.packageName)}')" style="font-size:1rem;padding:.7rem 2rem;">⬇ Baixar APK</button>
            <div style="margin-top:.75rem;">
              <button class="btn-outline" onclick="nav('/app/${app.id}')" style="font-size:.8rem;">Ver Detalhes do App</button>
            </div>
          </div>`;
      }
      return;
    }

    const p = BUILD_PHASES[phaseIdx];
    if (phase) phase.textContent = p.label;
    log(`[BUILD] ${p.label}...`);

    const startProgress = (elapsed / totalDuration) * 100;
    const endProgress = ((elapsed + p.duration) / totalDuration) * 100;
    const steps = 10;
    let step = 0;

    const stepInterval = setInterval(() => {
      step++;
      const stepPct = startProgress + (endProgress - startProgress) * (step/steps);
      if (bar) bar.style.width = stepPct.toFixed(1)+'%';
      if (pct) pct.textContent = Math.round(stepPct)+'%';
      if (step >= steps) {
        clearInterval(stepInterval);
        completedPhases.push(p.label);
        if (phasesDiv) phasesDiv.innerHTML = completedPhases.map(l=>
          `<div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#4ade80;"><span>✔</span>${l}</div>`
        ).join('');
        elapsed += p.duration;
        phaseIdx++;
        setTimeout(runPhase, 80);
      }
    }, p.duration / steps);
  }

  setTimeout(runPhase, 300);
}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;text-align:left;">
      ${plans.map(p=>`
        <div class="glass" style="border-radius:1.5rem;padding:2rem;position:relative;${p.popular?`border-color:${p.color};box-shadow:0 0 28px rgba(255,0,110,.2);`:''}">
          ${p.popular ? `<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#FF006E,#a855f7);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.08em;padding:.3rem 1rem;border-radius:99px;">🔥 MAIS POPULAR</div>` : ''}
          <div style="font-family:'Orbitron',monospace;color:${p.color};font-size:.9rem;margin-bottom:.5rem;">${p.name}</div>
          <div style="display:flex;align-items:baseline;gap:.2rem;margin-bottom:1.25rem;">
            <span style="font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;">${p.price}</span>
            <span style="color:#64748b;font-size:.875rem;">${p.period}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem;font-size:.875rem;">
            ${p.features.map(f=>`<div style="display:flex;align-items:center;gap:.5rem;"><span style="color:#4ade80;">✓</span>${f}</div>`).join('')}
            ${p.missing.map(f=>`<div style="display:flex;align-items:center;gap:.5rem;color:#475569;"><span>✗</span>${f}</div>`).join('')}
          </div>
          <button class="${p.popular?'btn-primary':'btn-outline'}" onclick="${p.action}" style="width:100%;justify-content:center;${p.popular?'':'border-color:'+p.color+';color:'+p.color+';'}">${p.cta}</button>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ====== OPEN EDIT MODAL ======
function openEditModal(id) {
  editModalAppId = id;
  window._editIconData = null;
  rerender();
}

// ====== HELPERS ======
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ====== MAIN RERENDER ======
function rerender() {
  const root = document.getElementById('app-root');
  if (!root) return;

  const route = getRoute();
  let main = '';

  if (!user && route !== '/' && route !== '/pricing') {
    main = renderLanding();
  } else if (route === '/') {
    main = renderLanding();
  } else if (route === '/dashboard') {
    main = renderDashboard();
  } else if (route === '/create-app') {
    main = renderCreateApp();
  } else if (route === '/pricing') {
    main = renderPricing();
  } else if (/^\/app\/\d+$/.test(route)) {
    main = renderAppDetails(parseInt(route.split('/')[2]));
  } else if (/^\/build\/\d+$/.test(route)) {
    main = renderBuildPage(parseInt(route.split('/')[2]));
  } else {
    main = renderLanding();
  }

  root.innerHTML =
    renderNavbar() +
    `<main style="flex:1;">${main}</main>` +
    renderFooter() +
    renderToast() +
    renderEditModal();
}

// ====== GLOBAL HELPERS (called from HTML attributes) ======
window.nav = navigate;
window.handleLogin = handleLogin;
window.handleLogout = handleLogout;
window.handleUpgrade = handleUpgrade;
window.deleteApp = deleteApp;
window.openEditModal = openEditModal;
window.saveEditModal = saveEditModal;
window.downloadApk = downloadApk;

window.rerender = rerender;

window.handleCaImageFile = handleCaImageFile;

window.handleQuickForm = handleQuickForm;
window.handleEditImageFile = handleEditImageFile;
window.handleEditImageDrop = handleEditImageDrop;
window.handleEditIconUrlInput = handleEditIconUrlInput;

// ====== INIT ======
window.addEventListener('hashchange', rerender);
loadStorage();
rerender();
</script>
